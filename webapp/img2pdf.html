<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rasm → PDF | DASTYOR AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .page-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 24px;
            position: relative;
            z-index: 1;
        }

        .page-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 52px;
            max-width: 640px;
            width: 100%;
            text-align: center;
        }

        .big-icon {
            font-size: 72px;
            display: block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .upload-zone {
            border: 2px dashed rgba(59, 130, 246, 0.3);
            border-radius: 18px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        .imgs-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 0;
        }

        .img-thumb {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }

        .convert-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
        }

        .count-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(59, 130, 246, 0.15);
            border-radius: 50px;
            font-size: 13px;
            color: #60a5fa;
            margin-bottom: 8px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <canvas id="particles"></canvas>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="14" fill="url(#l1)" />
                        <path d="M8 14h12M14 8v12" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="l1" x1="0" y1="0" x2="28" y2="28">
                                <stop stop-color="#3b82f6" />
                                <stop offset="1" stop-color="#1d4ed8" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span>DASTYOR <b>AI</b></span>
            </a>
            <a href="index.html" class="back-link">← Bosh sahifa</a>
        </div>
    </nav>
    <div class="page-wrap">
        <div class="page-card">
            <span style="font-size:72px;display:block;margin-bottom:10px">🖼️</span>
            <h1>Rasm → PDF</h1>
            <p class="subtitle">20 tagacha rasm tanlang va PDF tuzamiz</p>

            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfImages').click()">
                <span style="font-size:40px">📁</span>
                <p style="color:#60a5fa;font-weight:600;margin:12px 0 4px">Rasmlarni tanlash / qo'shish</p>
                <p style="color:#64748b;font-size:13px">20 tagacha • JPG, PNG, WEBP</p>
            </div>

            <input type="file" id="pdfImages" accept="image/*" multiple style="display:none"
                onchange="previewImages(this)" />
            <div id="countBadge" style="display:none" class="count-badge">0 ta rasm tanlandi</div>
            <div class="imgs-preview" id="imgsPreview"></div>
            <button class="convert-btn" id="pdfBtn" style="display:none" onclick="startImgToPdf()">📄 PDF
                yaratish</button>
            <button class="convert-btn" id="addMoreBtn"
                style="display:none;background:rgba(59,130,246,0.15);color:#60a5fa"
                onclick="document.getElementById('pdfImages').click()">➕ Ko'proq rasm qo'shish</button>
        </div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        let telegramId = '';

        function getTelegramId() {
            if (tg && tg.initDataUnsafe?.user?.id) return tg.initDataUnsafe.user.id.toString();
            const urlId = new URLSearchParams(window.location.search).get('telegram_id');
            if (urlId) return urlId;
            const stored = sessionStorage.getItem('telegram_id');
            if (stored) return stored;
            return '';
        }

        telegramId = getTelegramId();
        if (telegramId) sessionStorage.setItem('telegram_id', telegramId);

        let selectedFiles = [];

        function previewImages(input) {
            const newFiles = Array.from(input.files);

            // Check for duplicates before adding
            for (let f of newFiles) {
                if (!selectedFiles.some(existing => existing.name === f.name && existing.size === f.size)) {
                    selectedFiles.push(f);
                }
            }
            // limit to 20
            selectedFiles = selectedFiles.slice(0, 20);

            // Must reset value inside the timeout OR right away, but to be clean, just reset
            input.value = '';
            refreshThumbsOnly();
        }

        function refreshThumbsOnly() {
            const preview = document.getElementById('imgsPreview');
            const badge = document.getElementById('countBadge');
            const btn = document.getElementById('pdfBtn');
            const addBtn = document.getElementById('addMoreBtn');

            preview.innerHTML = '';
            selectedFiles.forEach((f, idx) => {
                const wrap = document.createElement('div');
                wrap.style.cssText = 'position:relative;display:inline-block';
                const img = document.createElement('img');
                img.src = URL.createObjectURL(f);
                img.className = 'img-thumb';
                const del = document.createElement('button');
                del.textContent = '×';
                del.style.cssText = 'position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;font-weight:700;line-height:1';
                del.onclick = () => {
                    selectedFiles.splice(idx, 1);
                    refreshThumbsOnly();
                };
                wrap.appendChild(img);
                wrap.appendChild(del);
                preview.appendChild(wrap);
            });

            badge.textContent = selectedFiles.length + ' ta rasm tanlandi';
            if (selectedFiles.length === 0) {
                btn.style.display = 'none';
                badge.style.display = 'none';
                if (addBtn) addBtn.style.display = 'none';
            } else {
                btn.style.display = 'block';
                badge.style.display = 'inline-block';
                if (addBtn) addBtn.style.display = selectedFiles.length < 20 ? 'block' : 'none';
            }
        }

        async function startImgToPdf() {
            if (!telegramId) telegramId = getTelegramId();
            if (selectedFiles.length === 0) return;

            const btn = document.getElementById('pdfBtn');
            btn.innerHTML = '⏳ Birlashtirilmoqda...';
            btn.disabled = true;

            const formData = new FormData();
            if (telegramId) formData.append('telegram_id', telegramId);
            selectedFiles.forEach(f => formData.append('files', f));

            let apiBase = location.protocol === 'file:' ? 'http://127.0.0.1:8000' : location.origin;

            try {
                const res = await fetch(apiBase + '/api/pdf_direct', { method: 'POST', body: formData });

                if (!res.ok) {
                    let errText = "Server xatosi";
                    try { const errData = await res.json(); errText = errData.detail || errData.error || errText; } catch (e) { }
                    alert("Xatolik: " + errText);
                    btn.innerHTML = '📄 PDF yaratish';
                    btn.disabled = false;
                    return;
                }

                // Download the generated PDF directly in the browser
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `DASTYOR_AI_Rasmlar_${new Date().getTime()}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);

                if (telegramId && tg) {
                    tg.showAlert("✅ PDF qurilmangizga yuklandi va botga yuborildi!");
                } else {
                    alert("✅ PDF yuklab olindi!");
                }

                // Clear the files
                selectedFiles = [];
                refreshThumbsOnly();

            } catch (e) {
                alert("Serverga ulanishda xato: " + e.message);
            }

            btn.innerHTML = '📄 PDF yaratish';
            btn.disabled = false;
        }
    </script>
</body>

</html>
