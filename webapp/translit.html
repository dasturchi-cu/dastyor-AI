<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Krill ↔ Lotin | DASTYOR AI</title>
    <!-- 1. Theme init FIRST — prevents flash of wrong theme -->
    <script src="theme-init.js"></script>
    <!-- 2. Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 3. Global theme tokens -->
    <link rel="stylesheet" href="theme.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            blue: '#0A84FF',
                            green: '#30D158',
                            orange: '#FF9F0A',
                            purple: '#BF5AF2',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }


        .scroller::-webkit-scrollbar {
            width: 0px;
        }

        /* Custom toggle for active direction */
        .dir-btn.active {
            background: rgba(255, 159, 10, 0.1);
            /* Apple Orange */
            border-color: rgba(255, 159, 10, 0.5);
            color: #FF9F0A;
        }

        .dark .dir-btn.active {
            background: rgba(255, 159, 10, 0.15);
        }
    </style>
</head>

<body class="antialiased selection:bg-apple-orange selection:text-white flex flex-col h-screen overflow-hidden">

    <!-- Global Header -->
    <header
        class="h-16 flex-shrink-0 border-b border-black/5 dark:border-white/5 bg-white/80 dark:bg-[#0a0a0c]/80 backdrop-blur-xl flex items-center px-4 z-50">
        <a href="more.html"
            class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors flex items-center justify-center shrink-0"
            id="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </a>
        <div class="ml-4 flex-1">
            <h1 class="font-display font-bold text-lg tracking-tight leading-tight">Krill / Lotin</h1>
            <p class="text-[10px] font-semibold text-black/40 dark:text-white/40 uppercase tracking-widest">Matn <span
                    id="statsBadge">0 belgi</span></p>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto scroller relative flex flex-col">
        <div class="max-w-3xl w-full mx-auto p-4 md:p-6 flex flex-col h-full gap-4">

            <!-- Direction Bar -->
            <div
                class="flex items-center gap-3 bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-2xl p-2 animate-slide-up shadow-sm">
                <button
                    class="dir-btn flex-1 bg-black/5 dark:bg-white/5 border border-transparent hover:bg-black/10 dark:hover:bg-white/10 rounded-xl px-2 py-3 transition-colors flex flex-col items-center justify-center"
                    id="srcLabel" onclick="setDir('k2l')">
                    <span class="font-bold text-sm">Кирилл → Lotin</span>
                </button>

                <button
                    class="w-10 h-10 rounded-xl bg-apple-orange text-white flex items-center justify-center font-bold text-lg hover:brightness-110 active:scale-95 transition-all shadow-md shrink-0"
                    onclick="swapDir()">
                    ⇆
                </button>

                <button
                    class="dir-btn flex-1 bg-black/5 dark:bg-white/5 border border-transparent hover:bg-black/10 dark:hover:bg-white/10 rounded-xl px-2 py-3 transition-colors flex flex-col items-center justify-center"
                    id="tgtLabel" onclick="setDir('l2k')">
                    <span class="font-bold text-sm">Lotin → Кирилл</span>
                </button>
            </div>

            <!-- Box Wrapper -->
            <div class="flex flex-col md:flex-row gap-4 flex-1 h-full min-h-[400px]">

                <!-- INPUT PANEL -->
                <div class="flex-1 flex flex-col bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-[24px] overflow-hidden shadow-sm animate-slide-up"
                    style="animation-delay: 0.1s;">
                    <div
                        class="flex items-center justify-between px-5 py-3 border-b border-black/5 dark:border-white/5 bg-black/[0.02] dark:bg-white/[0.02]">
                        <span class="text-[11px] font-bold text-apple-orange uppercase tracking-widest"
                            id="srcScript">Кирилл</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold text-black/30 dark:text-white/30" id="charCount">0</span>
                            <button onclick="clearAll()"
                                class="text-black/30 dark:text-white/30 hover:text-black dark:hover:text-white transition-colors">✕</button>
                        </div>
                    </div>
                    <textarea
                        class="w-full flex-1 bg-transparent border-none p-5 text-base font-medium resize-none outline-none text-black dark:text-white placeholder-black/30 dark:placeholder-white/30 leading-relaxed"
                        id="srcText" placeholder="Matnni bu yerga kiriting..." oninput="onInput()"></textarea>
                </div>

                <!-- OUTPUT PANEL -->
                <div class="flex-1 flex flex-col bg-apple-orange/5 dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-[24px] overflow-hidden shadow-sm animate-slide-up relative"
                    style="animation-delay: 0.15s;" id="outPanel">
                    <div
                        class="flex items-center justify-between px-5 py-3 border-b border-black/5 dark:border-white/5 bg-black/[0.02] dark:bg-white/[0.02]">
                        <span class="text-[11px] font-bold text-apple-orange uppercase tracking-widest"
                            id="tgtScript">Lotin</span>
                        <div class="flex items-center gap-3">
                            <button onclick="useOutput()"
                                class="text-[10px] font-bold text-black/40 dark:text-white/40 hover:text-apple-orange transition-colors uppercase tracking-wider">↑
                                Tahrir</button>
                            <button onclick="copyOut()" id="copyBtn"
                                class="text-[10px] font-bold text-black/40 dark:text-white/40 hover:text-apple-orange transition-colors uppercase tracking-wider">📋
                                Nusxa</button>
                        </div>
                    </div>
                    <textarea
                        class="w-full flex-1 bg-transparent border-none p-5 text-base font-semibold resize-none outline-none text-black dark:text-white placeholder-black/30 dark:placeholder-white/30 leading-relaxed"
                        id="outText" placeholder="Natija shu yerda chiqadi..." readonly></textarea>
                </div>

            </div>

            <!-- STATUS AND SAMPLES -->
            <div class="mt-auto pt-2 animate-slide-up flex flex-col gap-3" style="animation-delay: 0.2s;">
                <div id="statusBanner"
                    class="hidden items-center gap-2 p-3 rounded-xl text-sm font-semibold max-w-full leading-tight">
                    <span id="statusIcon">⚠️</span>
                    <span id="statusMsg"></span>
                </div>

                <button
                    class="w-full py-4 rounded-2xl bg-apple-orange hover:brightness-110 active:scale-[0.98] text-white font-bold text-lg shadow-[0_8px_30px_rgba(255,159,10,0.3)] transition-all flex justify-center items-center gap-2"
                    id="cvBtn" onclick="convert()">
                    ⚡ O'girish
                </button>
            </div>

            <div class="animate-slide-up pb-2" style="animation-delay: 0.25s;">
                <h3 class="text-[10px] font-bold text-black/40 dark:text-white/40 uppercase tracking-widest mb-3 pl-2">
                    Klaviatura</h3>
                <div class="grid grid-cols-5 sm:grid-cols-7 gap-2 bg-black/5 dark:bg-white/5 p-3 rounded-2xl"
                    id="mapGrid">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <div class="animate-slide-up pb-8" style="animation-delay: 0.3s;">
                <h3 class="text-[10px] font-bold text-black/40 dark:text-white/40 uppercase tracking-widest mb-3 pl-2">
                    Namunalar</h3>
                <div class="flex flex-wrap gap-2" id="samplesWrap">
                    <!-- Loaded via JS -->
                </div>
            </div>

        </div>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        // Theme already applied by theme-init.js

        const tid = new URLSearchParams(location.search).get('telegram_id') || sessionStorage.getItem('telegram_id') || tg?.initDataUnsafe?.user?.id?.toString() || '';
        document.getElementById('backBtn').onclick = (e) => {
            e.preventDefault();
            location.href = 'more.html' + (tid ? '?telegram_id=' + tid : '');
        };

        /* ── ALGORITHM ── */
        const CYR_TO_LAT = {
            'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd',
            'е': 'e', 'ё': 'yo', 'ж': 'j', 'з': 'z', 'и': 'i',
            'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n',
            'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't',
            'у': 'u', 'ф': 'f', 'х': 'x', 'ц': 'ts', 'ч': 'ch',
            'ш': 'sh', 'щ': 'sh', 'ъ': "'", 'ы': 'i', 'ь': '',
            'э': 'e', 'ю': 'yu', 'я': 'ya',
            'қ': 'q', 'ғ': "g'", 'ҳ': 'h', 'ў': "o'", 'ҷ': 'j',
            'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D',
            'Е': 'E', 'Ё': 'Yo', 'Ж': 'J', 'З': 'Z', 'И': 'I',
            'Й': 'Y', 'К': 'K', 'Л': 'L', 'М': 'M', 'Н': 'N',
            'О': 'O', 'П': 'P', 'Р': 'R', 'С': 'S', 'Т': 'T',
            'У': 'U', 'Ф': 'F', 'Х': 'X', 'Ц': 'Ts', 'Ч': 'Ch',
            'Ш': 'Sh', 'Щ': 'Sh', 'Ъ': "'", 'Ы': 'I', 'Ь': '',
            'Э': 'E', 'Ю': 'Yu', 'Я': 'Ya',
            'Қ': 'Q', 'Ғ': "G'", 'Ҳ': 'H', 'Ў': "O'", 'Ҷ': 'J',
        };

        const LAT_TO_CYR_3 = {};
        const LAT_TO_CYR_2 = {};
        const LAT_TO_CYR_1 = {};

        const APOS = ["'", "\u2019", "\u02BB", "`"];
        for (const ap of APOS) {
            LAT_TO_CYR_3['o' + ap] = "\u045E"; LAT_TO_CYR_3['O' + ap] = "\u040E";
            LAT_TO_CYR_3['g' + ap] = "\u0493"; LAT_TO_CYR_3['G' + ap] = "\u0492";
        }

        const DIGRAPHS_2 = [
            ['sh', 'ш'], ['Sh', 'Ш'], ['SH', 'Ш'],
            ['ch', 'ч'], ['Ch', 'Ч'], ['CH', 'Ч'],
            ['ng', 'нг'], ['Ng', 'Нг'], ['NG', 'НГ'],
            ['yo', 'ё'], ['Yo', 'Ё'], ['YO', 'Ё'],
            ['ya', 'я'], ['Ya', 'Я'], ['YA', 'Я'],
            ['yu', 'ю'], ['Yu', 'Ю'], ['YU', 'Ю'],
            ['ts', 'ц'], ['Ts', 'Ц'], ['TS', 'Ц'],
            ['zh', 'ж'], ['Zh', 'Ж'], ['ZH', 'Ж']
        ];
        for (const [lat, cyr] of DIGRAPHS_2) LAT_TO_CYR_2[lat] = cyr;

        const SINGLES = [
            ['a', 'а'], ['b', 'б'], ['d', 'д'], ['e', 'е'], ['f', 'ф'], ['g', 'г'], ['h', 'ҳ'], ['i', 'и'], ['j', 'ж'], ['k', 'к'],
            ['l', 'л'], ['m', 'м'], ['n', 'н'], ['o', 'о'], ['p', 'п'], ['q', 'қ'], ['r', 'р'], ['s', 'с'], ['t', 'т'], ['u', 'у'],
            ['v', 'в'], ['w', 'в'], ['x', 'х'], ['y', 'й'], ['z', 'з'], ["'", 'ъ'], ["\u2019", 'ъ'], ["\u02BB", 'ъ'],
            ['A', 'А'], ['B', 'Б'], ['D', 'Д'], ['E', 'Е'], ['F', 'Ф'], ['G', 'Г'], ['H', 'Ҳ'], ['I', 'И'], ['J', 'Ж'], ['K', 'К'],
            ['L', 'Л'], ['M', 'М'], ['N', 'Н'], ['O', 'О'], ['P', 'П'], ['Q', 'Қ'], ['R', 'Р'], ['S', 'С'], ['T', 'Т'], ['U', 'У'],
            ['V', 'В'], ['W', 'В'], ['X', 'Х'], ['Y', 'Й'], ['Z', 'З'],
        ];
        for (const [lat, cyr] of SINGLES) LAT_TO_CYR_1[lat] = cyr;

        function cyrillicToLatin(text) {
            const out = [];
            for (const ch of text) {
                const mapped = CYR_TO_LAT[ch];
                if (mapped !== undefined) out.push(mapped);
                else out.push(ch);
            }
            return out.join('');
        }

        function latinToCyrillic(text) {
            const out = []; const len = text.length; let i = 0;
            while (i < len) {
                if (i + 2 < len && LAT_TO_CYR_3[text[i] + text[i + 1] + text[i + 2]] !== undefined) {
                    out.push(LAT_TO_CYR_3[text[i] + text[i + 1] + text[i + 2]]); i += 3; continue;
                }
                if (i + 1 < len && LAT_TO_CYR_2[text[i] + text[i + 1]] !== undefined) {
                    out.push(LAT_TO_CYR_2[text[i] + text[i + 1]]); i += 2; continue;
                }
                const ch = text[i];
                if (LAT_TO_CYR_1[ch] !== undefined) out.push(LAT_TO_CYR_1[ch]);
                else out.push(ch);
                i++;
            }
            return out.join('');
        }

        function detectScript(text) {
            let cyr = 0, lat = 0;
            for (const ch of text) {
                const code = ch.charCodeAt(0);
                if (code >= 0x0400 && code <= 0x04FF) cyr++;
                else if ((code >= 0x41 && code <= 0x5A) || (code >= 0x61 && code <= 0x7A)) lat++;
            }
            if (cyr === 0 && lat === 0) return null;
            return cyr >= lat ? 'k2l' : 'l2k';
        }

        /* ── UI INTERACTION ── */
        let dir = 'k2l';
        let autoConverting = true;

        const SAMPLES = {
            k2l: ['Ўзбекистон Республикаси', 'Ассалому алайкум', 'Тошкент шаҳри', 'Ҳамма нарса яхши', 'Ғалаба қозонамиз'],
            l2k: ["O'zbekiston Respublikasi", "Assalomu alaykum", "Toshkent shahri", "Hamma narsa yaxshi", "G'alaba qozonamiz"]
        };

        const CHAR_TABLE = [
            ['А а', 'A a'], ['Б б', 'B b'], ['В в', 'V v'], ['Г г', 'G g'], ['Д д', 'D d'],
            ['Е е', 'E e'], ['Ё ё', 'Yo yo'], ['Ж ж', 'J j'], ['З з', 'Z z'], ['И и', 'I i'],
            ['Й й', 'Y y'], ['К к', 'K k'], ['Л л', 'L l'], ['М м', 'M m'], ['Н н', 'N n'],
            ['О о', 'O o'], ['П п', 'P p'], ['Р р', 'R r'], ['С с', 'S s'], ['Т т', 'T t'],
            ['У у', 'U u'], ['Ф ф', 'F f'], ['Х х', 'X x'], ['Ц ц', 'Ts ts'], ['Ч ч', 'Ch ch'],
            ['Ш ш', 'Sh sh'], ['Ъ ъ', "' '"], ['Э э', 'E e'], ['Ю ю', 'Yu yu'], ['Я я', 'Ya ya'],
            ['Қ қ', 'Q q'], ['Ғ ғ', "G' g'"], ['Ҳ ҳ', 'H h'], ['Ў ў', "O' o'"], ['Нг нг', 'Ng ng'],
        ];

        function renderSamples() {
            const wrap = document.getElementById('samplesWrap');
            wrap.innerHTML = SAMPLES[dir].map(s =>
                `<span class="px-4 py-2 rounded-full border border-black/10 dark:border-white/10 bg-white/50 dark:bg-white/5 hover:bg-black/5 dark:hover:bg-white/10 text-xs font-semibold transition-colors cursor-pointer" onclick="setSample(this)">${s}</span>`
            ).join('');
        }

        function buildCharMap() {
            const grid = document.getElementById('mapGrid');
            grid.innerHTML = CHAR_TABLE.map(([cyr, lat]) => {
                const src = dir === 'k2l' ? cyr : lat;
                const tgt = dir === 'k2l' ? lat : cyr;
                const ch = src.split(' ')[1] !== undefined ? src.split(' ')[1] : src.split(' ')[0];
                const safeAttr = ch.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                return `<div class="flex flex-col items-center justify-center bg-white dark:bg-neutral-800 border border-black/5 dark:border-white/5 rounded-xl py-2 cursor-pointer hover:bg-black/5 dark:hover:bg-white/10 transition-colors" data-ch="${safeAttr}" title="${src} → ${tgt}">
                    <span class="font-bold text-sm text-black dark:text-white">${src.split(' ')[0]}</span>
                    <span class="text-[10px] font-semibold text-black/50 dark:text-white/50">${tgt.split(' ')[0]}</span>
                </div>`;
            }).join('');

            grid.onclick = function (e) {
                const cell = e.target.closest('div[data-ch]');
                if (!cell) return;
                insertChar(cell.dataset.ch);
            };
        }

        function insertChar(ch) {
            if (!ch) return;
            const ta = document.getElementById('srcText');
            ta.focus();
            const start = ta.selectionStart ?? ta.value.length;
            const end = ta.selectionEnd ?? ta.value.length;
            const val = ta.value;
            ta.value = val.slice(0, start) + ch + val.slice(end);
            ta.selectionStart = ta.selectionEnd = start + ch.length;
            onInput();
            tg?.HapticFeedback?.selectionChanged();
        }

        function setSample(el) {
            document.getElementById('srcText').value = el.textContent;
            onInput();
            tg?.HapticFeedback?.selectionChanged();
        }

        function updateDirUI() {
            const isK2L = dir === 'k2l';
            document.getElementById('srcLabel').classList.toggle('active', isK2L);
            document.getElementById('tgtLabel').classList.toggle('active', !isK2L);
            document.getElementById('srcScript').textContent = isK2L ? 'Кирилл' : 'Lotin';
            document.getElementById('tgtScript').textContent = isK2L ? 'Lotin' : 'Кирилл';
            document.getElementById('srcText').placeholder = isK2L ? 'Кирилл матнини шу ерга киритинг...' : "Lotin matnini shu yerga kiriting...";
            renderSamples();
            buildCharMap();
            if (document.getElementById('srcText').value.trim()) convertNow();
        }

        function setDir(newDir) {
            if (dir === newDir) return;
            dir = newDir;
            updateDirUI();
            tg?.HapticFeedback?.impactOccurred('light');
        }

        function swapDir() {
            const src = document.getElementById('srcText');
            const out = document.getElementById('outText');
            const prevOut = out.value;
            dir = dir === 'k2l' ? 'l2k' : 'k2l';
            if (prevOut) { src.value = prevOut; out.value = ''; }
            updateDirUI();
            if (src.value.trim()) convertNow();
            tg?.HapticFeedback?.impactOccurred('medium');
        }

        function clearAll() {
            document.getElementById('srcText').value = '';
            document.getElementById('outText').value = '';
            onInput();
            hideStatus();
            tg?.HapticFeedback?.impactOccurred('light');
        }

        function copyOut() {
            const t = document.getElementById('outText').value;
            if (!t) return;
            navigator.clipboard?.writeText(t).then(() => {
                document.getElementById('copyBtn').textContent = '✅ Saqlandi';
                setTimeout(() => { document.getElementById('copyBtn').textContent = '📋 Nusxa'; }, 1500);
            }).catch(() => {
                document.getElementById('outText').select(); document.execCommand('copy');
            });
            tg?.HapticFeedback?.notificationOccurred('success');
        }

        function useOutput() {
            const out = document.getElementById('outText').value;
            if (!out) return;
            document.getElementById('srcText').value = out;
            dir = dir === 'k2l' ? 'l2k' : 'k2l';
            updateDirUI();
            convertNow();
            tg?.HapticFeedback?.impactOccurred('light');
        }

        function onInput() {
            const text = document.getElementById('srcText').value;
            const len = text.length;
            document.getElementById('statsBadge').textContent = len + ' belgi';
            document.getElementById('charCount').textContent = len;

            if (len > 3) {
                const detected = detectScript(text);
                if (detected && detected !== dir) { dir = detected; updateDirUI(); }
            }
            if (autoConverting) convertNow();
        }

        function convertNow() {
            const src = document.getElementById('srcText').value;
            if (!src) { document.getElementById('outText').value = ''; return; }
            document.getElementById('outText').value = dir === 'k2l' ? cyrillicToLatin(src) : latinToCyrillic(src);
        }

        function convert() {
            const src = document.getElementById('srcText').value.trim();
            if (!src) { showStatus('error', '⚠️', 'Matn kiriting!'); return; }
            convertNow();
            showStatus('success', '✅', 'Matn muvaffaqiyatli o\'girildi.');
            tg?.HapticFeedback?.notificationOccurred('success');
        }

        function showStatus(type, icon, msg) {
            const b = document.getElementById('statusBanner');
            b.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-apple-green/10', 'text-apple-green');
            b.classList.add('flex');
            if (type === 'error') b.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500/20');
            else b.classList.add('bg-apple-green/10', 'text-apple-green', 'border', 'border-apple-green/20');
            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusMsg').textContent = msg;
        }
        function hideStatus() { document.getElementById('statusBanner').classList.add('hidden'); }

        document.getElementById('srcText').addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); convert(); }
        });

        updateDirUI();
        if (tg) { tg.ready(); tg.expand(); }
    </script>
</body>

</html>
