<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krill ↔ Lotin | LASHBOT AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .page-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 24px;
            position: relative;
            z-index: 1;
        }

        .page-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 52px;
            max-width: 620px;
            width: 100%;
        }

        .big-icon {
            font-size: 64px;
            display: block;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            text-align: center;
            margin-bottom: 32px;
        }

        .dir-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }

        .dir-btn {
            padding: 20px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            color: #60a5fa;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            text-align: center;
        }

        .dir-btn:hover,
        .dir-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: white;
            transform: translateY(-2px);
        }

        .dir-btn small {
            display: block;
            font-weight: 400;
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .input-area textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area textarea:focus {
            border-color: #3b82f6;
        }

        .convert-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <canvas id="particles"></canvas>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-inner">

            <a href="index.html" class="nav-logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
                        <circle cx="14" cy="14" r="14" fill="url(#lg1)" />
                        <path d="M8 14h12M14 8v12" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="lg1" x1="0" y1="0" x2="28" y2="28">
                                <stop stop-color="#3b82f6" />
                                <stop offset="1" stop-color="#1d4ed8" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span>LASHBOT <b>AI</b></span>
            </a>
            <a href="index.html" class="back-link">← Bosh sahifa</a>
        </div>
    </nav>
    <div class="page-wrap">
        <div class="page-card">
            <span class="big-icon">🔤</span>
            <h1>Krill ↔ Lotin</h1>
            <p class="subtitle">O'zbek alifbosi qoidalari asosida transliteratsiya</p>
            <div class="dir-btns">
                <div class="dir-btn active" id="k2l">
                    Кирилл → Lotin
                    <small>Кириллдан Lotinga</small>
                </div>
                <div class="dir-btn" id="l2k">
                    Lotin → Кирилл
                    <small>Lotindan Кириллга</small>
                </div>
            </div>
            <div class="input-area">
                <textarea id="srcText" placeholder="Matnni shu yerga kiriting..."></textarea>
                <button class="convert-btn" onclick="convert()">⚡ Aylantirish</button>
                <textarea id="outText" placeholder="Natija bu yerda chiqadi..." style="margin-top:16px"
                    readonly></textarea>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        let dir = 'k2l';
        document.getElementById('k2l').addEventListener('click', () => { dir = 'k2l'; document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active')); document.getElementById('k2l').classList.add('active'); });
        document.getElementById('l2k').addEventListener('click', () => { dir = 'l2k'; document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active')); document.getElementById('l2k').classList.add('active'); });

        // Krill→Lotin jadval
        const k2lMap = {
            'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'yo', 'ж': 'j', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u', 'ф': 'f', 'х': 'x', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sh', 'ъ': "'", 'ы': 'i', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya', 'қ': 'q', 'ғ': "g'", 'ҳ': 'h', 'ў': "o'", 'ҷ': 'j',
            'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D', 'Е': 'E', 'Ё': 'Yo', 'Ж': 'J', 'З': 'Z', 'И': 'I', 'Й': 'Y', 'К': 'K', 'Л': 'L', 'М': 'M', 'Н': 'N', 'О': 'O', 'П': 'P', 'Р': 'R', 'С': 'S', 'Т': 'T', 'У': 'U', 'Ф': 'F', 'Х': 'X', 'Ц': 'Ts', 'Ч': 'Ch', 'Ш': 'Sh', 'Щ': 'Sh', 'Ъ': "'", 'Ы': 'I', 'Ь': '', 'Э': 'E', 'Ю': 'Yu', 'Я': 'Ya', 'Қ': 'Q', 'Ғ': "G'", 'Ҳ': 'H', 'Ў': "O'", 'Ҷ': 'J'
        };

        function convert() {
            const src = document.getElementById('srcText').value;
            if (dir === 'k2l') {
                document.getElementById('outText').value = src.split('').map(c => k2lMap[c] || c).join('');
            } else {
                document.getElementById('outText').value = src; // placeholder
            }
        }
    </script>
</body>

</html>
