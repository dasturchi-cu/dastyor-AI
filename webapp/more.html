<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Xizmatlar | DASTYOR AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- Shared state — theme & language from localStorage -->
<script src="da-core.js"></script>
<style>
:root{--bg:#F5F4F0;--surface:#FDFCFA;--surface2:#EBE9E5;--border:#E0DDD8;--text:#252320;--text2:#6B6560;--accent:#C85A2A;--accent-soft:#F5E6DE;--green-soft:#E2F3EB;--blue-soft:#E3EEFA;--purple-soft:#EDE6F4;--shadow:0 2px 12px rgba(37,35,32,0.06);--radius:14px;--font-head:'Outfit',sans-serif;--font-body:'DM Sans',sans-serif;--tr:0.32s cubic-bezier(0.33,0,0.2,1);}
[data-theme="dark"]{--bg:#161514;--surface:#1E1D1B;--surface2:#282624;--border:#3A3835;--text:#E6E4E0;--text2:#9C9892;--accent:#E07848;--accent-soft:#3D281C;--green-soft:#1A2E22;--blue-soft:#1A2438;--purple-soft:#2A2240;--shadow:0 2px 12px rgba(0,0,0,0.25);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:var(--font-body);font-size:15px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background-color 0.4s ease,color 0.35s ease;}
::-webkit-scrollbar{display:none;}
.page{max-width:430px;margin:0 auto;padding:24px 18px 100px;}

/* Header */
.back-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.back-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background var(--tr),border-color var(--tr);text-decoration:none;color:var(--text);}
.back-btn svg{width:18px;height:18px;stroke:currentColor;}
.page-title-wrap{flex:1;}
.page-title{font-family:var(--font-head);font-size:22px;font-weight:700;line-height:1.2;}
.page-sub{font-size:13px;color:var(--text2);margin-top:2px;}

/* Section label */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin:20px 0 10px;}
.section-label:first-of-type{margin-top:0;}

/* Service cards */
.svc-list{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;}
.svc-card{display:flex;align-items:center;gap:16px;padding:16px 18px;text-decoration:none;color:var(--text);border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);transition:transform var(--tr),box-shadow var(--tr),background var(--tr),border-color var(--tr);}
.svc-card:active{transform:scale(.99);box-shadow:0 1px 6px rgba(37,35,32,0.06);}
[data-theme="dark"] .svc-card:active{box-shadow:0 1px 6px rgba(0,0,0,0.2);}
.svc-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
.i-or{background:var(--accent-soft);}
.i-gr{background:var(--green-soft);}
.i-bl{background:var(--blue-soft);}
.i-pu{background:var(--purple-soft);}
.svc-info{flex:1;min-width:0;}
.svc-title{font-family:var(--font-head);font-size:15px;font-weight:600;}
.svc-desc{font-size:12px;color:var(--text2);margin-top:2px;}
.svc-arrow{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.svc-arrow svg{width:14px;height:14px;stroke:var(--text2);}

/* Bottom nav */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:100;max-width:430px;margin:0 auto;display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 24px 20px;background:var(--surface);border-top:1px solid var(--border);transition:background var(--tr),border-color var(--tr);}
.tab-btn{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;height:52px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:10px;transition:color var(--tr);position:relative;text-decoration:none;}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;}
.tab-btn span{font-size:10px;font-weight:600;letter-spacing:.03em;}
.tab-btn.active{color:var(--accent);}
.tab-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:var(--accent);border-radius:0 0 3px 3px;}

/* Slide-in animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.page{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<div class="page">
  <!-- Header with back -->
  <div class="back-header">
    <a href="index.html" class="back-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div class="page-title-wrap">
      <div class="page-title" data-i18n="servicesTitle">Xizmatlar</div>
      <div class="page-sub"   data-i18n="servicesSub">Barcha vositalar</div>
    </div>
  </div>

  <!-- Til va Matn -->
  <div class="section-label" data-i18n="secTextLang">Til va Matn</div>
  <div class="svc-list">
    <a href="translate.html" class="svc-card">
      <div class="svc-icon i-bl">🌐</div>
      <div class="svc-info">
        <div class="svc-title" data-i18n="svc1t">Tarjima AI</div>
        <div class="svc-desc"  data-i18n="svc1d">Matn va hujjatlarni tarjima qilish</div>
      </div>
      <div class="svc-arrow"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></div>
    </a>
    <a href="translit.html" class="svc-card">
      <div class="svc-icon i-pu">🔤</div>
      <div class="svc-info">
        <div class="svc-title" data-i18n="svc2t">Krill / Lotin</div>
        <div class="svc-desc"  data-i18n="svc2d">O'zbek alifbosini o'girish</div>
      </div>
      <div class="svc-arrow"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></div>
    </a>
  </div>

  <!-- Fayl vositalari -->
  <div class="section-label" data-i18n="secFiles">Fayl vositalari</div>
  <div class="svc-list">
    <a href="ocr.html" class="svc-card">
      <div class="svc-icon i-or">🖼️</div>
      <div class="svc-info">
        <div class="svc-title" data-i18n="svc3t">Rasm → Word</div>
        <div class="svc-desc"  data-i18n="svc3d">Rasmdan matnni Word ga aylantirish</div>
      </div>
      <div class="svc-arrow"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></div>
    </a>
    <a href="img2pdf.html" class="svc-card">
      <div class="svc-icon i-gr">📎</div>
      <div class="svc-info">
        <div class="svc-title" data-i18n="svc4t">Rasm → PDF</div>
        <div class="svc-desc"  data-i18n="svc4d">Rasmlarni PDF ga birlashtirish</div>
      </div>
      <div class="svc-arrow"><svg fill="none" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></div>
    </a>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" class="tab-btn">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 21V12h6v9"/></svg>
    <span data-i18n="tabHome">Bosh sahifa</span>
  </a>
  <a href="more.html" class="tab-btn active">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span data-i18n="tabMore">Xizmatlar</span>
  </a>
</nav>

</body>
</html>
