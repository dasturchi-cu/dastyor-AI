<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Obyektivka | DASTYOR AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root[data-theme="dark"] {
            --bg: #0a1628;
            --card: #131f35;
            --border: #1e3050;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
            --inp: #0a1628;
            --green: #10b981
        }

        :root[data-theme="light"] {
            --bg: #f1f5f9;
            --card: #fff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --inp: #f8fafc;
            --green: #059669
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* ─── HEADER ─── */
        .hdr {
            height: 52px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            flex-shrink: 0
        }

        .back {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            color: var(--text);
            flex-shrink: 0
        }

        .hdr b {
            font-size: 15px;
            flex: 1
        }

        .hdr-badge {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            background: rgba(59, 130, 246, .1);
            padding: 3px 8px;
            border-radius: 20px
        }

        /* ─── TABS ─── */
        .tabs {
            display: flex;
            padding: 10px 12px;
            gap: 6px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto
        }

        .tab {
            white-space: nowrap;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            background: var(--bg);
            color: var(--muted);
            border: 1.5px solid var(--border);
            transition: .2s;
            flex-shrink: 0
        }

        .tab.on {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .tab.done {
            background: rgba(16, 185, 129, .1);
            color: var(--green);
            border-color: rgba(16, 185, 129, .3)
        }

        /* ─── TWO-PANE LAYOUT ─── */
        .body {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden
        }

        /* FORM pane */
        .form-pane {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            min-height: 0
        }

        .step-panel {
            display: none
        }

        .step-panel.on {
            display: block
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .4px
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid var(--border);
            border-radius: 11px;
            background: var(--inp);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 10px;
            transition: .2s;
            -webkit-appearance: none
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            outline: none;
            background: var(--card)
        }

        textarea {
            min-height: 68px;
            resize: vertical
        }

        .two {
            display: flex;
            gap: 8px
        }

        .two>div {
            flex: 1
        }

        .two input {
            margin-bottom: 0
        }

        /* BTNS */
        .nav-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            padding-bottom: 4px
        }

        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: .15s
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-p {
            background: var(--accent);
            color: #fff
        }

        .btn-g {
            background: var(--border);
            color: var(--muted);
            flex: 0 0 90px
        }

        /* ADD BTN */
        .add-btn {
            width: 100%;
            padding: 11px;
            border-radius: 11px;
            border: 1.5px dashed var(--accent);
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 13px
        }

        /* CHIPS LIST */
        .chip-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px
        }

        .chip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px
        }

        .chip-del {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            padding: 0 2px
        }

        /* ─── LIVE PREVIEW (divider) ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            margin-bottom: 0;
            flex-shrink: 0
        }

        .divider span {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--border)
        }

        /* PREVIEW PANE */
        .prev-pane {
            background: var(--card);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            max-height: 38vh;
            overflow-y: auto
        }

        .prev-body {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .prev-row {
            display: flex;
            gap: 8px;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            align-items: flex-start;
            font-size: 13px
        }

        .prev-row:last-child {
            border-bottom: none
        }

        .prev-lbl {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
            width: 90px;
            flex-shrink: 0;
            padding-top: 1px
        }

        .prev-val {
            color: var(--text);
            flex: 1;
            word-break: break-word
        }

        .prev-val.empty {
            color: var(--border);
            font-style: italic
        }

        .prev-section {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 6px 0 2px;
            margin-top: 2px
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="hdr">
        <div class="back" id="backBtn">←</div>
        <b>📋 Obyektivka</b>
        <span class="hdr-badge">DASTYOR AI</span>
    </div>

    <!-- STEP TABS -->
    <div class="tabs">
        <div class="tab on" onclick="go(0)">👤 Shaxsiy</div>
        <div class="tab" onclick="go(1)">📚 Ta'lim</div>
        <div class="tab" onclick="go(2)">💼 Mehnat</div>
        <div class="tab" onclick="go(3)">👨‍👩‍👧 Oila</div>
    </div>

    <div class="body">
        <!-- FORM PANE -->
        <div class="form-pane">

            <!-- STEP 0: Shaxsiy -->
            <div class="step-panel on" id="p0">
                <label>F.I.SH (To'liq)</label>
                <input id="fullname" placeholder="Aliyev Vali G'aniyevich" oninput="lp()">

                <div class="two">
                    <div><label>Tug'ilgan sanasi</label><input id="bdate" placeholder="15.05.1990" oninput="lp()"></div>
                    <div><label>Millati</label><input id="nation" placeholder="O'zbek" oninput="lp()"></div>
                </div>

                <label>Tug'ilgan joyi</label>
                <input id="bplace" placeholder="Toshkent sh., Yunusobod t." oninput="lp()">

                <label>Partiyaviyligi</label>
                <input id="party" value="Yo'q" oninput="lp()">

                <div class="nav-row">
                    <button class="btn btn-p" onclick="go(1)">Ta'lim →</button>
                </div>
            </div>

            <!-- STEP 1: Ta'lim -->
            <div class="step-panel" id="p1">
                <label>Ma'lumoti</label>
                <select id="edu" onchange="lp()">
                    <option>Oliy</option>
                    <option>O'rta maxsus</option>
                    <option>O'rta</option>
                </select>

                <label>Tamomlagan (nomi, yili, mutaxassislik)</label>
                <textarea id="grad" placeholder="2018 y., ToshDTU, Muhandis-konstruktor" oninput="lp()"></textarea>

                <label>Mutaxassisligi (diplom bo'yicha)</label>
                <input id="spec" placeholder="Muhandis" oninput="lp()">

                <div class="two">
                    <div><label>Ilmiy darajasi</label><input id="deg" value="Yo'q" oninput="lp()"></div>
                    <div><label>Ilmiy unvoni</label><input id="ttl" value="Yo'q" oninput="lp()"></div>
                </div>

                <div class="two">
                    <div><label>Harbiy unvoni</label><input id="mil" value="Yo'q" oninput="lp()"></div>
                    <div><label>Mukofotlar</label><input id="award" value="Yo'q" oninput="lp()"></div>
                </div>

                <label>Chet tillari</label>
                <input id="langs" value="Yo'q" oninput="lp()">

                <label>Deputatlik</label>
                <input id="deputy" value="Yo'q" oninput="lp()">

                <div class="nav-row">
                    <button class="btn btn-g" onclick="go(0)">←</button>
                    <button class="btn btn-p" onclick="go(2)">Mehnat →</button>
                </div>
            </div>

            <!-- STEP 2: Mehnat faoliyati -->
            <div class="step-panel" id="p2">
                <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Hozirgi ish joyini eng oxirga kiriting
                </p>
                <div class="chip-list" id="workList"></div>

                <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px"
                    id="wForm">
                    <div class="two">
                        <div><label>Dan (yil)</label><input id="wF" placeholder="2018"></div>
                        <div><label>Gacha</label><input id="wT" placeholder="2022 / h.v"></div>
                    </div>
                    <label>Korxona va lavozim</label>
                    <input id="wD" placeholder="«Toshkent Suv» korxonasi, Muhandis" style="margin-bottom:8px">
                    <button class="btn btn-p" onclick="addWork()" style="padding:10px">+ Qo'shish</button>
                </div>

                <div class="nav-row">
                    <button class="btn btn-g" onclick="go(1)">←</button>
                    <button class="btn btn-p" onclick="go(3)">Oila →</button>
                </div>
            </div>

            <!-- STEP 3: Oila -->
            <div class="step-panel" id="p3">
                <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">Ota, ona, aka, uka, opa, singil,
                    turmush o'rtog'i</p>
                <div class="chip-list" id="relList"></div>

                <div
                    style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">
                    <label>Munosabat</label>
                    <input id="rT" placeholder="Otasi / Onasi / Turmush o'rtog'i...">
                    <label>F.I.SH</label>
                    <input id="rN" placeholder="Aliyeva Mohira">
                    <div class="two">
                        <div><label>Tug'ilgan yili</label><input id="rB" placeholder="1960 y."></div>
                        <div><label>Yashash joyi</label><input id="rA" placeholder="Toshkent sh."></div>
                    </div>
                    <label>Ish joyi va lavozimi</label>
                    <input id="rJ" placeholder="«XYZ» korxonasi, Hisobchi" style="margin-bottom:8px">
                    <button class="btn btn-p" onclick="addRel()" style="padding:10px">+ Qo'shish</button>
                </div>

                <div class="nav-row">
                    <button class="btn btn-g" onclick="go(2)">←</button>
                    <button class="btn btn-p" onclick="finish()">✅ Tayyor!</button>
                </div>
            </div>

        </div><!-- /form-pane -->

        <!-- LIVE PREVIEW -->
        <div class="divider">
            <hr><span>Live Ko'rinish</span>
            <hr>
        </div>
        <div class="prev-pane">
            <div class="prev-body" id="prevBody"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        if (tg) { tg.ready(); tg.expand(); if (tg.setHeaderColor) tg.setHeaderColor(theme === 'dark' ? '#0a1628' : '#f1f5f9'); }
        const urlP = new URLSearchParams(location.search);
        const tid = urlP.get('telegram_id') || tg?.initDataUnsafe?.user?.id?.toString() || '';
        document.getElementById('backBtn').onclick = () => { location.href = 'index.html' + (tid ? '?telegram_id=' + tid : ''); };

        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.step-panel');
        let cur = 0;
        const works = [], rels = [];

        function go(n) {
            cur = n;
            tabs.forEach((t, i) => { t.classList.toggle('on', i === n); });
            panels.forEach((p, i) => { p.classList.toggle('on', i === n); });
            tg?.HapticFeedback?.impactOccurred('light');
            document.querySelector('.form-pane').scrollTop = 0;
            lp();
        }

        function v(id) { return (document.getElementById(id)?.value || '').trim(); }

        // ── ADD WORK ──
        function addWork() {
            const obj = { f: v('wF'), t: v('wT'), d: v('wD') };
            if (!obj.d) { alert('Korxona va lavozimni kiriting'); return; }
            works.push(obj);
            renderWorks(); lp();
            ['wF', 'wT', 'wD'].forEach(id => { document.getElementById(id).value = ''; });
        }
        function renderWorks() {
            document.getElementById('workList').innerHTML = works.map((w, i) =>
                `<div class="chip">
        <div><b>${w.f}–${w.t}</b><br><span style="font-size:12px;color:var(--muted)">${w.d}</span></div>
        <button class="chip-del" onclick="works.splice(${i},1);renderWorks();lp()">✕</button>
      </div>`
            ).join('');
        }

        // ── ADD REL ──
        function addRel() {
            const obj = { type: v('rT'), name: v('rN'), birth: v('rB'), addr: v('rA'), job: v('rJ') };
            if (!obj.type || !obj.name) { alert("Munosabat va ismni kiriting"); return; }
            rels.push(obj);
            renderRels(); lp();
            ['rT', 'rN', 'rB', 'rA', 'rJ'].forEach(id => { document.getElementById(id).value = ''; });
        }
        function renderRels() {
            document.getElementById('relList').innerHTML = rels.map((r, i) =>
                `<div class="chip">
        <div><b>${r.type}:</b> ${r.name}<br><span style="font-size:12px;color:var(--muted)">${r.birth} · ${r.addr}</span></div>
        <button class="chip-del" onclick="rels.splice(${i},1);renderRels();lp()">✕</button>
      </div>`
            ).join('');
        }

        // ── LIVE PREVIEW ──
        function row(lbl, val) {
            const empty = !val || val === 'Yo\'q';
            return `<div class="prev-row">
      <span class="prev-lbl">${lbl}</span>
      <span class="prev-val ${empty ? 'empty' : ''}">${val || '—'}</span>
    </div>`;
        }

        function lp() {
            let html = '';
            html += '<div class="prev-section">👤 SHAXSIY</div>';
            html += row('F.I.SH', v('fullname'));
            html += row('Tug\'ilgan', v('bdate') + (v('bplace') ? ' · ' + v('bplace') : ''));
            html += row('Millati', v('nation'));
            html += row('Partiyaviy', v('party'));

            html += '<div class="prev-section">📚 TA\'LIM</div>';
            html += row('Ma\'lumoti', v('edu'));
            html += row('Tamomlagan', v('grad'));
            html += row('Mutaxassis', v('spec'));
            html += row('Il. daraja', v('deg'));
            html += row('Il. unvon', v('ttl'));
            html += row('Harbiy', v('mil'));
            html += row('Mukofot', v('award'));
            html += row('Tillar', v('langs'));
            html += row('Deputat', v('deputy'));

            if (works.length) {
                html += '<div class="prev-section">💼 MEHNAT FAOLIYATI</div>';
                works.forEach(w => { html += row(w.f + '–' + w.t, w.d); });
            }

            if (rels.length) {
                html += '<div class="prev-section">👨‍👩‍👧 OILA A\'ZOLARI</div>';
                rels.forEach(r => { html += row(r.type, r.name + ' · ' + r.birth + (r.job ? ' · ' + r.job : '')); });
            }

            document.getElementById('prevBody').innerHTML = html;
        }

        function finish() {
            tg?.showAlert('Hujjat to\'ldirildi! Bot orqali DOCX yuklab oling: @DastyorAiBot')
                || alert('Hujjat to\'ldirildi! @DastyorAiBot');
        }

        // Init
        lp();
    </script>
</body>

</html>
