<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Obyektivka | DASTYOR AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root[data-theme="dark"] {
            --bg: #050f1e;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --accent: #2563eb;
            --input-bg: rgba(255, 255, 255, 0.02);
            --header-bg: rgba(6, 13, 31, 0.95);
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --input-bg: #f1f5f9;
            --header-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            padding-top: 60px;
            padding-bottom: 40px;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            margin-bottom: 20px;
        }

        .steps {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .step {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            transition: 0.3s;
        }

        .step.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .q-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--muted);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            margin-bottom: 16px;
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
            background: var(--card);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 16px 24px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }

        .btn-p {
            background: var(--accent);
            color: white;
        }

        .btn-g {
            background: var(--input-bg);
            color: var(--muted);
        }

        /* PREVIEW */
        .preview-box {
            background: #525659;
            border-radius: 20px;
            padding: 40px 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .preview {
            width: 210mm;
            min-height: 297mm;
            background: white;
            color: black;
            padding: 20mm 15mm;
            transform-origin: top center;
            font-family: "Times New Roman", serif;
            font-size: 12pt;
        }

        .rel-item {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media(max-width: 600px) {
            .wrap {
                padding: 10px;
            }

            .panel {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="index.html" class="back-btn" id="backBtn">←</a>
        <span style="font-weight: 800;" id="txt_top">📋 Obyektivka Tayyorlash</span>
    </div>

    <div class="wrap">
        <div class="panel">
            <div class="steps">
                <div class="step active" id="s1"></div>
                <div class="step" id="s2"></div>
                <div class="step" id="s3"></div>
            </div>

            <!-- STEP 1: Shaxsiy -->
            <div id="step1_ui">
                <div class="q-title" id="txt_s1_q">Shaxsiy ma'lumotlar</div>
                <label id="lbl_name">F.I.SH (Famililiya, Ism, Sharif)</label>
                <input type="text" id="fullname" placeholder="Aliyev Vali G'aniyevich">

                <label id="lbl_birth">Tug'ilgan yili va joyi</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="birth" placeholder="1995" style="width: 80px;">
                    <input type="text" id="place" placeholder="Toshkent viloyati, Parkent tumani">
                </div>

                <label id="lbl_nation">Millati</label>
                <input type="text" id="nation" placeholder="O'zbek">

                <div class="btn-row">
                    <button class="btn btn-p" onclick="nextStep(2)" id="txt_next">Davom etish →</button>
                </div>
            </div>

            <!-- STEP 2: Ma'lumoti -->
            <div id="step2_ui" style="display: none;">
                <div class="q-title" id="txt_s2_q">Ma'lumoti va Ish joyi</div>
                <label id="lbl_edu">Ma'lumoti</label>
                <select id="edu">
                    <option value="Oliy">Oliy</option>
                    <option value="O'rta maxsus">O'rta maxsus</option>
                    <option value="O'rta">O'rta</option>
                </select>

                <label id="lbl_grad">Tamomlagan (Qayerda, qachon)</label>
                <textarea id="graduated" rows="3"
                    placeholder="2018-yil, Toshkent Davlat Axborot Texnologiyalari Universiteti"></textarea>

                <label id="lbl_job">Hozirgi ish joyi va lavozimi</label>
                <input type="text" id="current_job" placeholder="... korxona muhandisi">

                <div class="btn-row">
                    <button class="btn btn-g" onclick="nextStep(1)">&larr; Orqaga</button>
                    <button class="btn btn-p" onclick="nextStep(3)" id="txt_next2">Davom etish →</button>
                </div>
            </div>

            <!-- STEP 3: Qarindoshlar -->
            <div id="step3_ui" style="display: none;">
                <div class="q-title" id="txt_s3_q">Yaqin qarindoshlar</div>
                <div id="rel_list"></div>

                <div id="rel_form"
                    style="background: var(--input-bg); padding: 12px; border-radius: 12px; margin-bottom: 12px;">
                    <input type="text" id="rel_type" placeholder="Otasi, Onasi...">
                    <input type="text" id="rel_name" placeholder="Ism sharifi">
                    <button class="btn btn-p" style="padding: 10px;" onclick="addRel()" id="txt_add">Qo'shish</button>
                </div>

                <div class="btn-row">
                    <button class="btn btn-g" onclick="nextStep(2)">&larr; Orqaga</button>
                    <button class="btn btn-p" onclick="finish()" id="txt_finish">Yakunlash</button>
                </div>
            </div>
        </div>

        <!-- PREVIEW PANEL -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 16px; align-items: center;">
                <b id="txt_prev">Hujjat namunasi</b>
                <button class="btn btn-p" style="max-width: 120px; padding: 10px;" onclick="savePDF()">PDF</button>
            </div>
            <div class="preview-box">
                <div class="preview" id="preview">
                    <center>
                        <h2 id="txt_type">MA'LUMOTNOMA</h2>
                    </center>
                    <center>
                        <h3 id="p_name" style="margin-top: 10px; text-transform: uppercase;">FAMILIYA ISM SHARIF</h3>
                    </center>
                    <p style="text-align: center; margin-bottom: 20px;" id="p_job"></p>

                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <tr>
                            <td width="50%"><b>Tug'ilgan yili:</b> <span id="p_birth"></span></td>
                            <td width="50%"><b>Millati:</b> <span id="p_nation"></span></td>
                        </tr>
                        <tr>
                            <td><b>Tug'ilgan joyi:</b> <span id="p_place"></span></td>
                            <td><b>Ma'lumoti:</b> <span id="p_edu"></span></td>
                        </tr>
                    </table>

                    <p style="margin-top: 15px;"><b>Tamomlagan:</b> <span id="p_grad"></span></p>

                    <h4 style="text-align:center; margin-top: 30px; border-top: 1px solid #000; padding-top: 10px;"
                        id="txt_rel_l">YAQIN QARINDOSHLARI HAQIDA MA'LUMOT</h4>
                    <table
                        style="width: 100%; border: 1px solid #000; border-collapse: collapse; margin-top: 10px; font-size: 10pt;"
                        id="p_rel_table">
                        <thead>
                            <tr style="background: #eee;">
                                <th style="border: 1px solid #000; padding: 4px;" id="th_type">Qarindoshligi</th>
                                <th style="border: 1px solid #000; padding: 4px;" id="th_name">Ismi</th>
                                <th style="border: 1px solid #000; padding: 4px;" id="th_job">Ish joyi</th>
                            </tr>
                        </thead>
                        <tbody id="p_rel_body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        let telegramId = '';
        let currentLang = localStorage.getItem('lang') || 'uz';
        let currentTheme = localStorage.getItem('theme') || 'dark';

        const i18n = {
            uz: {
                top: "📋 Obyektivka Tayyorlash",
                s1_q: "Shaxsiy ma'lumotlar",
                s2_q: "Ma'lumoti va Ish joyi",
                s3_q: "Yaqin qarindoshlar",
                lbl_name: "F.I.SH (To'liq)",
                lbl_birth: "Tug'ilgan yili va joyi",
                lbl_nation: "Millati",
                lbl_edu: "Ma'lumoti",
                lbl_grad: "Tamomlagan (Qayerda, qachon)",
                lbl_job: "Hozirgi ish joyi",
                next: "Davom etish →",
                add: "Qo'shish",
                finish: "Yakunlash",
                prev: "Hujjat namunasi",
                type: "MA'LUMOTNOMA",
                rel_l: "YAQIN QARINDOSHLARI HAQIDA MA'LUMOT",
                th_type: "Qarindoshligi",
                th_name: "Ismi",
                th_job: "Ish joyi"
            },
            en: {
                top: "📋 Obyektivka AI",
                s1_q: "Personal Information",
                s2_q: "Education & Career",
                s3_q: "Relative Information",
                lbl_name: "Full Name",
                lbl_birth: "Date and Place of Birth",
                lbl_nation: "Nationality",
                lbl_edu: "Education Level",
                lbl_grad: "Graduated (Where, When)",
                lbl_job: "Current Job Position",
                next: "Continue →",
                add: "Add",
                finish: "Finish",
                prev: "Document Preview",
                type: "O'ZBEKISTON RESPUBLIKASI MA'LUMOTNOMASI",
                rel_l: "LIST OF CLOSE RELATIVES",
                th_type: "Relation",
                th_name: "Name",
                th_job: "Current Job"
            }
        };

        let relatives = [];

        function init() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateUI();
            setupAuth();

            // Auto fit preview
            const scale = (document.querySelector('.preview-box').offsetWidth / 840) * 0.95;
            document.getElementById('preview').style.transform = `scale(${Math.min(scale, 1)})`;
        }

        function updateUI() {
            const strings = i18n[currentLang];
            document.getElementById('txt_top').textContent = strings.top;
            document.getElementById('txt_s1_q').textContent = strings.s1_q;
            document.getElementById('txt_s2_q').textContent = strings.s2_q;
            document.getElementById('txt_s3_q').textContent = strings.s3_q;
            document.getElementById('lbl_name').textContent = strings.lbl_name;
            document.getElementById('lbl_birth').textContent = strings.lbl_birth;
            document.getElementById('lbl_nation').textContent = strings.lbl_nation;
            document.getElementById('lbl_edu').textContent = strings.lbl_edu;
            document.getElementById('lbl_grad').textContent = strings.lbl_grad;
            document.getElementById('lbl_job').textContent = strings.lbl_job;
            document.getElementById('txt_next').textContent = strings.next;
            document.getElementById('txt_next2').textContent = strings.next;
            document.getElementById('txt_add').textContent = strings.add;
            document.getElementById('txt_finish').textContent = strings.finish;
            document.getElementById('txt_prev').textContent = strings.prev;
            document.getElementById('txt_type').textContent = strings.type;
            document.getElementById('txt_rel_l').textContent = strings.rel_l;
            document.getElementById('th_type').textContent = strings.th_type;
            document.getElementById('th_name').textContent = strings.th_name;
            document.getElementById('th_job').textContent = strings.th_job;

            if (tg) tg.headerColor = currentTheme === 'dark' ? '#050f1e' : '#f8fafc';
        }

        function setupAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            telegramId = urlParams.get('telegram_id') || (tg?.initDataUnsafe?.user?.id.toString());
            document.getElementById('backBtn').onclick = (e) => {
                e.preventDefault();
                window.location.href = `index.html?telegram_id=${telegramId}`;
            };
        }

        function nextStep(step) {
            document.querySelectorAll('[id$="_ui"]').forEach(el => el.style.display = 'none');
            document.getElementById(`step${step}_ui`).style.display = 'block';
            document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i < step));
            updateLivePreview();
            tg?.HapticFeedback?.impactOccurred('light');
        }

        function updateLivePreview() {
            document.getElementById('p_name').textContent = (document.getElementById('fullname').value || 'FAMILIYA ISM SHARIF').toUpperCase();
            document.getElementById('p_birth').textContent = document.getElementById('birth').value;
            document.getElementById('p_place').textContent = document.getElementById('place').value;
            document.getElementById('p_nation').textContent = document.getElementById('nation').value;
            document.getElementById('p_edu').textContent = document.getElementById('edu').value;
            document.getElementById('p_grad').textContent = document.getElementById('graduated').value;
            document.getElementById('p_job').textContent = document.getElementById('current_job').value;

            const tbody = document.getElementById('p_rel_body');
            tbody.innerHTML = '';
            relatives.forEach(r => {
                tbody.innerHTML += `<tr><td style="border:1px solid #000;padding:4px;">${r.type}</td><td style="border:1px solid #000;padding:4px;">${r.name}</td><td style="border:1px solid #000;padding:4px;">${r.job || '-'}</td></tr>`;
            });
        }

        function addRel() {
            const type = document.getElementById('rel_type').value;
            const name = document.getElementById('rel_name').value;
            if (!type || !name) return;
            relatives.push({ type, name });
            document.getElementById('rel_name').value = '';
            renderRelList();
            updateLivePreview();
        }

        function renderRelList() {
            const list = document.getElementById('rel_list');
            list.innerHTML = '';
            relatives.forEach((r, i) => {
                list.innerHTML += `<div class="rel-item"><span>${r.type}: ${r.name}</span><button onclick="relatives.splice(${i},1);renderRelList();updateLivePreview();">✕</button></div>`;
            });
        }

        function finish() {
            tg?.showAlert(currentLang === 'uz' ? "Hujjat tayyor! PDF tugmasini bosing." : "Document ready! Click PDF button.");
        }

        function savePDF() {
            const strings = i18n[currentLang];
            const opt = { margin: 0, filename: 'Obyektivka.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            const element = document.getElementById('preview');
            // logic to use html2pdf or similar
            tg?.showConfirm(strings.finish);
        }

        init();
        document.querySelectorAll('input, select, textarea').forEach(el => el.oninput = updateLivePreview);
    </script>
</body>

</html>
