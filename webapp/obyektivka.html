<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Obyektivka Builder | DASTYOR AI</title>
    <!-- 1. Theme init FIRST — prevents flash of wrong theme -->
    <script src="theme-init.js"></script>
    <!-- 2. Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <!-- 3. Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 4. Global theme tokens -->
    <link rel="stylesheet" href="theme.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            blue: '#0A84FF',
                            green: '#30D158',
                            orange: '#FF9F0A',
                            purple: '#BF5AF2',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            overscroll-behavior-y: none;
        }

        /* Custom scrollbars for editor */
        .scroller::-webkit-scrollbar {
            width: 5px;
        }

        .scroller::-webkit-scrollbar-thumb {
            background: rgba(150, 150, 150, 0.3);
            border-radius: 4px;
        }

        /* A4 Paper Canvas - strict isolated CSS */
        .cv-canvas-wrapper {
            position: relative;
            transform-origin: top center;
            transition: transform 0.1s ease;
        }

        .tpl-oby {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            color: #000;
            padding: 20mm 15mm 20mm 20mm;
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.25;
            font-size: 11pt;
            margin-bottom: 30px;
        }

        .tpl-oby strong {
            font-weight: bold;
        }

        .tpl-oby .title {
            text-align: center;
            font-size: 16pt;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .tpl-oby .header-table {
            width: 100%;
            margin-bottom: 15px;
            border-collapse: collapse;
        }

        .tpl-oby .header-table td {
            vertical-align: top;
        }

        .tpl-oby .col-main {
            text-align: center;
            vertical-align: middle;
            padding-right: 15mm;
        }

        .tpl-oby .name {
            font-size: 16pt;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .tpl-oby .col-img {
            width: 35mm;
            text-align: right;
        }

        .tpl-oby .avatar {
            width: 30mm;
            height: 40mm;
            object-fit: cover;
            border: 1px solid #aaa;
            display: inline-block;
        }

        .tpl-oby .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
            margin-bottom: 25px;
            font-size: 11.5pt;
        }

        .tpl-oby .info-item strong {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            font-size: 10.5pt;
        }

        .tpl-oby .section-title {
            text-align: center;
            font-weight: bold;
            font-size: 12.5pt;
            margin-top: 25px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tpl-oby .exp-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 11pt;
        }

        .tpl-oby .exp-table td {
            padding: 6px 0;
            vertical-align: top;
        }

        .tpl-oby .exp-table td:first-child {
            width: 28%;
            padding-right: 10px;
        }

        .tpl-oby .rel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10pt;
            text-align: center;
        }

        .tpl-oby .rel-table th,
        .tpl-oby .rel-table td {
            border: 1px solid #000;
            padding: 6px 4px;
            vertical-align: middle;
        }

        .tpl-oby .rel-table th {
            font-weight: bold;
            font-size: 9.5pt;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #cv-box,
            #cv-box * {
                visibility: visible;
            }

            #cv-box {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                min-height: 297mm;
                transform: none !important;
                box-shadow: none !important;
                margin: 0;
                padding: 0;
            }
        }
    </style>

    <!-- DASTYOR AI SDK (must load before page script) -->
    <script src="i18n.js"></script>
    <script src="app.js"></script>
</head>

<body
    class="text-neutral-900 dark:text-neutral-100 flex flex-col h-screen overflow-hidden antialiased selection:bg-apple-blue selection:text-white">

    <!-- Global Header -->
    <header class="builder-header h-16 flex-shrink-0 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-3">
            <a href="index.html"
                class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </a>
            <h1 class="font-display font-bold text-lg tracking-tight">Obyektivka AI</h1>
        </div>
        <div class="flex items-center gap-2">
            <!-- Mobile Toggle -->
            <button id="mobileViewToggle" onclick="toggleMobileView()"
                class="md:hidden px-4 py-2 bg-black/5 dark:bg-white/10 rounded-xl font-semibold text-sm">
                👁️ Preview
            </button>
            <button onclick="exportWord()"
                class="flex items-center gap-2 px-4 py-2 bg-gradient-to-br from-apple-blue to-[#0055cc] hover:opacity-90 active:scale-95 text-white rounded-xl font-bold text-sm transition-all shadow-md"
                id="btnWord">
                📄 Word yuklab olish
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- EDITOR PANE -->
        <div id="editorPane"
            class="w-full md:w-[45%] md:max-w-md h-full scroller overflow-y-auto bg-white dark:bg-[#0a0a0c] border-r border-black/5 dark:border-white/5 pb-20">

            <div class="p-6">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-8 h-8 rounded-lg bg-apple-blue/10 flex items-center justify-center text-apple-blue">👤
                    </div>
                    <h2
                        class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50">
                        Shaxsiy</h2>
                </div>

                <!-- Photo Upload -->
                <div
                    class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-black/10 dark:border-white/10 rounded-[24px] mb-6 hover:bg-black/5 dark:hover:bg-white/5 transition-colors group">
                    <div id="photoPrev"
                        class="w-[30mm] h-[40mm] bg-black/5 dark:bg-white/10 rounded-md overflow-hidden flex items-center justify-center mb-3">
                        <svg class="w-8 h-8 text-black/20 dark:text-white/20 group-hover:scale-110 transition-transform"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Zm0 0V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4M8 13h.01M16 13h.01M12 16h.01" />
                        </svg>
                    </div>
                    <div>
                        <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleImage(this)">
                        <button
                            class="px-3 py-1.5 bg-apple-blue/10 text-apple-blue font-semibold text-xs rounded-full hover:bg-apple-blue/20 transition-colors"
                            onclick="document.getElementById('imgInput').click()" data-i18n="cv_upload_img">Rasm
                            yuklash</button>
                        <p class="text-[10px] text-black/40 dark:text-white/40 mt-1" data-i18n="cv_rec_img">3x4
                            o'lchamdagi rasmiy tasvir</p>
                    </div>
                </div>

                <!-- Fields -->
                <div class="space-y-6">
                    <div>
                        <label
                            class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"

                            placeholder="Alisherov Yusuf Muratovich" data-i18n="ph_obv_name"

                    <div class="flex gap-3">
                        <div class="flex-1">

                            <input type="text" id="f_birth"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"

                        </div>
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_birthplace">Tug'ilgan
                                joyi</label>
                            <input type="text" id="f_place"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="Toshkent viloyati" data-i18n="ph_obv_place" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_nation">Millati</label>
                            <input type="text" id="f_nation"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="o'zbek" data-i18n="ph_obv_nation" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_party">Partiyaviyligi</label>
                            <input type="text" id="f_party"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="yo'q" data-i18n="ph_obv_party" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_education">Ma'lumoti</label>
                            <input type="text" id="f_edu"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="oliy" data-i18n="ph_obv_edu" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_graduated">Tamomlagan</label>
                            <input type="text" id="f_grad"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="2015, TDYU" data-i18n="ph_obv_grad" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                    </div>

                    <div>
                        <label
                            class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                            data-i18n="obv_specialty">Mutaxassisligi</label>
                        <input type="text" id="f_spec"
                            class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                            placeholder="huquqshunos" data-i18n="ph_obv_spec" data-i18n-attr="placeholder"
                            oninput="updateCV()">
                    </div>

                    <div class="flex gap-3">
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_degree">Ilmiy
                                darajasi</label>
                            <input type="text" id="f_degree"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="yo'q" data-i18n="ph_obv_degree" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                        <div class="flex-1">
                            <label
                                class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                                data-i18n="obv_title">Ilmiy
                                unvoni</label>
                            <input type="text" id="f_title"
                                class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                                placeholder="yo'q" data-i18n="ph_obv_title" data-i18n-attr="placeholder"
                                oninput="updateCV()">
                        </div>
                    </div>

                    <div>
                        <label
                            class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                            data-i18n="obv_languages">Tillar</label>
                        <input type="text" id="f_langs"
                            class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                            placeholder="rus va ingliz tillari" data-i18n="ph_obv_langs" data-i18n-attr="placeholder"
                            oninput="updateCV()">
                    </div>

                    <div>
                        <label
                            class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                            data-i18n="obv_awards">Mukofotlar</label>
                        <input type="text" id="f_awards"
                            class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"

                            oninput="updateCV()">
                    </div>

                    <div>
                        <label
                            class="block text-[13px] font-bold text-black/50 dark:text-white/50 mb-2 ml-1 uppercase tracking-wide"
                            data-i18n="obv_deputy">Deputatlik
                            statusi</label>
                        <input type="text" id="f_deputy"
                            class="w-full bg-black/5 dark:bg-white/5 focus:bg-apple-blue/5 border border-transparent focus:border-apple-blue/50 rounded-2xl px-5 py-4 text-base outline-none transition-all"
                            placeholder="yo'q" data-i18n="ph_obv_deputy" data-i18n-attr="placeholder"
                            oninput="updateCV()">
                    </div>
                </div>

                <!-- Divider -->
                <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

                <div class="p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <div
                            class="w-8 h-8 rounded-lg bg-apple-purple/10 flex items-center justify-center text-apple-purple">
                            🧑‍💼</div>
                        <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50"
                            data-i18n="obv_work">
                            Mehnat Faoliyati</h2>
                    </div>

                    <div id="expList" class="space-y-3 mb-3"></div>
                    <button onclick="addExp()"
                        class="w-full py-3 border border-dashed border-apple-purple/50 text-apple-purple bg-apple-purple/5 rounded-xl font-bold text-sm hover:bg-apple-purple/10 transition-colors"
                        data-i18n="obv_add_work">+
                        Ish joyi qo'shish</button>
                </div>

                <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

                <div class="p-6">
                    <div class="flex items-center gap-2 mb-6">
                        <div
                            class="w-8 h-8 rounded-lg bg-apple-orange/10 flex items-center justify-center text-apple-orange">
                            👨‍👩‍👧</div>
                        <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50"
                            data-i18n="obv_relatives">
                            Yaqin Qarindoshlari</h2>
                    </div>

                    <div id="relList" class="space-y-3 mb-3"></div>
                    <button onclick="addRel()"
                        class="w-full py-3 border border-dashed border-apple-orange/50 text-apple-orange bg-apple-orange/5 rounded-xl font-bold text-sm hover:bg-apple-orange/10 transition-colors"
                        data-i18n="obv_add_rel">+
                        Qarindosh qo'shish</button>

            </div>

        </div>

        <!-- PREVIEW PANE — OUTSIDE editorPane, flex-1 takes remaining width -->
        <div id="previewPane"
            class="hidden md:flex flex-1 h-full bg-[#1c1c1e] items-start justify-center p-8 scroller overflow-y-auto">
            <div class="cv-canvas-wrapper" id="previewScaleWrapper">
                <div class="tpl-oby" id="cv-box">
                    <!-- HTML generated live here -->
                </div>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram?.WebApp;

        let avatarUrl = '';
        let experiences = [{ id: 1, years: '2015-2020 yy.', desc: "Toshkent shahri Yunusobod tumani hokimi o'rinbosari" }];
        let relatives = [{ id: 1, role: 'Otasi', name: 'Alisherov Muratjon', birth: '1965 yil, Toshkent viloyati', work: "Nafaqada", addr: "Toshkent shahri, Yunusobod tumani, 3-kvartal, 12-uy" }];

        // View Toggle for mobile
        let mobilePreview = false;
        function toggleMobileView() {
            mobilePreview = !mobilePreview;
            const ed = document.getElementById('editorPane');
            const pv = document.getElementById('previewPane');
            const btn = document.getElementById('mobileViewToggle');

            if (mobilePreview) {
                ed.classList.add('hidden');
                pv.classList.remove('hidden');
                pv.classList.add('flex', 'w-full', 'px-2', 'py-4'); // mobile specific padding
                btn.innerHTML = I18n.t('cv_btn_edit') || '✍️ Tahrirlash';
                setTimeout(autoScale, 50);
            } else {
                ed.classList.remove('hidden');
                pv.classList.add('hidden');
                pv.classList.remove('flex', 'w-full', 'px-2', 'py-4');
                btn.innerHTML = I18n.t('cv_btn_preview') || '👁️ Preview';
            }
        }

        window.addEventListener('i18n:change', () => {
            renderExp();
            renderRel();
            updateCV();
        });

        // Image Handling via FileReader
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    avatarUrl = e.target.result;
                    document.getElementById('photoPrev').innerHTML = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;
                    updateCV();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Repeaters Builder
        function addExp() { experiences.push({ id: Date.now(), years: '', desc: '' }); renderExp(); updateCV(); }
        function removeExp(id) { experiences = experiences.filter(x => x.id !== id); renderExp(); updateCV(); }
        function renderExp() {
            const ph_years = (I18n.t('ph_obv_years') || "Yillar (2018-2023 yy.)").replace(/<br>/g, ' ');
            const ph_work = (I18n.t('ph_obv_workdesc') || "Ish joyi va lavozimi").replace(/<br>/g, ' ');

            document.getElementById('expList').innerHTML = experiences.map((ex, i) => `
                <div class="bg-black/5 dark:bg-white/5 p-4 rounded-2xl relative group">
                    <button class="absolute top-2 right-2 w-6 h-6 bg-red-500/10 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="removeExp(${ex.id})">×</button>
                    <input type="text" class="w-full bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-4 py-3 text-base outline-none mb-3 focus:border-apple-purple" placeholder="${ph_years}" value="${ex.years}" oninput="experiences[${i}].years=this.value; updateCV()">
                    <textarea class="w-full bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-4 py-3 text-base outline-none focus:border-apple-purple resize-none h-24" placeholder="${ph_work}" oninput="experiences[${i}].desc=this.value; updateCV()">${ex.desc}</textarea>
                </div>
            `).join('');
        }

        function addRel() { relatives.push({ id: Date.now(), role: '', name: '', birth: '', work: '', addr: '' }); renderRel(); updateCV(); }
        function removeRel(id) { relatives = relatives.filter(x => x.id !== id); renderRel(); updateCV(); }
        function renderRel() {
            const ph_role = (I18n.t('obv_rel_role') || "Qarindoshligi").replace(/<br>/g, ' ');
            const ph_name = (I18n.t('obv_rel_name') || "F.I.SH").replace(/<br>/g, ' ');
            const ph_birth = (I18n.t('obv_rel_birth') || "Tug'ilgan yili/joyi").replace(/<br>/g, ' ');
            const ph_work = (I18n.t('obv_rel_work') || "Ish joyi va lavozimi").replace(/<br>/g, ' ');
            const ph_addr = (I18n.t('obv_rel_addr') || "Yashash manzili").replace(/<br>/g, ' ');

            document.getElementById('relList').innerHTML = relatives.map((r, i) => `
                <div class="bg-black/5 dark:bg-white/5 p-4 rounded-2xl relative group">
                    <button class="absolute top-2 right-2 w-6 h-6 bg-red-500/10 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="removeRel(${r.id})">×</button>
                    <div class="flex gap-3 mb-3">
                        <input type="text" class="w-1/3 bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-3 py-3 text-base outline-none focus:border-apple-orange" placeholder="${ph_role}" value="${r.role}" oninput="relatives[${i}].role=this.value; updateCV()">
                        <input type="text" class="w-2/3 bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-3 py-3 text-base outline-none focus:border-apple-orange" placeholder="${ph_name}" value="${r.name}" oninput="relatives[${i}].name=this.value; updateCV()">
                    </div>
                    <input type="text" class="w-full bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-3 py-3 text-base outline-none mb-3 focus:border-apple-orange" placeholder="${ph_birth}" value="${r.birth}" oninput="relatives[${i}].birth=this.value; updateCV()">
                    <input type="text" class="w-full bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-3 py-3 text-base outline-none mb-3 focus:border-apple-orange" placeholder="${ph_work}" value="${r.work}" oninput="relatives[${i}].work=this.value; updateCV()">
                    <input type="text" class="w-full bg-black/5 dark:bg-white/5 border border-transparent rounded-xl px-3 py-3 text-base outline-none mb-3 focus:border-apple-orange font-medium" placeholder="${ph_addr}" value="${r.addr}" oninput="relatives[${i}].addr=this.value; updateCV()">
                </div>
            `).join('');
        }

        renderExp();
        renderRel();

        // ── LIVE ENGINE ──
        function v(id) { return document.getElementById(id).value.trim(); }

        function updateCV() {
            const vT = (id, key) => v(id) || (I18n.t(key) || '').split(' (')[0];
            const vR = (id, def) => v(id) || def;

            const defaultName = vR('f_name', I18n.t('ph_obv_name') || 'ALISHEROV YUSUF MURATOVICH').split(' (')[0];
            const notData = I18n.t('ph_obv_party') || "yo'q";

            const data = {
                name: defaultName,
                birth: vT('f_birth', 'ph_obv_birth'),
                place: vT('f_place', 'ph_obv_place'),
                nation: vT('f_nation', 'ph_obv_nation'),
                party: vR('f_party', notData),
                edu: vT('f_edu', 'ph_obv_edu'),
                grad: vT('f_grad', 'ph_obv_grad'),
                spec: vT('f_spec', 'ph_obv_spec'),
                degree: vR('f_degree', notData),
                title: vR('f_title', notData),
                langs: vT('f_langs', 'ph_obv_langs'),
                awards: vR('f_awards', notData),
                deputy: vR('f_deputy', notData),
                exp: experiences.filter(e => e.years || e.desc),
                rel: relatives.filter(e => e.role || e.name)
            };

            const box = document.getElementById('cv-box');

            const expHtml = data.exp.length > 0 ?
                `<table class="exp-table"><thead><tr><th style="width:28%;font-weight:bold">Yillar</th><th style="font-weight:bold">Ish joyi va lavozimi</th></tr></thead><tbody>` + data.exp.map(e => `
                    <tr>
                        <td>${e.years}</td>
                        <td>- ${e.desc}</td>
                    </tr>
                `).join('') + `</tbody></table>` : `<div style="text-align:center; font-style:italic">${I18n.t('obv_no_data')}</div>`;

            const relHtml = data.rel.length > 0 ?
                `<table class="rel-table">
                    <tr>
                        <th style="width:12%">${I18n.t('obv_rel_role')}</th>
                        <th style="width:23%">${I18n.t('obv_rel_name')}</th>
                        <th style="width:20%">${I18n.t('obv_rel_birth')}</th>
                        <th style="width:25%">${I18n.t('obv_rel_work')}</th>
                        <th style="width:20%">${I18n.t('obv_rel_addr')}</th>
                    </tr>` +
                data.rel.map(r => `
                    <tr>
                        <td>${r.role}</td>
                        <td>${r.name}</td>
                        <td>${r.birth}</td>
                        <td>${r.work}</td>
                        <td>${r.addr}</td>
                    </tr>
                `).join('') + `</table>` : `<div style="text-align:center; font-style:italic">${I18n.t('obv_no_data')}</div>`;

            let imgHtml = avatarUrl ? `<img src="${avatarUrl}" class="avatar">` : `<div style="width:30mm;height:40mm;border:1px solid #000;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:10pt;">4x6</div>`;

            box.innerHTML = `
                <div class="title">${I18n.t('obv_main_title')}</div>
                
                <table class="header-table">
                    <tr>
                        <td class="col-main">
                            <div class="name">${data.name.replace(/ /g, '<br>')}</div>
                        </td>
                        <td class="col-img">
                            ${imgHtml}
                        </td>
                    </tr>
                </table>

                <div class="info-grid">
                    <div class="info-item"><strong>${I18n.t('obv_info_birth')}</strong>${data.birth}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_place')}</strong>${data.place}</div>
                    
                    <div class="info-item"><strong>${I18n.t('obv_info_nation')}</strong>${data.nation}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_party')}</strong>${data.party}</div>
                    
                    <div class="info-item"><strong>${I18n.t('obv_info_edu')}</strong>${data.edu}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_grad')}</strong>${data.grad}</div>
                    
                    <div class="info-item"><strong>${I18n.t('obv_info_spec')}</strong>${data.spec}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_degree')}</strong>${data.degree}</div>
                    
                    <div class="info-item"><strong>${I18n.t('obv_info_title')}</strong>${data.title}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_langs')}</strong>${data.langs}</div>
                    
                    <div class="info-item"><strong>${I18n.t('obv_info_awards')}</strong>${data.awards}</div>
                    <div class="info-item"><strong>${I18n.t('obv_info_deputy')}</strong>${data.deputy}</div>
                </div>

                <div class="section-title">${I18n.t('obv_exp_title')}</div>
                ${expHtml}

                <div class="section-title">${data.name.split(' ')[0]}${I18n.t('obv_rel_title')}</div>
                ${relHtml}
            `;

            autoScale();
        }

        // Auto scaler logic to fit exact A4 into frame
        function autoScale() {
            const wrap = document.getElementById('previewScaleWrapper');
            const pane = document.getElementById('previewPane');
            if (pane.classList.contains('hidden')) return;

            // pane inner usable space
            let pw = pane.clientWidth;
            if (!mobilePreview) pw -= 64; // desktop padding offset

            // Standard A4 is approx 793px width
            const natW = 793;
            const scale = Math.min(pw / natW, 1.2);

            wrap.style.transform = `scale(${scale})`;

            // Fix height cutoff if scaled down severely on mobile
            if (mobilePreview) {
                wrap.style.marginBottom = `-${(1 - scale) * 1122}px`;
            } else {
                wrap.style.marginBottom = '0';
            }
        }
        window.addEventListener('resize', autoScale);

        // Initial setup
        setTimeout(() => {
            if (document.documentElement.classList.contains('dark')) {
                if (tg?.setHeaderColor) tg.setHeaderColor('#0a0a0c');
            }

            // Fetch AI extracted data
            const tid = DastyorAI.getTelegramId();
            const isAutoload = new URLSearchParams(location.search).get('autoload');

            if (tid && isAutoload) {
                fetch(DastyorAI.BASE + '/api/get_oby_data?telegram_id=' + tid)
                    .then(r => r.json())
                    .then(res => {
                        if (res.ok && res.data) {
                            const d = res.data;
                            document.getElementById('f_name').value = d.fullname || '';
                            document.getElementById('f_birth').value = d.birthdate || '';
                            document.getElementById('f_place').value = d.birthplace || '';
                            document.getElementById('f_nation').value = d.nation || '';
                            document.getElementById('f_party').value = d.party || '';
                            document.getElementById('f_edu').value = d.education || '';
                            document.getElementById('f_grad').value = d.graduated || '';
                            document.getElementById('f_spec').value = d.specialty || '';
                            document.getElementById('f_degree').value = d.degree || '';
                            document.getElementById('f_title').value = d.scientific_title || '';
                            document.getElementById('f_langs').value = d.languages || '';
                            document.getElementById('f_awards').value = d.awards || '';
                            document.getElementById('f_deputy').value = d.deputy || '';

                            if (d.work_experience && Array.isArray(d.work_experience) && d.work_experience.length > 0) {
                                experiences = d.work_experience.map((e, i) => ({
                                    id: Date.now() + i,
                                    years: e.year || '',
                                    desc: e.position || ''
                                }));
                            } else { experiences = []; }
                            renderExp();

                            if (d.relatives && Array.isArray(d.relatives) && d.relatives.length > 0) {
                                relatives = d.relatives.map((r, i) => ({
                                    id: Date.now() + i,
                                    role: r.degree || '',
                                    name: r.fullname || '',
                                    birth: r.birth_year_place || '',
                                    work: r.work_place || '',
                                    addr: r.address || ''
                                }));
                            } else { relatives = []; }
                            renderRel();

                            updateCV();
                            if (tg?.showAlert) tg.showAlert("Ma'lumotlar AI orqali kiritildi. O'zgartirishingiz va yuklab olishingiz mumkin!");
                        } else {
                            updateCV();
                        }
                    }).catch(() => updateCV());
            } else {
                updateCV();
            }
        }, 100);

        function uploadToTelegram(blob, filename) {
            const tgId = DastyorAI.getTelegramId();
            if (!tgId) return;
            const formData = new FormData();
            formData.append('file', blob, filename);
            formData.append('telegram_id', tgId);
            if (DastyorAI.getToken()) formData.append('token', DastyorAI.getToken());
            fetch(DastyorAI.BASE + '/api/upload_to_telegram', { method: 'POST', body: formData })
                .catch(err => console.error("Tg upload err:", err));
        }

        function _showTelegramToast(msg) {
            let t = document.getElementById('_tg_toast');
            if (!t) {
                t = document.createElement('div');
                t.id = '_tg_toast';
                t.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%);'
                    + 'background:#30D158;color:#fff;font-weight:700;font-size:13px;padding:10px 20px;'
                    + 'border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;'
                    + 'white-space:nowrap;transition:opacity .4s ease';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(t._hideTimer);
            t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 4000);
        }


        // ── _collectObyData() — forma ma'lumotlarini to'playdi ────
        function _collectObyData(format) {
            const get = id => (document.getElementById(id)?.value || '').trim();
            return {
                format: format,
                lang: I18n.getLang(),
                telegram_id: DastyorAI.getTelegramId() ? parseInt(DastyorAI.getTelegramId()) : null,
                token: DastyorAI.getToken() || null,
                fullname: get('f_name'),
                birthdate: get('f_birth'),
                birthplace: get('f_place'),
                nation: get('f_nation'),
                party: get('f_party'),
                education: get('f_edu'),
                graduated: get('f_grad'),
                specialty: get('f_spec'),
                degree: get('f_degree'),
                scientific_title: get('f_title'),
                languages: get('f_langs'),
                military_rank: get('f_military') || '',
                awards: get('f_awards'),
                deputy: get('f_deputy'),
                address: get('f_addr') || '',
                phone: get('f_phone') || '',
                work_experience: experiences.map(e => ({ year: e.years, position: e.desc })),
                relatives: relatives.map(r => ({
                    degree: r.role, fullname: r.name,
                    birth_year_place: r.birth, work_place: r.work, address: r.addr
                })),
            };
        }

        // ── Detect Telegram Mini App environment ─────────────────────
        function _isTgWebApp() {
            return !!(window.Telegram?.WebApp?.initData);
        }

        // ── exportPDF() — Server-side, pixel-perfect PDF ──────────
        async function exportPDF() {
            const inTelegram = _isTgWebApp();
            const btn = document.getElementById('btnPdf');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '⏳ Kutib turing...';
            btn.disabled = true;

            const safeName = (_collectObyData('pdf').fullname || 'Obyektivka').replace(/\s+/g, '_');
            const filename = `DASTYOR_Obyektivka_${safeName}_@DastyorAiBot.pdf`;

            try {
                const res = await fetch(DastyorAI.BASE + '/api/export_obyektivka', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(_collectObyData('pdf')),
                });

                if (!res.ok) throw new Error('Server xatosi: ' + res.status);

                if (inTelegram) {
                    // Inside Telegram Mini App: bot sends the file directly. Skip browser download.
                    await res.arrayBuffer();
                    _showTelegramToast('✅ PDF Telegram chatga yuborildi!');
                } else {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a); a.click();
                    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
                    _showTelegramToast('✅ PDF saqlandi!');
                }
            } catch (err) {
                console.error('exportPDF server error:', err);
                if (!inTelegram) {
                    _exportPDFClientSide(filename, btn, originalHtml);
                    return;
                } else {
                    _showTelegramToast('❌ Xatolik yuz berdi. Qayta urinib ko\'ring.');
                }
            }

            autoScale();
            btn.innerHTML = originalHtml;
            btn.disabled = false;
        }

        // Fallback: old client-side html2pdf.js export
        function _exportPDFClientSide(filename, btn, originalHtml) {
            const el = document.getElementById('cv-box');
            const wrap = document.getElementById('previewScaleWrapper');
            wrap.style.transform = 'none';
            html2pdf().set({
                margin: 0, filename,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(el).outputPdf('blob').then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click();
                setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
                uploadToTelegram(blob, filename);
                autoScale();
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            });
        }

        // ── exportWord() — Server-side, pixel-perfect Word ────────
        async function exportWord() {
            const inTelegram = _isTgWebApp();
            const btnEl = document.querySelector('button[onclick="exportWord()"]');
            if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '⏳ Kuting...'; }

            const safeName = (_collectObyData('word').fullname || 'Obyektivka').replace(/\s+/g, '_');
            const filename = `DASTYOR_Obyektivka_${safeName}_@DastyorAiBot.doc`;

            try {
                const res = await fetch(DastyorAI.BASE + '/api/export_obyektivka', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(_collectObyData('word')),
                });

                if (!res.ok) throw new Error('Server xatosi: ' + res.status);

                if (inTelegram) {
                    await res.arrayBuffer();
                    _showTelegramToast('✅ Word fayl Telegram chatga yuborildi!');
                } else {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a); a.click();
                    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
                    _showTelegramToast('✅ Word saqlandi!');
                }
            } catch (err) {
                console.error('exportWord server error:', err);
                if (!inTelegram) _exportWordClientSide(filename);
                else _showTelegramToast('❌ Xatolik yuz berdi. Qayta urinib ko\'ring.');
            }

            if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '📄 Word'; }
        }

        // Fallback: old client-side Word blob export
        function _exportWordClientSide(filename) {
            const rawHtml = document.getElementById('cv-box').outerHTML;
            const styles = document.querySelector('style').innerHTML;
            const docHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office'
                    xmlns:w='urn:schemas-microsoft-com:office:word'
                    xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><title>${filename}</title>
                    <style>@page WordSection1{size:210mm 297mm;margin:15mm;}div.WordSection1{page:WordSection1;}${styles}</style>
                    </head><body><div class="WordSection1">${rawHtml}</div></body></html>`;
            const blob = new Blob(['\ufeff', docHTML], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
            uploadToTelegram(blob, filename);
        }
    </script>
</body>
