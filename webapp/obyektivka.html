<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Obyektivka Builder | DASTYOR AI</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg: #060d1c;
            --surface: #0d1b2e;
            --surface2: #14243b;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --muted: #94a3b8;
            --accent: #10b981;
            /* Green for Obyektivka */
            --accent-glow: rgba(16, 185, 129, 0.3);

            --cv-bg: #fff;
            --cv-text: #000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .hdr {
            height: 60px;
            background: rgba(13, 27, 46, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--border-hover);
        }

        .hdr-title {
            font-size: 16px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .export-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-pdf {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }

        .btn-doc {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* LAYOUT */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* EDITOR PANEL */
        .editor-pane {
            width: 45%;
            min-width: 350px;
            max-width: 500px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .editor-pane::-webkit-scrollbar {
            width: 4px;
        }

        .editor-pane::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .editor-section {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.03);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .photo-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .photo-preview-circle {
            width: 50px;
            height: 65px;
            border-radius: 6px;
            background: var(--surface2);
            border: 2px dashed var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 20px;
        }

        .photo-preview-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .repeater-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        .repeater-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            position: relative;
        }

        .rm-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            border: none;
            border-radius: 6px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            width: 100%;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border: 1px dashed var(--accent);
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* PREVIEW PANEL */
        .preview-pane {
            flex: 1;
            background: #0f172a;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .preview-pane::-webkit-scrollbar {
            width: 6px;
        }

        .preview-pane::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* A4 Paper Canvas */
        .cv-canvas {
            width: 210mm;
            min-height: 297mm;
            background: var(--cv-bg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transform-origin: top center;
            position: relative;
            overflow: hidden;
            color: var(--cv-text);
            margin-bottom: 30px;
        }

        /* ─── OBYEKTIVKA CSS TEMPLATE ─── */
        .tpl-oby {
            padding: 20mm 15mm 20mm 20mm;
            /* standard standard margins */
            font-family: 'Times New Roman', Times, serif;
            color: #000;
            line-height: 1.25;
            font-size: 11pt;
            background: #fff;
        }

        .tpl-oby strong {
            font-weight: bold;
        }

        .tpl-oby .title {
            text-align: center;
            font-size: 16pt;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .tpl-oby .header-table {
            width: 100%;
            margin-bottom: 15px;
            border-collapse: collapse;
        }

        .tpl-oby .header-table td {
            vertical-align: top;
        }

        .tpl-oby .col-main {
            text-align: center;
            vertical-align: middle;
            padding-right: 15mm;
        }

        .tpl-oby .name {
            font-size: 16pt;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .tpl-oby .col-img {
            width: 35mm;
            text-align: right;
        }

        .tpl-oby .avatar {
            width: 30mm;
            height: 40mm;
            object-fit: cover;
            border: 1px solid #aaa;
            display: inline-block;
        }

        .tpl-oby .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
            margin-bottom: 25px;
            font-size: 11.5pt;
        }

        .tpl-oby .info-item strong {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            font-size: 10.5pt;
        }

        .tpl-oby .section-title {
            text-align: center;
            font-weight: bold;
            font-size: 12.5pt;
            margin-top: 25px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tpl-oby .exp-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 11pt;
        }

        .tpl-oby .exp-table td {
            padding: 6px 0;
            vertical-align: top;
        }

        .tpl-oby .exp-table td:first-child {
            width: 28%;
            padding-right: 10px;
        }

        .tpl-oby .rel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10pt;
            text-align: center;
        }

        .tpl-oby .rel-table th,
        .tpl-oby .rel-table td {
            border: 1px solid #000;
            padding: 6px 4px;
            vertical-align: middle;
        }

        .tpl-oby .rel-table th {
            font-weight: bold;
            font-size: 9.5pt;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            #cv-box,
            #cv-box * {
                visibility: visible;
            }

            #cv-box {
                position: absolute;
                left: 0;
                top: 0;
                width: 210mm;
                min-height: 297mm;
                transform: none !important;
                box-shadow: none !important;
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <div class="hdr">
        <div class="hdr-left">
            <a href="index.html" class="back-btn">←</a>
            <div class="hdr-title">Obyektivka Builder</div>
        </div>
        <div class="export-group">
            <button class="btn btn-doc" onclick="exportWord()">📄 Word (.docx)</button>
            <button class="btn btn-pdf" onclick="exportPDF()">📥 PDF Yuklash</button>
        </div>
    </div>

    <div class="workspace">
        <div class="editor-pane" id="editorPane">

            <div class="editor-section">
                <div class="section-title">👤 Shaxsiy Ma'lumotlar</div>

                <div class="photo-upload">
                    <div class="photo-preview-circle" id="photoPrev">📸</div>
                    <div>
                        <input type="file" id="imgInput" accept="image/*" style="display:none"
                            onchange="handleImage(this)">
                        <button class="photo-btn" onclick="document.getElementById('imgInput').click()">Rasm yuklash
                            (3x4)</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>F.I.SH (To'liq ism)</label>
                    <input type="text" id="f_name" class="form-control"
                        placeholder="Masalan: ALISHEROV YUSUF MURATOVICH" oninput="updateCV()">
                </div>

                <div style="display:flex; gap:12px;">
                    <div class="form-group" style="flex:1">
                        <label>Tug'ilgan yili</label>
                        <input type="text" id="f_birth" class="form-control" placeholder="01.01.1990"
                            oninput="updateCV()">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Tug'ilgan joyi</label>
                        <input type="text" id="f_place" class="form-control" placeholder="Toshkent viloyati"
                            oninput="updateCV()">
                    </div>
                </div>

                <div style="display:flex; gap:12px;">
                    <div class="form-group" style="flex:1">
                        <label>Millati</label>
                        <input type="text" id="f_nation" class="form-control" placeholder="o'zbek" oninput="updateCV()">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Partiyaviyligi</label>
                        <input type="text" id="f_party" class="form-control" placeholder="yo'q" oninput="updateCV()">
                    </div>
                </div>

                <div style="display:flex; gap:12px;">
                    <div class="form-group" style="flex:1">
                        <label>Ma'lumoti</label>
                        <input type="text" id="f_edu" class="form-control" placeholder="oliy" oninput="updateCV()">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Tamomlagan yili va oliygoh</label>
                        <input type="text" id="f_grad" class="form-control"
                            placeholder="2015 yil, Toshkent davlat yuridik universiteti" oninput="updateCV()">
                    </div>
                </div>

                <div class="form-group">
                    <label>Mutaxassisligi</label>
                    <input type="text" id="f_spec" class="form-control" placeholder="huquqshunos" oninput="updateCV()">
                </div>

                <div style="display:flex; gap:12px;">
                    <div class="form-group" style="flex:1">
                        <label>Ilmiy darajasi</label>
                        <input type="text" id="f_degree" class="form-control" placeholder="yo'q" oninput="updateCV()">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Ilmiy unvoni</label>
                        <input type="text" id="f_title" class="form-control" placeholder="yo'q" oninput="updateCV()">
                    </div>
                </div>

                <div class="form-group">
                    <label>Qaysi chet tillarini biladi</label>
                    <input type="text" id="f_langs" class="form-control" placeholder="rus va ingliz tillari"
                        oninput="updateCV()">
                </div>

                <div class="form-group">
                    <label>Davlat mukofotlari</label>
                    <input type="text" id="f_awards" class="form-control" placeholder="yo'q" oninput="updateCV()">
                </div>

                <div class="form-group">
                    <label>Xalq deputatlari kengashi deputatimi</label>
                    <input type="text" id="f_deputy" class="form-control" placeholder="yo'q" oninput="updateCV()">
                </div>
            </div>

            <div class="editor-section">
                <div class="section-title">💼 Mehnat Faoliyati</div>
                <div class="repeater-list" id="expList"></div>
                <button class="add-btn" onclick="addExp()">+ Ish joyi qo'shish</button>
            </div>

            <div class="editor-section">
                <div class="section-title">👨‍👩‍👧 Yaqin qarindoshlari</div>
                <div class="repeater-list" id="relList"></div>
                <button class="add-btn" onclick="addRel()">+ Qarindosh qo'shish</button>
            </div>

        </div>

        <!-- RIGHT: LIVE PREVIEW -->
        <div class="preview-pane">
            <div class="cv-canvas tpl-oby" id="cv-box">
                <!-- Inner HTML injected live -->
            </div>
        </div>
    </div>

    <script>
        // STATE
        let avatarUrl = '';
        let experiences = [{ id: 1, years: '2015-2020 yy.', desc: "Toshkent shahri Yunusobod tumani hokimi o'rinbosari" }];
        let relatives = [{ id: 1, role: 'Otasi', name: 'Alisherov Muratjon', birth: '1965 yil, Toshkent viloyati', work: "Nafaqada", addr: "Toshkent shahri, Yunusobod tumani, 3-kvartal, 12-uy" }];

        // IMAGE HANDLER
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    avatarUrl = e.target.result;
                    document.getElementById('photoPrev').innerHTML = `<img src="${avatarUrl}">`;
                    updateCV();
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // REPEATER: EXPERIENCE
        function addExp() { experiences.push({ id: Date.now(), years: '', desc: '' }); renderExp(); updateCV(); }
        function removeExp(id) { experiences = experiences.filter(x => x.id !== id); renderExp(); updateCV(); }
        function renderExp() {
            document.getElementById('expList').innerHTML = experiences.map((ex, i) => `
                <div class="repeater-item">
                    <button class="rm-btn" onclick="removeExp(${ex.id})">×</button>
                    <input type="text" class="form-control" style="margin-bottom:8px" placeholder="Yillar (Masalan: 2018 - 2023 yy.)" value="${ex.years}" oninput="experiences[${i}].years=this.value; updateCV()">
                    <textarea class="form-control" placeholder="Ish joyi va lavozimi" oninput="experiences[${i}].desc=this.value; updateCV()">${ex.desc}</textarea>
                </div>
            `).join('');
        }

        // REPEATER: RELATIVES
        function addRel() { relatives.push({ id: Date.now(), role: '', name: '', birth: '', work: '', addr: '' }); renderRel(); updateCV(); }
        function removeRel(id) { relatives = relatives.filter(x => x.id !== id); renderRel(); updateCV(); }
        function renderRel() {
            document.getElementById('relList').innerHTML = relatives.map((r, i) => `
                <div class="repeater-item">
                    <button class="rm-btn" onclick="removeRel(${r.id})">×</button>
                    <div style="display:flex;gap:8px;margin-bottom:8px">
                        <input type="text" class="form-control" placeholder="Qarindoshligi (Masalan: Otasi)" value="${r.role}" oninput="relatives[${i}].role=this.value; updateCV()">
                        <input type="text" class="form-control" placeholder="F.I.SH" value="${r.name}" oninput="relatives[${i}].name=this.value; updateCV()">
                    </div>
                    <input type="text" class="form-control" style="margin-bottom:8px" placeholder="Tug'ilgan yili va joyi" value="${r.birth}" oninput="relatives[${i}].birth=this.value; updateCV()">
                    <input type="text" class="form-control" style="margin-bottom:8px" placeholder="Ish joyi va lavozimi" value="${r.work}" oninput="relatives[${i}].work=this.value; updateCV()">
                    <input type="text" class="form-control" placeholder="Yashash manzili" value="${r.addr}" oninput="relatives[${i}].addr=this.value; updateCV()">
                </div>
            `).join('');
        }

        // INIT
        renderExp();
        renderRel();

        function v(id) { return document.getElementById(id).value.trim(); }

        function updateCV() {
            const data = {
                name: v('f_name') || 'ALISHEROV YUSUF MURATOVICH',
                birth: v('f_birth') || '01.01.1990',
                place: v('f_place') || 'Toshkent viloyati',
                nation: v('f_nation') || 'o\'zbek',
                party: v('f_party') || 'yo\'q',
                edu: v('f_edu') || 'oliy',
                grad: v('f_grad') || '2015 yil, Toshkent davlat yuridik universiteti (kunduzgi)',
                spec: v('f_spec') || 'huquqshunos',
                degree: v('f_degree') || 'yo\'q',
                title: v('f_title') || 'yo\'q',
                langs: v('f_langs') || 'rus va ingliz tillari',
                awards: v('f_awards') || 'yo\'q',
                deputy: v('f_deputy') || 'yo\'q',
                exp: experiences.filter(e => e.years || e.desc),
                rel: relatives.filter(e => e.role || e.name)
            };

            const box = document.getElementById('cv-box');

            const expHtml = data.exp.length > 0 ?
                `<table class="exp-table">` + data.exp.map(e => `
                    <tr>
                        <td>${e.years}</td>
                        <td>- ${e.desc}</td>
                    </tr>
                `).join('') + `</table>` : '<div style="text-align:center; font-style:italic">Ma\'lumot kiritilmagan</div>';

            const relHtml = data.rel.length > 0 ?
                `<table class="rel-table">
                    <tr>
                        <th style="width:12%">Qarindosh-<br>ligi</th>
                        <th style="width:23%">Familiyasi, ismi va otasining ismi</th>
                        <th style="width:20%">Tug'ilgan yili va joyi</th>
                        <th style="width:25%">Ish joyi va lavozimi</th>
                        <th style="width:20%">Yashash manzili</th>
                    </tr>` +
                data.rel.map(r => `
                    <tr>
                        <td>${r.role}</td>
                        <td>${r.name}</td>
                        <td>${r.birth}</td>
                        <td>${r.work}</td>
                        <td>${r.addr}</td>
                    </tr>
                `).join('') + `</table>` : '<div style="text-align:center; font-style:italic">Ma\'lumot kiritilmagan</div>';

            let imgHtml = avatarUrl ? `<img src="${avatarUrl}" class="avatar">` : `<div style="width:30mm;height:40mm;border:1px solid #000;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:10pt;">4x6</div>`;

            box.innerHTML = `
                <div class="title">M A ' L U M O T N O M A</div>
                
                <table class="header-table">
                    <tr>
                        <td class="col-main">
                            <div class="name">${data.name.replace(/ /g, '<br>')}</div>
                        </td>
                        <td class="col-img">
                            ${imgHtml}
                        </td>
                    </tr>
                </table>

                <div class="info-grid">
                    <div class="info-item">
                        <strong>Tug'ilgan yili:</strong>
                        ${data.birth}
                    </div>
                    <div class="info-item">
                        <strong>Tug'ilgan joyi:</strong>
                        ${data.place}
                    </div>
                    
                    <div class="info-item">
                        <strong>Millati:</strong>
                        ${data.nation}
                    </div>
                    <div class="info-item">
                        <strong>Partiyaviyligi:</strong>
                        ${data.party}
                    </div>
                    
                    <div class="info-item">
                        <strong>Ma'lumoti:</strong>
                        ${data.edu}
                    </div>
                    <div class="info-item">
                        <strong>Tamomlagan:</strong>
                        ${data.grad}
                    </div>
                    
                    <div class="info-item">
                        <strong>Ma'lumoti bo'yicha mutaxassisligi:</strong>
                        ${data.spec}
                    </div>
                    <div class="info-item">
                        <strong>Ilmiy darajasi:</strong>
                        ${data.degree}
                    </div>
                    
                    <div class="info-item">
                        <strong>Ilmiy unvoni:</strong>
                        ${data.title}
                    </div>
                    <div class="info-item">
                        <strong>Qaysi chet tillarini biladi:</strong>
                        ${data.langs}
                    </div>
                    
                    <div class="info-item">
                        <strong>Davlat mukofotlari bilan taqdirlanganmi (qanaqa):</strong>
                        ${data.awards}
                    </div>
                    <div class="info-item">
                        <strong>Xalq deputatlari respublika, viloyat, shahar va tuman Kengashi deputatimi, saylanadigan organlarning a'zosimi (ko'rsatilishi lozim):</strong>
                        ${data.deputy}
                    </div>
                </div>

                <div class="section-title">MEHNAT FAOLIYATI</div>
                ${expHtml}

                <div class="section-title">${data.name.split(' ')[0]}NING YAQIN QARINDOSHLARI HAQIDA<br>M A ' L U M O T</div>
                ${relHtml}
            `;

            autoScale();
        }

        function autoScale() {
            const pane = document.querySelector('.preview-pane');
            const box = document.getElementById('cv-box');

            const padding = 60;
            const paneW = pane.clientWidth - padding;
            const paneH = pane.clientHeight - padding;

            // Standard A4 is approx 793 x 1122 px
            const natW = 793;
            const natH = 1122;

            const scaleW = paneW / natW;
            const scaleH = paneH / natH;
            const scale = Math.min(scaleW, scaleH, 1);

            box.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', autoScale);
        setTimeout(() => updateCV(), 100);

        function exportPDF() {
            const el = document.getElementById('cv-box');
            el.style.transform = 'none';

            const opt = {
                margin: 0,
                filename: 'Obyektivka_' + new Date().getTime() + '.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const btn = document.querySelector('.btn-pdf');
            btn.innerHTML = "⏳ Kuting...";
            btn.disabled = true;

            html2pdf().set(opt).from(el).save().then(() => {
                autoScale();
                btn.innerHTML = "📥 PDF Yuklash";
                btn.disabled = false;

                const tg = window.Telegram?.WebApp;
                if (tg && tg.showAlert) tg.showAlert("Obyektivka PDF formati saqlandi!");
            });
        }

        function exportWord() {
            alert("Word (.docx) formati tez kunda backend bilan birlashtiriladi. Hozirgi dizayn strukturasini saqlab qolish uchun PDF variantidan foydalanib turing.");
        }
    </script>
</body>
