<!-- ================================================================
     DASTYOR AI — Page Migration Snippet
     Copy this block into EVERY webapp page to get theme + i18n + auth.
     Replace:  {{PAGE_TITLE}}  with the i18n key for the page title
               {{DATA_I18N_*}} with real data-i18n keys from i18n.js
     ================================================================ -->

<!--=== HEAD: insert BEFORE all other <link> and <script> tags ===-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<!-- 1. Theme init FIRST — prevents flash of wrong theme -->
<script src="theme-init.js"></script>

<!-- 2. Theme CSS (MUST be first stylesheet to avoid FOUC) -->
<link rel="stylesheet" href="theme.css" />

<!-- 3. Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- 4. i18n dictionary -->
<script src="i18n.js"></script>

<!-- 5. Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800&display=swap"
    rel="stylesheet" />

<!--=== BODY BOTTOM: just before </body> ===-->

<!-- 6. Unified SDK (after Telegram SDK, after i18n.js) -->
<script src="app.js"></script>

<!-- 7. Page boot script (optional). app.js already applies theme + lang from localStorage/da_settings_v1 on DOMContentLoaded. -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (window.DastyorAI) {
            DastyorAI.applyTheme();
            if (window.DastyorAI.initUI) DastyorAI.initUI({ showLangPicker: false, autoNavLinks: true, profileEl: {} });
        }
        if (window.I18n) I18n.apply();
    });
    // Optional: override in DOMContentLoaded with showLangPicker: true or profileEl: { avatarId, nameId, initialsId }, onUser(user){...}

    // React to theme changes (optional)
    window.addEventListener('theme:change', ({ detail: { dark } }) => {
        // e.g. update canvas, chart colours, etc.
        console.log('theme changed → dark:', dark);
    });

    // React to language changes (optional)
    window.addEventListener('i18n:change', ({ detail: { lang } }) => {
        // Re-render any dynamic content that isn't covered by data-i18n attributes
        console.log('language changed →', lang);
    });
</script>

<!--=== HTML PATTERNS ===-->

<!-- Body: use theme tokens only (no overrides). Settings: { theme, lang } in localStorage da_settings_v1. -->
<!-- body { background: var(--da-bg-page); color: var(--da-text-primary); min-height: 100vh; } -->

<!-- Translate static text: -->
<span data-i18n="btn_generate">Yaratish</span>

<!-- Translate placeholder: -->
<input data-i18n-ph="ph_text" placeholder="Matn kiriting..." />

<!-- Translate tooltip: -->
<button data-i18n="btn_download" data-i18n-attr="title">⬇</button>

<!-- Theme toggle switch: -->
<div class="da-theme-toggle" role="switch" aria-label="Toggle theme">
    <div class="da-theme-knob"></div>
</div>

<!-- Language picker button: -->
<button class="da-lang-btn">
    <span>🇺🇿</span>
    <span>UZ</span>
</button>

<!-- Upload zone: -->
<div class="da-upload" id="dropzone">
    <span data-i18n="pdf_drop">Rasmlarni tanlang</span>
</div>

<!-- Status banner: -->
<div class="da-status da-status-success" id="statusBanner" style="display:none">
    <span>✅</span>
    <span data-i18n="status_success">Muvaffaqiyatli!</span>
</div>

<!-- Primary button: -->
<button class="da-btn da-btn-primary" id="generateBtn">
    <span data-i18n="btn_generate">Yaratish</span>
</button>
