<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tarjima | DASTYOR AI</title>
    <!-- 1. Theme init FIRST — prevents flash of wrong theme -->
    <script src="theme-init.js"></script>
    <!-- 2. Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 3. Global theme tokens -->
    <link rel="stylesheet" href="theme.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            blue: '#0A84FF',
                            green: '#30D158',
                            orange: '#FF9F0A',
                            purple: '#BF5AF2',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }


        .scroller::-webkit-scrollbar {
            width: 0px;
        }

        /* Shimmer for translation */
        .loading-shimmer {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .lang-select {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>

<body class="antialiased selection:bg-apple-blue selection:text-white flex flex-col h-screen overflow-hidden">

    <!-- Global Header -->
    <header
        class="h-16 flex-shrink-0 border-b border-black/5 dark:border-white/5 bg-white/80 dark:bg-[#0a0a0c]/80 backdrop-blur-xl flex items-center px-4 z-50">
        <a href="more.html"
            class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors flex items-center justify-center shrink-0"
            id="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </a>
        <div class="ml-4 flex-1">
            <h1 class="font-display font-bold text-lg tracking-tight leading-tight">Tarjima AI</h1>
            <p class="text-[10px] font-semibold text-black/40 dark:text-white/40 uppercase tracking-widest"><span
                    id="engineLabel">Gemini & Google</span></p>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto scroller relative flex flex-col">
        <div class="max-w-3xl w-full mx-auto p-4 md:p-6 flex flex-col h-full gap-4">

            <!-- Lang Bar -->
            <div
                class="flex items-center gap-3 bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-2xl p-2 animate-slide-up shadow-sm">
                <div class="flex-1 relative">
                    <select
                        class="lang-select w-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-sm font-bold text-black dark:text-white rounded-xl px-4 py-3 outline-none transition-colors cursor-pointer"
                        id="srcLang">
                        <option value="uz">🇺🇿 O'zbekcha</option>
                        <option value="en">🇬🇧 Inglizcha</option>
                        <option value="ru">🇷🇺 Ruscha</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">▼</div>
                </div>

                <button
                    class="w-10 h-10 rounded-xl bg-apple-blue text-white flex items-center justify-center font-bold text-lg hover:bg-blue-600 active:scale-95 transition-all shadow-md shadow-apple-blue/20 shrink-0"
                    onclick="swapLangs()">
                    ⇆
                </button>

                <div class="flex-1 relative">
                    <select
                        class="lang-select w-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-sm font-bold text-black dark:text-white rounded-xl px-4 py-3 outline-none transition-colors cursor-pointer"
                        id="tgtLang">
                        <option value="en" selected>🇬🇧 Inglizcha</option>
                        <option value="uz">🇺🇿 O'zbekcha</option>
                        <option value="ru">🇷🇺 Ruscha</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">▼</div>
                </div>
            </div>

            <!-- Translate Box Wrapper -->
            <div class="flex flex-col md:flex-row gap-4 flex-1 h-full min-h-[400px]">

                <!-- INPUT PANEL -->
                <div class="flex-1 flex flex-col bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-[24px] overflow-hidden shadow-sm animate-slide-up"
                    style="animation-delay: 0.1s;">
                    <div
                        class="flex items-center justify-between px-5 py-3 border-b border-black/5 dark:border-white/5 bg-black/[0.02] dark:bg-white/[0.02]">
                        <span class="text-[11px] font-bold text-apple-blue uppercase tracking-widest"
                            id="srcLangLabel">O'zbekcha</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-bold text-black/30 dark:text-white/30" id="charCount">0 /
                                5000</span>
                            <button onclick="clearSrc()"
                                class="text-black/30 dark:text-white/30 hover:text-black dark:hover:text-white transition-colors">✕</button>
                        </div>
                    </div>
                    <textarea
                        class="w-full flex-1 bg-transparent border-none p-5 text-base font-medium resize-none outline-none text-black dark:text-white placeholder-black/30 dark:placeholder-white/30 leading-relaxed"
                        id="srcText" placeholder="Matnni bu yerga kiriting..." oninput="onInput()"></textarea>
                </div>

                <!-- OUTPUT PANEL -->
                <div class="flex-1 flex flex-col bg-apple-blue/5 dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-[24px] overflow-hidden shadow-sm animate-slide-up relative"
                    style="animation-delay: 0.15s;" id="outPanel">
                    <div
                        class="flex items-center justify-between px-5 py-3 border-b border-black/5 dark:border-white/5 bg-black/[0.02] dark:bg-white/[0.02]">
                        <span class="text-[11px] font-bold text-apple-blue uppercase tracking-widest"
                            id="tgtLangLabel">Inglizcha</span>
                        <button onclick="copyResult()"
                            class="text-black/30 dark:text-white/30 hover:text-apple-blue transition-colors">📋
                            Nusxa</button>
                    </div>
                    <textarea
                        class="w-full flex-1 bg-transparent border-none p-5 text-base font-semibold resize-none outline-none text-black dark:text-white placeholder-black/30 dark:placeholder-white/30 leading-relaxed"
                        id="outText" placeholder="Tarjima shu yerda chiqadi..." readonly></textarea>
                </div>

            </div>

            <!-- STATUS AND ACTION -->
            <div class="mt-auto pt-2 animate-slide-up flex flex-col gap-3" style="animation-delay: 0.2s;">
                <div id="statusBanner"
                    class="hidden items-center gap-2 p-3 rounded-xl text-sm font-semibold max-w-full leading-tight">
                    <span id="statusIcon">⚠️</span>
                    <span id="statusMsg"></span>
                </div>

                <button
                    class="w-full py-4 rounded-2xl bg-apple-blue hover:bg-blue-600 active:scale-[0.98] text-white font-bold text-lg shadow-[0_8px_30px_rgba(10,132,255,0.3)] transition-all flex justify-center items-center gap-2"
                    id="trBtn" onclick="translateText()">
                    ⚡ Tarjima Qilish
                </button>
            </div>

            <!-- Quick Chips -->
            <div class="animate-slide-up pb-6" style="animation-delay: 0.25s;">
                <h3 class="text-[10px] font-bold text-black/40 dark:text-white/40 uppercase tracking-widest mb-3 pl-2">
                    Tezkor iboralar</h3>
                <div class="flex flex-wrap gap-2">
                    <button
                        class="px-4 py-2 rounded-full border border-black/10 dark:border-white/10 bg-white/50 dark:bg-white/5 hover:bg-black/5 dark:hover:bg-white/10 text-xs font-semibold transition-colors"
                        onclick="setPhrase(this)">Salom, ahvollar qanday?</button>
                    <button
                        class="px-4 py-2 rounded-full border border-black/10 dark:border-white/10 bg-white/50 dark:bg-white/5 hover:bg-black/5 dark:hover:bg-white/10 text-xs font-semibold transition-colors"
                        onclick="setPhrase(this)">Katta Rahmat!</button>
                    <button
                        class="px-4 py-2 rounded-full border border-black/10 dark:border-white/10 bg-white/50 dark:bg-white/5 hover:bg-black/5 dark:hover:bg-white/10 text-xs font-semibold transition-colors"
                        onclick="setPhrase(this)">Iltimos, menga xabar bering</button>
                    <button
                        class="px-4 py-2 rounded-full border border-black/10 dark:border-white/10 bg-white/50 dark:bg-white/5 hover:bg-black/5 dark:hover:bg-white/10 text-xs font-semibold transition-colors"
                        onclick="setPhrase(this)">Uchrashuvni bekor qila olasizmi?</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        // Theme already applied by theme-init.js

        const tid = new URLSearchParams(location.search).get('telegram_id') || sessionStorage.getItem('telegram_id') || tg?.initDataUnsafe?.user?.id?.toString() || '';
        document.getElementById('backBtn').onclick = (e) => {
            e.preventDefault();
            location.href = 'more.html' + (tid ? '?telegram_id=' + tid : '');
        };

        const LANG_NAMES = { uz: "O'zbekcha", en: "Inglizcha", ru: "Ruscha" };
        const GEMINI_DIRS = new Set(['uz_en', 'en_uz', 'ru_uz', 'uz_ru', 'ru_en', 'en_ru']);
        const GT_CODES = { uz: 'uz', en: 'en', ru: 'ru' };

        let srcLang = 'uz', tgtLang = 'en';

        function updateLangLabels() {
            document.getElementById('srcLangLabel').textContent = LANG_NAMES[srcLang];
            document.getElementById('tgtLangLabel').textContent = LANG_NAMES[tgtLang];
            document.getElementById('srcLang').value = srcLang;
            document.getElementById('tgtLang').value = tgtLang;
        }

        document.getElementById('srcLang').addEventListener('change', function () {
            srcLang = this.value;
            if (srcLang === tgtLang) { tgtLang = srcLang === 'uz' ? 'en' : 'uz'; }
            updateLangLabels();
        });
        document.getElementById('tgtLang').addEventListener('change', function () {
            tgtLang = this.value;
            if (srcLang === tgtLang) { srcLang = tgtLang === 'uz' ? 'ru' : 'uz'; }
            updateLangLabels();
        });

        function swapLangs() {
            const tmp = srcLang; srcLang = tgtLang; tgtLang = tmp;
            const srcT = document.getElementById('srcText');
            const outT = document.getElementById('outText');
            const prev = outT.value;
            if (prev) { srcT.value = prev; outT.value = ''; }
            updateLangLabels();
            onInput();
            tg?.HapticFeedback?.impactOccurred('medium');
        }
        updateLangLabels();

        function onInput() {
            const len = document.getElementById('srcText').value.length;
            const cc = document.getElementById('charCount');
            cc.textContent = len + ' / 5000';
            if (len >= 5000) cc.className = "text-[10px] font-bold text-red-500";
            else if (len > 4500) cc.className = "text-[10px] font-bold text-apple-orange";
            else cc.className = "text-[10px] font-bold text-black/30 dark:text-white/30";
        }

        function setPhrase(el) {
            document.getElementById('srcText').value = el.textContent;
            onInput();
            tg?.HapticFeedback?.selectionChanged();
        }

        function clearSrc() {
            document.getElementById('srcText').value = '';
            document.getElementById('outText').value = '';
            onInput();
            hideStatus();
        }

        function showStatus(type, icon, msg) {
            const b = document.getElementById('statusBanner');
            b.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-apple-green/10', 'text-apple-green', 'bg-apple-blue/10');
            b.classList.add('flex');

            if (type === 'error') b.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500/20');
            else if (type === 'success') b.classList.add('bg-apple-green/10', 'text-apple-green', 'border', 'border-apple-green/20');
            else b.classList.add('bg-apple-blue/10', 'text-apple-blue', 'border', 'border-apple-blue/20');

            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusMsg').textContent = msg;
        }
        function hideStatus() {
            document.getElementById('statusBanner').classList.add('hidden');
        }
        function setEngine(name) {
            document.getElementById('engineLabel').textContent = name;
        }
        function copyResult() {
            const t = document.getElementById('outText').value;
            if (!t) return;
            navigator.clipboard?.writeText(t).then(() => {
                tg?.HapticFeedback?.notificationOccurred('success');
            }).catch(() => {
                const el = document.getElementById('outText');
                el.select(); document.execCommand('copy');
            });
            tg?.HapticFeedback?.notificationOccurred('success');
        }

        async function tryGeminiAPI(text, src, tgt) {
            if (location.protocol === 'file:') return null;
            const dirKey = src + '_' + tgt;
            if (!GEMINI_DIRS.has(dirKey)) return null;

            const apiBase = location.origin;
            const ctrl = new AbortController();
            const timeout = setTimeout(() => ctrl.abort(), 12000);

            try {
                const res = await fetch(apiBase + '/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, direction: dirKey }),
                    signal: ctrl.signal,
                });
                clearTimeout(timeout);

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.translated_text) return { text: data.translated_text, engine: 'Gemini AI' };
                return null;
            } catch (e) {
                clearTimeout(timeout);
                if (e.name === 'AbortError') throw new Error('Server (timeout)');
                throw e;
            }
        }

        async function tryGoogleTranslate(text, src, tgt) {
            const sl = GT_CODES[src] || src;
            const tl = GT_CODES[tgt] || tgt;
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${encodeURIComponent(sl)}&tl=${encodeURIComponent(tl)}&dt=t&q=${encodeURIComponent(text)}`;

            const ctrl = new AbortController();
            const timeout = setTimeout(() => ctrl.abort(), 15000);

            try {
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(timeout);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const translated = data[0].filter(chunk => Array.isArray(chunk) && chunk[0]).map(chunk => chunk[0]).join('');
                if (!translated) throw new Error('Tarjima yiqildi');
                return { text: translated, engine: 'Google Translate' };
            } catch (e) {
                clearTimeout(timeout);
                throw e;
            }
        }

        async function translateText() {
            const srcText = document.getElementById('srcText').value.trim();
            if (!srcText) { showStatus('error', '⚠️', 'Matn kiriting!'); return; }
            if (srcText.length > 5000) { showStatus('error', '⚠️', 'Max 5000 belgi.'); return; }
            if (srcLang === tgtLang) { showStatus('error', '⚠️', 'Tillarni almashtiring.'); return; }

            const btn = document.getElementById('trBtn');
            const outPanel = document.getElementById('outPanel');
            const outText = document.getElementById('outText');

            btn.innerHTML = 'Kuting...';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            outText.value = '';
            outText.classList.add('loading-shimmer');
            hideStatus();
            setEngine('Yuklanmoqda...');

            let lastError = null;

            try {
                const result = await tryGeminiAPI(srcText, srcLang, tgtLang);
                if (result) {
                    outText.value = result.text;
                    outText.classList.remove('loading-shimmer');
                    setEngine(result.engine);
                    showStatus('success', '✅', 'Tarjima qilindi');
                    tg?.HapticFeedback?.notificationOccurred('success');
                    btn.innerHTML = '⚡ Tarjima Qilish';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                    return;
                }
            } catch (e) { lastError = e.message; }

            try {
                const result = await tryGoogleTranslate(srcText, srcLang, tgtLang);
                if (result) {
                    outText.value = result.text;
                    outText.classList.remove('loading-shimmer');
                    setEngine(result.engine);
                    showStatus('info', '🌐', 'Tarjima qilindi');
                    tg?.HapticFeedback?.notificationOccurred('success');
                    btn.innerHTML = '⚡ Tarjima Qilish';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                    return;
                }
            } catch (e) { lastError = (lastError ? lastError + '; ' : '') + e.message; }

            outText.classList.remove('loading-shimmer');
            setEngine('Xato');
            showStatus('error', '❌', 'Xatolik: ' + lastError);
            tg?.HapticFeedback?.notificationOccurred('error');
            btn.innerHTML = '⚡ Tarjima Qilish';
            btn.disabled = false;
            btn.classList.remove('opacity-70');
        }

        document.getElementById('srcText').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                translateText();
            }
        });

        if (tg) { tg.ready(); tg.expand(); }
    </script>
</body>

</html>
