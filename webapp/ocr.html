<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rasm → Word | DASTYOR AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            blue: '#0A84FF',
                            green: '#30D158',
                            orange: '#FF9F0A',
                            purple: '#BF5AF2',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(16px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html,
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dark body {
            background-color: #000000;
            color: #f5f5f7;
        }

        .scroller::-webkit-scrollbar {
            width: 0px;
        }

        /* Drag active UI styling */
        .drag-active {
            border-color: #BF5AF2 !important;
            background-color: rgba(191, 90, 242, 0.1) !important;
            transform: scale(1.02);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* Progress Bar Base */
        .progress-bar {
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body class="antialiased selection:bg-apple-purple selection:text-white flex flex-col h-screen overflow-hidden">

    <!-- Global Header -->
    <header
        class="h-16 flex-shrink-0 border-b border-black/5 dark:border-white/5 bg-white/80 dark:bg-[#0a0a0c]/80 backdrop-blur-xl flex items-center px-4 z-50">
        <a href="more.html"
            class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors flex items-center justify-center shrink-0"
            id="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </a>
        <div class="ml-4 flex-1">
            <h1 class="font-display font-bold text-lg tracking-tight leading-tight">Rasm → Word</h1>
            <p class="text-[10px] font-semibold text-black/40 dark:text-white/40 uppercase tracking-widest"><span
                    id="tgStatusBadge" class="text-apple-green">Telegram ulangan</span></p>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto scroller relative flex flex-col">
        <div class="max-w-xl w-full mx-auto p-4 md:p-6 flex flex-col h-full gap-5">

            <!-- Connection Label -->
            <div
                class="flex items-center gap-3 bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-2xl p-3 animate-slide-up shadow-sm">
                <div class="w-10 h-10 rounded-xl bg-apple-purple/10 flex items-center justify-center shrink-0">
                    <span class="text-apple-purple font-bold text-lg">🤖</span>
                </div>
                <div>
                    <h3 class="font-bold text-sm" id="tgLabelTitle">Obyektivka AI</h3>
                    <p class="text-[11px] font-medium text-black/50 dark:text-white/50" id="tgLabelSub">Natijalar Word
                        holida ham yuklanadi, ham bot orqali jo'natiladi.</p>
                </div>
            </div>

            <!-- Upload Zone -->
            <div class="flex-1 min-h-[200px] bg-white dark:bg-[#151518] border border-black/5 dark:border-white/5 rounded-[24px] overflow-hidden shadow-sm animate-slide-up relative"
                style="animation-delay: 0.1s;">
                <input type="file" id="imgInput" class="hidden" accept="image/*" multiple
                    onchange="handleFiles(this.files)" />
                <label for="imgInput" id="uploadZone"
                    class="absolute inset-0 m-4 rounded-[18px] border-2 border-dashed border-apple-purple/30 bg-apple-purple/5 hover:bg-apple-purple/10 transition-colors flex flex-col items-center justify-center cursor-pointer select-none"
                    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">

                    <div
                        class="w-20 h-20 mb-4 bg-white dark:bg-black rounded-[22px] shadow-sm flex items-center justify-center relative overflow-hidden">
                        <svg class="text-apple-purple" width="36" height="36" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" x2="12" y1="3" y2="15" />
                        </svg>
                    </div>

                    <h2 class="font-display font-bold text-lg text-apple-purple mb-1">Rasmni yuklang</h2>
                    <p class="text-xs font-semibold text-black/40 dark:text-white/40">Yoki bu yerga sudrab tashlang</p>
                </label>

                <!-- Queue Wrapper (hidden initially) -->
                <div id="queueWrap" class="hidden absolute inset-0 bg-white dark:bg-[#151518] z-10 flex flex-col p-4">
                    <div class="flex items-center justify-between mb-4 mt-2 px-2">
                        <span class="text-[11px] font-bold text-apple-purple uppercase tracking-widest"
                            id="queueTitle">0 ta rasm</span>
                        <button onclick="clearAll()"
                            class="text-[11px] font-bold text-red-500 bg-red-500/10 px-3 py-1.5 rounded-lg hover:bg-red-500/20 transition-colors uppercase tracking-wider">Barchasini
                            tozalash</button>
                    </div>

                    <div class="flex-1 overflow-y-auto scroller px-2 pb-4 flex flex-col gap-3" id="imgList">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Result Card overlay -->
                <div id="resultCard"
                    class="hidden absolute inset-0 bg-white/90 dark:bg-[#151518]/95 backdrop-blur-md z-20 flex-col items-center justify-center p-6 text-center shadow-lg">
                    <div
                        class="w-16 h-16 rounded-[22px] bg-apple-green/20 text-apple-green flex items-center justify-center text-3xl mb-4">
                        ✅</div>
                    <div class="font-display font-bold text-xl mb-2">Word tayyor!</div>
                    <div class="text-xs font-medium text-black/50 dark:text-white/50 mb-8" id="resultSub">Yuklab olish
                        boshlandi...</div>
                    <div class="w-full flex flex-col gap-3">
                        <button onclick="reDownload()"
                            class="w-full py-4 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 font-bold transition-colors">⬇️
                            Qayta yuklab olish</button>
                        <button onclick="startNew()"
                            class="w-full py-4 rounded-xl bg-apple-purple hover:bg-purple-600 active:scale-[0.98] text-white font-bold transition-all shadow-[0_8px_30px_rgba(139,92,246,0.25)]">🔄
                            Yangi rasm yuklash</button>
                    </div>
                </div>
            </div>

            <!-- Progress Block -->
            <div id="progressWrap" class="hidden flex-col gap-2 mt-2 animate-slide-up" style="animation-delay: 0.15s;">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-xs font-bold text-apple-purple tracking-tight" id="progressLabel">Rasm
                        yuklanmoqda...</span>
                    <span class="text-xs font-bold text-black/40 dark:text-white/40" id="progressPct">0%</span>
                </div>
                <div class="h-2 w-full bg-black/5 dark:bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full bg-apple-purple progress-bar rounded-full" id="progressFill" style="width:0%;">
                    </div>
                </div>
            </div>

            <!-- STATUS AND ACTION -->
            <div class="mt-auto pt-2 pb-4 animate-slide-up flex flex-col gap-3" style="animation-delay: 0.2s;">
                <div id="statusBanner"
                    class="hidden items-center gap-2 p-3 rounded-xl text-sm font-semibold max-w-full leading-tight">
                    <span id="statusIcon">⚠️</span>
                    <span id="statusMsg"></span>
                </div>

                <button
                    class="w-full py-4 rounded-2xl bg-apple-purple hover:bg-purple-600 active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 disabled:shadow-none text-white font-bold text-lg shadow-[0_8px_30px_rgba(139,92,246,0.3)] transition-all flex justify-center items-center gap-2"
                    id="convBtn" onclick="startOCR()" disabled>
                    ⚡ Word faylga aylantirish
                </button>
            </div>

        </div>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        let isDark = localStorage.getItem('theme') !== 'light';

        if (isDark) {
            document.documentElement.classList.add('dark');
            if (tg?.setHeaderColor) tg.setHeaderColor('#0a0a0c');
            if (tg?.setBackgroundColor) tg.setBackgroundColor('#000000');
        } else {
            document.documentElement.classList.remove('dark');
            if (tg?.setHeaderColor) tg.setHeaderColor('#ffffff');
            if (tg?.setBackgroundColor) tg.setBackgroundColor('#f5f5f7');
        }

        const tid = new URLSearchParams(location.search).get('telegram_id') || sessionStorage.getItem('telegram_id') || tg?.initDataUnsafe?.user?.id?.toString() || '';
        document.getElementById('backBtn').onclick = (e) => {
            e.preventDefault();
            location.href = 'more.html' + (tid ? '?telegram_id=' + tid : '');
        };

        if (tid) {
            sessionStorage.setItem('telegram_id', tid);
        } else {
            document.getElementById('tgLabelTitle').textContent = "Avtonom rejim";
            document.getElementById('tgLabelSub').textContent = "Siz bot orqali kirmaganingiz uchun Telegram ga jo'natilmaydi, faqatgina yuklab olish mumkin.";
            const badge = document.getElementById('tgStatusBadge');
            badge.textContent = "Oflayn";
            badge.className = "text-black/40 dark:text-white/40";
        }

        let fileQueue = [];
        let lastDocxBlob = null;
        let lastFilename = '';

        function handleFiles(fileList) {
            const newFiles = Array.from(fileList);
            for (const f of newFiles) {
                if (fileQueue.some(x => x.file.name === f.name && x.file.size === f.size)) continue;
                fileQueue.push({ file: f, url: URL.createObjectURL(f) });
            }
            renderQueue();
            document.getElementById('imgInput').value = '';
        }

        function removeImg(idx) {
            URL.revokeObjectURL(fileQueue[idx].url);
            fileQueue.splice(idx, 1);
            renderQueue();
        }

        function clearAll() {
            fileQueue.forEach(x => URL.revokeObjectURL(x.url));
            fileQueue = [];
            renderQueue();
            hideStatus();
            document.getElementById('resultCard').classList.remove('flex');
            document.getElementById('resultCard').classList.add('hidden');
        }

        function renderQueue() {
            const listEl = document.getElementById('imgList');
            const wrapEl = document.getElementById('queueWrap');
            const titleEl = document.getElementById('queueTitle');
            const convBtn = document.getElementById('convBtn');

            if (fileQueue.length === 0) {
                wrapEl.classList.remove('flex');
                wrapEl.classList.add('hidden');
                convBtn.disabled = true;
                return;
            }

            wrapEl.classList.remove('hidden');
            wrapEl.classList.add('flex');
            titleEl.textContent = `${fileQueue.length} ta rasm`;

            listEl.innerHTML = fileQueue.map((item, i) => `
                <div class="flex items-center gap-3 bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/5 rounded-xl p-2.5 overflow-hidden slide-up" style="animation-delay: ${0.05 * i}s;">
                    <img class="w-12 h-12 rounded-[10px] object-cover shrink-0" src="${item.url}" alt="${item.file.name}" />
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm truncate max-w-[200px]">${item.file.name}</div>
                        <div class="text-[10px] font-semibold text-black/40 dark:text-white/40">${formatSize(item.file.size)}</div>
                    </div>
                    <button class="w-8 h-8 rounded-lg bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-black/50 dark:text-white/50 flex items-center justify-center transition-colors" onclick="removeImg(${i})">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
            `).join('');

            convBtn.disabled = false;
            tg?.HapticFeedback?.impactOccurred('light');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function onDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-active'); }
        function onDragLeave(e) { document.getElementById('uploadZone').classList.remove('drag-active'); }
        function onDrop(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.remove('drag-active');
            handleFiles(e.dataTransfer.files);
        }

        function setProgress(pct, label) {
            const p = document.getElementById('progressWrap');
            p.classList.remove('hidden'); p.classList.add('flex');
            if (label) document.getElementById('progressLabel').textContent = label;
            document.getElementById('progressPct').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';
        }
        function hideProgress() {
            const p = document.getElementById('progressWrap');
            p.classList.remove('flex'); p.classList.add('hidden');
        }

        function showStatus(type, icon, msg) {
            const b = document.getElementById('statusBanner');
            b.classList.remove('hidden', 'bg-red-500/10', 'text-red-500', 'bg-apple-green/10', 'text-apple-green', 'bg-apple-purple/10', 'text-apple-purple');
            b.classList.add('flex');
            if (type === 'error') b.classList.add('bg-red-500/10', 'text-red-500', 'border', 'border-red-500/20');
            else if (type === 'success') b.classList.add('bg-apple-green/10', 'text-apple-green', 'border', 'border-apple-green/20');
            else b.classList.add('bg-apple-purple/10', 'text-apple-purple', 'border', 'border-apple-purple/20');
            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusMsg').textContent = msg;
        }
        function hideStatus() { document.getElementById('statusBanner').classList.add('hidden'); }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 10000);
        }

        function reDownload() {
            if (!lastDocxBlob) return;
            triggerDownload(lastDocxBlob, lastFilename);
        }

        function startNew() {
            clearAll();
            document.getElementById('resultCard').classList.remove('flex');
            document.getElementById('resultCard').classList.add('hidden');
            hideStatus();
            lastDocxBlob = null;
        }

        async function startOCR() {
            if (fileQueue.length === 0) return;

            let apiBase = location.protocol === 'file:' ? 'https://dastyor-ai.onrender.com' : location.origin;
            const convBtn = document.getElementById('convBtn');
            convBtn.innerHTML = '<div class="spin"></div> Jarayon...';
            convBtn.disabled = true;
            convBtn.classList.add('opacity-70');
            hideStatus();
            document.getElementById('resultCard').classList.remove('flex');
            document.getElementById('resultCard').classList.add('hidden');

            let successCount = 0;

            for (let i = 0; i < fileQueue.length; i++) {
                const item = fileQueue[i];
                const pct_start = Math.round((i / fileQueue.length) * 80);

                setProgress(pct_start, `${i + 1}/${fileQueue.length}: ${item.file.name} yuklanmoqda...`);

                const fd = new FormData();
                fd.append('file', item.file);
                if (tid) fd.append('telegram_id', tid);

                try {
                    if (i > 0) await new Promise(r => setTimeout(r, 800));
                    setProgress(pct_start + 10, `${i + 1}/${fileQueue.length}: AI O'qimoqda (biroz kuting)...`);

                    const ctrl = new AbortController();
                    const timeout = setTimeout(() => ctrl.abort(), 90000);

                    const res = await fetch(apiBase + '/api/ocr_direct', {
                        method: 'POST', body: fd, signal: ctrl.signal,
                    });
                    clearTimeout(timeout);

                    if (!res.ok) {
                        let detail = `Server xatosi (${res.status})`;
                        try {
                            const err = await res.json();
                            detail = err.detail || err.error || detail;
                        } catch (_) { }
                        showStatus('error', '❌', `${item.file.name}: ${detail}`);
                        continue;
                    }

                    setProgress(pct_start + 15, `${i + 1}/${fileQueue.length}: Word tayyorlanmoqda...`);
                    const blob = await res.blob();
                    const filename = `Rasm_OCR_${item.file.name.replace(/\.[^.]+$/, '')}.docx`;

                    lastDocxBlob = blob; lastFilename = filename;
                    triggerDownload(blob, filename);
                    successCount++;

                } catch (err) {
                    if (err.name === 'AbortError') showStatus('error', '⏱️', `${item.file.name}: AI server javob bermadi.`);
                    else showStatus('error', '❌', `${item.file.name}: Tarmoq xatosi: ${err.message}`);
                }
            }

            setProgress(100, 'Tugadi!');
            setTimeout(() => hideProgress(), 1500);

            convBtn.innerHTML = '⚡ Word faylga aylantirish';
            convBtn.classList.remove('opacity-70');
            convBtn.disabled = fileQueue.length === 0;

            if (successCount > 0) {
                document.getElementById('resultCard').classList.remove('hidden');
                document.getElementById('resultCard').classList.add('flex');
                document.getElementById('resultSub').textContent =
                    `${successCount} ta jami fayl(lar) olinganlarga tushdi` +
                    (tid ? ` va o'z botingizga ham jo'natildi.` : `.`);
                tg?.HapticFeedback?.notificationOccurred('success');
            } else {
                tg?.HapticFeedback?.notificationOccurred('error');
            }
        }
    </script>
</body>

</html>
