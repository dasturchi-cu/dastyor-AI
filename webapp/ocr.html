<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rasm → Word | DASTYOR AI</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Sora', 'sans-serif'],
                    },
                    colors: {
                        brand: { 400: '#818cf8', 500: '#636cf1', 600: '#4f46e5' },
                        accent: {
                            blue: '#0A84FF',
                            green: '#10b981',
                            orange: '#f59e0b',
                            purple: '#a855f7',
                            cyan: '#06b6d4',
                            rose: '#f43f5e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.4), rgba(168, 85, 247, 0.2));
            border-radius: 10px;
        }

        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: #a855f7; top: -100px; right: -50px; animation: float 8s ease-in-out infinite; }
        .orb-2 { width: 300px; height: 300px; background: #10b981; bottom: 20%; left: -80px; animation: float 10s ease-in-out infinite reverse; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed rgba(168, 85, 247, 0.3);
            background: rgba(168, 85, 247, 0.05);
            transition: all 0.3s ease;
        }
        .upload-zone:hover, .upload-zone.drag-active {
            border-color: rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.1);
            transform: scale(1.01);
        }

        /* Image Item */
        .img-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .img-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .img-item.processing {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }
        .img-item.done {
            border-color: rgba(16, 185, 129, 0.5);
        }
        .img-item.error {
            border-color: rgba(244, 63, 94, 0.5);
        }

        /* Progress Bar */
        .progress-bar {
            background: linear-gradient(90deg, #a855f7, #7c3aed);
            transition: width 0.3s ease;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(168, 85, 247, 0.5);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* Status Badge */
        .status-processing { color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .status-done { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-error { color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
    </style>
</head>

<body class="antialiased text-white flex flex-col h-screen overflow-hidden">

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Header -->
    <header class="glass h-16 flex-shrink-0 flex items-center px-5 z-50 border-b border-white/5">
        <a href="more.html" id="backBtn" class="w-10 h-10 rounded-xl glass hover:bg-white/10 transition-all flex items-center justify-center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-60">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </a>
        <div class="ml-4 flex-1">
            <h1 class="font-display font-bold text-lg tracking-tight bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">Rasm → Word</h1>
            <p class="text-[10px] font-semibold uppercase tracking-widest">
                <span id="tgStatusBadge" class="text-accent-green">✓ Telegram ulangan</span>
            </p>
        </div>
        <div id="headerStatus" class="hidden px-3 py-1.5 rounded-full text-xs font-bold"></div>
    </header>

    <main class="flex-1 overflow-y-auto relative flex flex-col p-5">
        <div class="max-w-lg w-full mx-auto flex flex-col h-full gap-5">

            <!-- Info Card -->
            <div class="glass-card rounded-2xl p-4 flex items-center gap-4 animate-slide-up">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent-purple/20 to-accent-purple/5 flex items-center justify-center text-2xl flex-shrink-0">
                    🤖
                </div>
                <div>
                    <h3 class="font-bold text-sm" id="tgLabelTitle">AI OCR</h3>
                    <p class="text-[11px] text-white/50" id="tgLabelSub">Rasmlarni Word faylga aylantiriladi va bot orqali yuboriladi</p>
                </div>
            </div>

            <!-- Upload Zone -->
            <div class="flex-1 min-h-[280px] glass-card rounded-3xl overflow-hidden relative animate-slide-up" style="animation-delay: 0.1s;">
                <input type="file" id="imgInput" class="hidden" accept="image/*" multiple onchange="handleFiles(this.files)" />
                
                <!-- Empty State - Upload Zone -->
                <label for="imgInput" id="uploadZone" class="upload-zone absolute inset-4 rounded-2xl flex flex-col items-center justify-center cursor-pointer"
                    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                    <div class="w-20 h-20 mb-5 rounded-2xl bg-gradient-to-br from-accent-purple/20 to-accent-purple/5 flex items-center justify-center">
                        <svg class="text-accent-purple" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" x2="12" y1="3" y2="15" />
                        </svg>
                    </div>
                    <h2 class="font-display font-bold text-xl text-accent-purple mb-2">Rasmlarni yuklang</h2>
                    <p class="text-sm text-white/40">Yoki bu yerga sudrab tashlang</p>
                </label>

                <!-- Queue List -->
                <div id="queueWrap" class="hidden absolute inset-0 flex flex-col p-4">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-accent-purple" id="queueTitle">0 ta rasm</span>
                            <button onclick="document.getElementById('imgInput').click()" class="text-xs font-bold text-white/50 hover:text-white transition-colors">+ Qo'shish</button>
                        </div>
                        <button onclick="clearAll()" class="text-xs font-bold text-accent-rose hover:bg-accent-rose/10 px-3 py-1.5 rounded-lg transition-colors">
                            Tozalash
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 pb-2" id="imgList"></div>
                </div>

                <!-- Result Overlay -->
                <div id="resultCard" class="hidden absolute inset-0 bg-[#0c0c1d]/95 backdrop-blur-md z-20 flex-col items-center justify-center p-6 text-center">
                    <div class="w-20 h-20 rounded-2xl bg-accent-green/20 flex items-center justify-center text-4xl mb-5">✅</div>
                    <h2 class="font-display font-bold text-2xl mb-2">Tayyor!</h2>
                    <p class="text-sm text-white/50 mb-8" id="resultSub">Fayllar yuklandi</p>
                    <div class="w-full flex flex-col gap-3">
                        <button onclick="reDownload()" class="w-full py-4 rounded-xl glass hover:bg-white/10 font-bold transition-all">
                            ⬇️ Qayta yuklab olish
                        </button>
                        <button onclick="startNew()" class="w-full py-4 rounded-xl btn-primary text-white font-bold">
                            🔄 Yangi rasm yuklash
                        </button>
                    </div>
                </div>
            </div>

            <!-- Progress Section -->
            <div id="progressWrap" class="hidden flex-col gap-3 animate-slide-up">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-bold text-accent-purple" id="progressLabel">Tayyorlanmoqda...</span>
                    <span class="text-sm font-bold text-white/40" id="progressPct">0%</span>
                </div>
                <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                    <div class="h-full progress-bar rounded-full" id="progressFill" style="width:0%;"></div>
                </div>
                <p class="text-xs text-white/30 text-center" id="progressHint">AI rasmni o'qimoqda, biroz kuting...</p>
            </div>

            <!-- Status Banner -->
            <div id="statusBanner" class="hidden items-center gap-3 p-4 rounded-xl text-sm font-semibold glass-card">
                <span id="statusIcon" class="text-xl">⚠️</span>
                <span id="statusMsg" class="flex-1"></span>
            </div>

            <!-- Action Button -->
            <div class="mt-auto pt-2 pb-4 animate-slide-up" style="animation-delay: 0.2s;">
                <button class="w-full py-4 rounded-2xl btn-primary text-white font-bold text-lg flex justify-center items-center gap-3" id="convBtn" onclick="startOCR()" disabled>
                    <span id="btnIcon">⚡</span>
                    <span id="btnText">Word faylga aylantirish</span>
                </button>
            </div>

        </div>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        
        // Telegram ID
        const tid = new URLSearchParams(location.search).get('telegram_id') 
            || sessionStorage.getItem('telegram_id') 
            || tg?.initDataUnsafe?.user?.id?.toString() 
            || '';
        
        if (tid) {
            sessionStorage.setItem('telegram_id', tid);
        } else {
            document.getElementById('tgLabelTitle').textContent = "Avtonom rejim";
            document.getElementById('tgLabelSub').textContent = "Faqat yuklab olish mumkin, Telegram'ga yuborilmaydi";
            document.getElementById('tgStatusBadge').textContent = "Oflayn";
            document.getElementById('tgStatusBadge').className = "text-white/40";
        }

        document.getElementById('backBtn').onclick = (e) => {
            e.preventDefault();
            location.href = 'more.html' + (tid ? '?telegram_id=' + tid : '');
        };

        let fileQueue = [];
        let lastDocxBlob = null;
        let lastFilename = '';
        let isProcessing = false;

        // ═══════════════════════════════════════════════════════════
        // FILE HANDLING
        // ═══════════════════════════════════════════════════════════

        function handleFiles(fileList) {
            const newFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            for (const f of newFiles) {
                if (fileQueue.some(x => x.file.name === f.name && x.file.size === f.size)) continue;
                fileQueue.push({ 
                    id: Date.now() + Math.random(),
                    file: f, 
                    url: URL.createObjectURL(f),
                    status: 'pending' // pending, processing, done, error
                });
            }
            renderQueue();
            document.getElementById('imgInput').value = '';
            haptic('light');
        }

        function removeImg(id) {
            const idx = fileQueue.findIndex(x => x.id === id);
            if (idx > -1) {
                URL.revokeObjectURL(fileQueue[idx].url);
                fileQueue.splice(idx, 1);
                renderQueue();
            }
        }

        function clearAll() {
            if (isProcessing) return;
            fileQueue.forEach(x => URL.revokeObjectURL(x.url));
            fileQueue = [];
            renderQueue();
            hideStatus();
            hideResult();
            haptic('light');
        }

        function renderQueue() {
            const listEl = document.getElementById('imgList');
            const wrapEl = document.getElementById('queueWrap');
            const uploadZone = document.getElementById('uploadZone');
            const titleEl = document.getElementById('queueTitle');
            const convBtn = document.getElementById('convBtn');

            if (fileQueue.length === 0) {
                wrapEl.classList.add('hidden');
                uploadZone.classList.remove('hidden');
                convBtn.disabled = true;
                return;
            }

            wrapEl.classList.remove('hidden');
            uploadZone.classList.add('hidden');
            titleEl.textContent = `${fileQueue.length} ta rasm`;

            listEl.innerHTML = fileQueue.map((item, i) => {
                let statusClass = '';
                let statusBadge = '';
                
                if (item.status === 'processing') {
                    statusClass = 'processing';
                    statusBadge = '<span class="status-processing px-2 py-1 rounded-lg text-[10px] font-bold">⏳ Jarayonda</span>';
                } else if (item.status === 'done') {
                    statusClass = 'done';
                    statusBadge = '<span class="status-done px-2 py-1 rounded-lg text-[10px] font-bold">✓ Tayyor</span>';
                } else if (item.status === 'error') {
                    statusClass = 'error';
                    statusBadge = '<span class="status-error px-2 py-1 rounded-lg text-[10px] font-bold">✗ Xato</span>';
                }

                return `
                    <div class="img-item ${statusClass} rounded-xl p-3 flex items-center gap-3" style="animation: slideUp 0.3s ease forwards; animation-delay: ${i * 0.05}s;">
                        <img class="w-14 h-14 rounded-lg object-cover flex-shrink-0" src="${item.url}" alt="">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-sm truncate">${item.file.name}</div>
                            <div class="text-[11px] text-white/40">${formatSize(item.file.size)}</div>
                        </div>
                        ${statusBadge}
                        ${!isProcessing ? `
                            <button onclick="removeImg(${item.id})" class="w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center text-white/30 hover:text-accent-rose transition-all">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        ` : ''}
                    </div>
                `;
            }).join('');

            convBtn.disabled = isProcessing || fileQueue.length === 0;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        // ═══════════════════════════════════════════════════════════
        // DRAG & DROP
        // ═══════════════════════════════════════════════════════════

        function onDragOver(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.add('drag-active');
        }
        function onDragLeave(e) {
            document.getElementById('uploadZone').classList.remove('drag-active');
        }
        function onDrop(e) {
            e.preventDefault();
            document.getElementById('uploadZone').classList.remove('drag-active');
            handleFiles(e.dataTransfer.files);
        }

        // ═══════════════════════════════════════════════════════════
        // PROGRESS & STATUS
        // ═══════════════════════════════════════════════════════════

        function setProgress(pct, label, hint = '') {
            const p = document.getElementById('progressWrap');
            p.classList.remove('hidden');
            p.classList.add('flex');
            document.getElementById('progressLabel').textContent = label;
            document.getElementById('progressPct').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressHint').textContent = hint;
        }

        function hideProgress() {
            document.getElementById('progressWrap').classList.add('hidden');
        }

        function showStatus(type, icon, msg) {
            const b = document.getElementById('statusBanner');
            b.classList.remove('hidden');
            b.classList.add('flex');
            b.className = `flex items-center gap-3 p-4 rounded-xl text-sm font-semibold glass-card border ${
                type === 'error' ? 'border-accent-rose/30' : 
                type === 'success' ? 'border-accent-green/30' : 'border-accent-purple/30'
            }`;
            document.getElementById('statusIcon').textContent = icon;
            document.getElementById('statusMsg').textContent = msg;
        }

        function hideStatus() {
            document.getElementById('statusBanner').classList.add('hidden');
        }

        function showResult(successCount) {
            const card = document.getElementById('resultCard');
            card.classList.remove('hidden');
            card.classList.add('flex');
            document.getElementById('resultSub').textContent = 
                `${successCount} ta fayl yuklandi` + (tid ? ` va Telegram'ga yuborildi` : '');
        }

        function hideResult() {
            const card = document.getElementById('resultCard');
            card.classList.remove('flex');
            card.classList.add('hidden');
        }

        // ═══════════════════════════════════════════════════════════
        // DOWNLOAD
        // ═══════════════════════════════════════════════════════════

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 10000);
        }

        function reDownload() {
            if (lastDocxBlob) {
                triggerDownload(lastDocxBlob, lastFilename);
                haptic('success');
            }
        }

        function startNew() {
            clearAll();
            hideResult();
        }

        // ═══════════════════════════════════════════════════════════
        // OCR PROCESSING - FIXED ASYNC
        // ═══════════════════════════════════════════════════════════

        async function startOCR() {
            if (fileQueue.length === 0 || isProcessing) return;

            isProcessing = true;
            const apiBase = location.protocol === 'file:' ? 'https://dastyor-ai.onrender.com' : location.origin;
            
            // Update button
            const convBtn = document.getElementById('convBtn');
            document.getElementById('btnIcon').innerHTML = '<div class="spinner"></div>';
            document.getElementById('btnText').textContent = 'Jarayonda...';
            convBtn.disabled = true;
            
            hideStatus();
            hideResult();

            let successCount = 0;
            const total = fileQueue.length;

            for (let i = 0; i < fileQueue.length; i++) {
                const item = fileQueue[i];
                
                // Update status
                item.status = 'processing';
                renderQueue();

                const pctBase = Math.round((i / total) * 100);
                setProgress(pctBase, `${i + 1}/${total}: ${item.file.name}`, 'AI rasmni o'qimoqda...');

                try {
                    // Small delay between requests to prevent overload
                    if (i > 0) {
                        await sleep(500);
                    }

                    const fd = new FormData();
                    fd.append('file', item.file);
                    if (tid) fd.append('telegram_id', tid);

                    // Use AbortController with shorter timeout
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 45000); // 45 seconds

                    setProgress(pctBase + 5, `${i + 1}/${total}: Serverga yuborilmoqda...`, '');

                    const res = await fetch(apiBase + '/api/ocr_direct', {
                        method: 'POST',
                        body: fd,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!res.ok) {
                        let detail = `Server xatosi (${res.status})`;
                        try {
                            const err = await res.json();
                            detail = err.detail || err.error || detail;
                        } catch (_) {}
                        throw new Error(detail);
                    }

                    setProgress(pctBase + 10, `${i + 1}/${total}: Word tayyorlanmoqda...`, '');

                    const blob = await res.blob();
                    const filename = `OCR_${item.file.name.replace(/\.[^.]+$/, '')}.docx`;

                    lastDocxBlob = blob;
                    lastFilename = filename;
                    triggerDownload(blob, filename);

                    item.status = 'done';
                    successCount++;
                    haptic('success');

                } catch (err) {
                    item.status = 'error';
                    
                    if (err.name === 'AbortError') {
                        showStatus('error', '⏱️', `${item.file.name}: Vaqt tugadi, qayta urinib ko'ring`);
                    } else {
                        showStatus('error', '❌', `${item.file.name}: ${err.message}`);
                    }
                    
                    haptic('error');
                }

                renderQueue();
                
                // Allow UI to update
                await sleep(100);
            }

            // Finish
            setProgress(100, 'Tugadi!', '');
            setTimeout(hideProgress, 1500);

            // Reset button
            document.getElementById('btnIcon').textContent = '⚡';
            document.getElementById('btnText').textContent = 'Word faylga aylantirish';
            convBtn.disabled = false;
            isProcessing = false;

            if (successCount > 0) {
                showResult(successCount);
                haptic('success');
            }

            renderQueue();
        }

        // ═══════════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════════

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function haptic(type) {
            if (tg?.HapticFeedback) {
                if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                else tg.HapticFeedback.impactOccurred('light');
            }
        }
    </script>
</body>

</html>
