<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Real-time CV Builder | DASTYOR AI</title>
  
  <!-- Fonts - Premium Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="i18n.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Sora', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f4ff',
              100: '#e0e9ff',
              200: '#c7d6fe',
              300: '#a5b9fc',
              400: '#8193f8',
              500: '#636cf1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            },
            accent: {
              emerald: '#10b981',
              amber: '#f59e0b',
              rose: '#f43f5e',
              cyan: '#06b6d4',
            }
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'slide-up': 'slideUp 0.5s ease-out',
            'fade-in': 'fadeIn 0.3s ease-out',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            glow: {
              '0%': { boxShadow: '0 0 20px rgba(99, 108, 241, 0.3)' },
              '100%': { boxShadow: '0 0 40px rgba(99, 108, 241, 0.6)' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' },
            },
          },
        }
      }
    }
  </script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      overscroll-behavior-y: none;
      background: linear-gradient(135deg, #0c0c1d 0%, #1a1a2e 50%, #16213e 100%);
    }

    /* Custom Scrollbar */
    .scroller::-webkit-scrollbar {
      width: 6px;
    }
    .scroller::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .scroller::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(99, 108, 241, 0.5), rgba(79, 70, 229, 0.3));
      border-radius: 10px;
    }
    .scroller::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(99, 108, 241, 0.7), rgba(79, 70, 229, 0.5));
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .glass-light {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Premium Input Styling */
    .input-premium {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-premium:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(99, 108, 241, 0.5);
      box-shadow: 0 0 0 3px rgba(99, 108, 241, 0.1), 0 4px 20px rgba(99, 108, 241, 0.15);
    }
    .input-premium::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    /* Template Cards */
    .tpl-card {
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .tpl-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99, 108, 241, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .tpl-card:hover::before {
      opacity: 1;
    }
    .tpl-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    .tpl-card.active {
      border-color: rgba(99, 108, 241, 0.8) !important;
      box-shadow: 0 0 30px rgba(99, 108, 241, 0.3);
    }
    .tpl-card.active::after {
      content: '✓';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #636cf1, #4f46e5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      font-weight: bold;
      z-index: 20;
    }

    /* Action Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #636cf1 0%, #4f46e5 50%, #4338ca 100%);
      box-shadow: 0 4px 15px rgba(99, 108, 241, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 108, 241, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-accent {
      background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
      box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    .btn-accent:hover {
      box-shadow: 0 8px 25px rgba(244, 63, 94, 0.5);
      transform: translateY(-2px);
    }

    /* Section Headers */
    .section-header {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .section-header::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #636cf1, transparent);
      border-radius: 2px;
    }

    /* Add Button Style */
    .btn-add {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-add::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }
    .btn-add:hover::before {
      width: 300px;
      height: 300px;
    }

    /* Skill/Tool Badges */
    .badge-skill {
      background: linear-gradient(135deg, rgba(99, 108, 241, 0.15), rgba(79, 70, 229, 0.1));
      border: 1px solid rgba(99, 108, 241, 0.3);
      transition: all 0.3s ease;
    }
    .badge-skill:hover {
      background: linear-gradient(135deg, rgba(99, 108, 241, 0.25), rgba(79, 70, 229, 0.15));
      transform: scale(1.05);
    }

    /* Entry Cards */
    .entry-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
    }
    .entry-card:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(99, 108, 241, 0.2);
    }

    /* Remove Button */
    .btn-remove {
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s ease;
    }
    .entry-card:hover .btn-remove {
      opacity: 1;
      transform: scale(1);
    }

    /* Photo Upload */
    .photo-upload {
      position: relative;
      transition: all 0.3s ease;
    }
    .photo-upload::before {
      content: '';
      position: absolute;
      inset: -3px;
      background: linear-gradient(135deg, #636cf1, #4f46e5, #10b981, #636cf1);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
      animation: spin 3s linear infinite;
    }
    .photo-upload:hover::before {
      opacity: 1;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Floating Orbs Background */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 400px;
      height: 400px;
      background: #636cf1;
      top: -100px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 300px;
      height: 300px;
      background: #10b981;
      bottom: 10%;
      left: -50px;
      animation: float 10s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 250px;
      height: 250px;
      background: #f43f5e;
      top: 50%;
      right: 30%;
      animation: float 12s ease-in-out infinite;
    }

    /* ─── CV OUTPUT CANVAS ─── */
    .cv-canvas-wrapper {
      position: relative;
      transform-origin: top center;
      transition: transform 0.1s ease;
    }

    .cv-canvas {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
      margin-bottom: 30px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* TPL 1: MINIMAL */
    .tpl-minimal {
      color: #1e293b;
      padding: 25mm 20mm;
    }

    .tpl-minimal .header {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 20px;
    }

    .tpl-minimal .avatar {
      width: 35mm;
      height: 35mm;
      border-radius: 5px;
      object-fit: cover;
    }

    .tpl-minimal .name {
      font-size: 26pt;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .tpl-minimal .role {
      font-size: 14pt;
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .tpl-minimal .contact-wrap {
      display: flex;
      gap: 15px;
      font-size: 10pt;
      color: #64748b;
    }

    .tpl-minimal .section {
      margin-bottom: 25px;
    }

    .tpl-minimal .sec-title {
      font-size: 13pt;
      font-weight: 700;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .tpl-minimal .text {
      font-size: 10.5pt;
      line-height: 1.6;
    }

    /* TPL 2: SPLIT PROFESSIONAL */
    .tpl-split {
      display: flex;
      color: #1e293b;
      padding: 0;
      min-height: 297mm;
    }

    .tpl-split .sidebar {
      width: 32%;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20mm 10mm;
      flex-shrink: 0;
    }

    .tpl-split .main {
      flex: 1;
      padding: 20mm 15mm;
    }

    .tpl-split .avatar {
      width: 35mm;
      height: 35mm;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #334155;
      margin-bottom: 20px;
    }

    .tpl-split .name {
      font-size: 24pt;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .tpl-split .role {
      font-size: 12pt;
      color: #3b82f6;
      font-weight: 500;
      margin-bottom: 30px;
    }

    .tpl-split .sec-title-main {
      font-size: 14pt;
      font-weight: 800;
      color: #0f172a;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .tpl-split .sec-title-side {
      font-size: 12pt;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .tpl-split .contact-item {
      font-size: 9.5pt;
      margin-bottom: 10px;
      line-height: 1.4;
      word-break: break-all;
    }

    .tpl-split .section {
      margin-bottom: 25px;
    }

    /* TPL 3: MODERN HEADER */
    .tpl-modern {
      padding: 0;
      color: #334155;
      min-height: 297mm;
    }

    .tpl-modern .header {
      background: #1e293b;
      color: white;
      padding: 20mm;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .tpl-modern .avatar {
      width: 40mm;
      height: 40mm;
      border-radius: 12px;
      object-fit: cover;
    }

    .tpl-modern .name {
      font-size: 28pt;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 5px;
    }

    .tpl-modern .role {
      font-size: 14pt;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    .tpl-modern .contact {
      font-size: 10pt;
      opacity: 0.8;
      line-height: 1.5;
    }

    .tpl-modern .body {
      display: flex;
      padding: 15mm 20mm;
      gap: 40px;
    }

    .tpl-modern .col-main {
      flex: 6;
    }

    .tpl-modern .col-side {
      flex: 4;
    }

    .tpl-modern .sec-title {
      font-size: 14pt;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    /* TPL 4: ATS SAFE */
    .tpl-ats {
      padding: 20mm;
      font-family: 'Arial', sans-serif;
      color: #000;
    }

    .tpl-ats .header {
      text-align: center;
      border-bottom: 1px solid #000;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .tpl-ats .name {
      font-size: 24pt;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .tpl-ats .role {
      font-size: 12pt;
      margin-bottom: 10px;
    }

    .tpl-ats .contact-wrap {
      font-size: 10pt;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .tpl-ats .section {
      margin-bottom: 20px;
    }

    .tpl-ats .sec-title {
      font-size: 12pt;
      font-weight: bold;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      padding-bottom: 3px;
      margin-bottom: 10px;
    }

    /* TPL 5: ELEGANT CLASSIC */
    .tpl-elegant {
      padding: 20mm;
      font-family: 'Georgia', serif;
      color: #333;
    }

    .tpl-elegant .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .tpl-elegant .name {
      font-size: 32pt;
      font-variant: small-caps;
      letter-spacing: 2px;
      color: #111;
      margin-bottom: 5px;
    }

    .tpl-elegant .role {
      font-size: 13pt;
      font-style: italic;
      color: #555;
      margin-bottom: 10px;
    }

    .tpl-elegant .contact-wrap {
      font-size: 10pt;
      color: #666;
    }

    .tpl-elegant .body-cols {
      display: flex;
      gap: 30px;
    }

    .tpl-elegant .col-main {
      flex: 2;
    }

    .tpl-elegant .col-side {
      flex: 1;
      border-left: 1px solid #ddd;
      padding-left: 30px;
    }

    .tpl-elegant .sec-title {
      font-size: 14pt;
      padding-bottom: 5px;
      border-bottom: 1px dashed #ccc;
      margin-bottom: 15px;
      text-transform: uppercase;
      color: #222;
      font-weight: bold;
    }

    /* TPL 6: CORPORATE */
    .tpl-corporate {
      padding: 0;
      color: #333;
      min-height: 297mm;
      display: flex;
      flex-direction: column;
    }

    .tpl-corporate .header {
      background: #2563eb;
      color: #fff;
      padding: 20mm;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .tpl-corporate .name {
      font-size: 26pt;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .tpl-corporate .role {
      font-size: 14pt;
      font-weight: 500;
      opacity: 0.9;
    }

    .tpl-corporate .contact-wrap {
      text-align: right;
      font-size: 10pt;
      opacity: 0.9;
    }

    .tpl-corporate .body-cols {
      display: flex;
      padding: 15mm 20mm;
      gap: 35px;
      flex: 1;
      background: #fff;
    }

    .tpl-corporate .col-main {
      flex: 7;
    }

    .tpl-corporate .col-side {
      flex: 3;
    }

    .tpl-corporate .sec-title {
      font-size: 13pt;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 15px;
      text-transform: uppercase;
      border-bottom: 2px solid #bfdbfe;
      padding-bottom: 4px;
    }

    /* TPL 7: CREATIVE */
    .tpl-creative {
      padding: 0;
      display: flex;
      color: #2d3748;
      min-height: 297mm;
    }

    .tpl-creative .left {
      width: 35%;
      background: #fdf2f8;
      padding: 20mm 15mm;
      border-right: 2px solid #fbcfe8;
      flex-shrink: 0;
    }

    .tpl-creative .right {
      flex: 1;
      padding: 20mm 15mm;
      background: #fff;
    }

    .tpl-creative .avatar {
      width: 40mm;
      height: 40mm;
      border-radius: 20mm;
      object-fit: cover;
      margin: 0 auto 20px auto;
      display: block;
      border: 4px solid #f9a8d4;
    }

    .tpl-creative .name {
      font-size: 24pt;
      font-weight: 900;
      color: #db2777;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .tpl-creative .role {
      font-size: 12pt;
      color: #9d174d;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .tpl-creative .contact-item {
      font-size: 10pt;
      margin-bottom: 12px;
      color: #831843;
    }

    .tpl-creative .sec-title {
      font-size: 14pt;
      font-weight: 800;
      color: #be185d;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .tpl-creative .sec-title-left {
      border-bottom: 2px solid #f9a8d4;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }

    /* TPL 8: PROFESSIONAL LEFT */
    .tpl-prof {
      display: flex;
      padding: 0;
      min-height: 297mm;
      background: #fff;
      color: #475569;
    }

    .tpl-prof .left-strip {
      width: 50px;
      background: #0f172a;
    }

    .tpl-prof .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20mm;
    }

    .tpl-prof .header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 35px;
    }

    .tpl-prof .name {
      font-size: 30pt;
      font-weight: 300;
      color: #0f172a;
      margin-bottom: 5px;
    }

    .tpl-prof .name strong {
      font-weight: 800;
    }

    .tpl-prof .role {
      font-size: 14pt;
      color: #0284c7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tpl-prof .contact-wrap {
      display: flex;
      gap: 20px;
      font-size: 10pt;
      color: #64748b;
      margin-top: 15px;
    }

    .tpl-prof .sec-title {
      font-size: 15pt;
      font-weight: 700;
      color: #0f172a;
      border-bottom: 3px solid #0f172a;
      padding-bottom: 5px;
      margin-bottom: 20px;
    }

    /* Common Output Items */
    .item-row {
      margin-bottom: 15px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .item-title {
      font-weight: 700;
      font-size: 11.5pt;
    }

    .item-date {
      font-size: 9.5pt;
      color: #64748b;
      font-weight: 600;
    }

    .item-sub {
      font-size: 10.5pt;
      font-weight: 500;
      font-style: italic;
      color: #3b82f6;
      margin-bottom: 5px;
    }

    .item-desc {
      font-size: 10pt;
      line-height: 1.5;
      color: #475569;
    }

    .badges-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      background: #e2e8f0;
      color: #0f172a;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 9pt;
      font-weight: 600;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #cv-box,
      #cv-box * {
        visibility: visible;
      }

      #cv-box {
        position: absolute;
        left: 0;
        top: 0;
        width: 210mm;
        min-height: 297mm;
        transform: none !important;

      'У':'U','Ф':'F','Х':'X','Ц':'Ts','Ч':'Ch','Ш':'Sh','Щ':'Sh','Ъ":"'",'\u042b':'I','\u042c':'',
      'Э':'E','Ю':'Yu','Я':'Ya','Қ':'Q','Ғ':"G'",'Ҳ':'H','Ў':"O'",'Ҷ':'J',
    };

    const _LAT_TO_CYR_3 = {};
    const _LAT_TO_CYR_2 = {};
    const _LAT_TO_CYR_1 = {};
    (function buildL2C() {
      const APOS = ["'",'\u2019','\u02BB','`'];
      for (const ap of APOS) {
        _LAT_TO_CYR_3['o'+ap] = '\u045E'; _LAT_TO_CYR_3['O'+ap] = '\u040E';
        _LAT_TO_CYR_3['g'+ap] = '\u0493'; _LAT_TO_CYR_3['G'+ap] = '\u0492';
      }
      const DG2 = [
        ['sh','\u0448'],['Sh','\u0428'],['SH','\u0428'],
        ['ch','\u0447'],['Ch','\u0427'],['CH','\u0427'],
        ['ng','\u043d\u0433'],['Ng','\u041d\u0433'],['NG','\u041d\u0413'],
        ['yo','\u0451'],['Yo','\u0401'],['YO','\u0401'],
        ['ya','\u044f'],['Ya','\u042f'],['YA','\u042f'],
        ['yu','\u044e'],['Yu','\u042e'],['YU','\u042e'],
        ['ts','\u0446'],['Ts','\u0426'],['TS','\u0426'],
        ['zh','\u0436'],['Zh','\u0416'],['ZH','\u0416'],
        ['kh','\u0445'],['Kh','\u0425'],['KH','\u0425'],
      ];
      for (const [l,c] of DG2) _LAT_TO_CYR_2[l] = c;
      const SG = [
        ['a','\u0430'],['b','\u0431'],['d','\u0434'],['e','\u0435'],['f','\u0444'],['g','\u0433'],['h','\u04b3'],['i','\u0438'],
        ['j','\u0436'],['k','\u043a'],['l','\u043b'],['m','\u043c'],['n','\u043d'],['o','\u043e'],['p','\u043f'],['q','\u049b'],
        ['r','\u0440'],['s','\u0441'],['t','\u0442'],['u','\u0443'],['v','\u0432'],['w','\u0432'],['x','\u0445'],['y','\u0439'],['z','\u0437'],
        ['A','\u0410'],['B','\u0411'],['D','\u0414'],['E','\u0415'],['F','\u0424'],['G','\u0413'],['H','\u04b2'],['I','\u0418'],
        ['J','\u0416'],['K','\u041a'],['L','\u041b'],['M','\u041c'],['N','\u041d'],['O','\u041e'],['P','\u041f'],['Q','\u049a'],
        ['R','\u0420'],['S','\u0421'],['T','\u0422'],['U','\u0423'],['V','\u0412'],['W','\u0412'],['X','\u0425'],['Y','\u0419'],['Z','\u0417'],
      ];
      for (const [l,c] of SG) _LAT_TO_CYR_1[l] = c;
    })();

    function _cyrToLat(text) {
      return [...text].map(ch => _CYR_TO_LAT[ch] !== undefined ? _CYR_TO_LAT[ch] : ch).join('');
    }

    function _latToCyr(text) {
      const out = []; const len = text.length; let i = 0;
      while (i < len) {
        if (i+2 < len && _LAT_TO_CYR_3[text[i]+text[i+1]+text[i+2]] !== undefined) { out.push(_LAT_TO_CYR_3[text[i]+text[i+1]+text[i+2]]); i+=3; continue; }
        if (i+1 < len && _LAT_TO_CYR_2[text[i]+text[i+1]] !== undefined) { out.push(_LAT_TO_CYR_2[text[i]+text[i+1]]); i+=2; continue; }
        const ch = text[i]; out.push(_LAT_TO_CYR_1[ch] !== undefined ? _LAT_TO_CYR_1[ch] : ch); i++;
      }
      return out.join('');
    }

    function _detectScript(text) {
      let cyr=0,lat=0;
      for (const ch of text) {
        const c = ch.charCodeAt(0);
        if (c>=0x0400&&c<=0x04FF) cyr++;
        else if ((c>=0x41&&c<=0x5A)||(c>=0x61&&c<=0x7A)) lat++;
      }
      if (cyr===0&&lat===0) return null;
      return cyr>=lat ? 'cyr' : 'lat';
    }

    /**
     * transliterateName(name, targetLang)
     * Converts a person's name to the target language script:
     *   uz_lat  → keep original Latin (or convert from Cyrillic)
     *   uz_cyr  → convert to Uzbek Cyrillic
     *   ru      → convert to Russian Cyrillic (same mapping for names)
     *   en      → keep original Latin (or convert Cyr → Lat)
     */
    function transliterateName(name, targetLang) {
      if (!name) return name;
      const script = _detectScript(name);
      if (targetLang === 'uz_cyr' || targetLang === 'ru') {
        // Need Cyrillic output
        if (script === 'lat') return _latToCyr(name);
        return name; // already Cyrillic
      } else {
        // Need Latin output (uz_lat or en)
        if (script === 'cyr') return _cyrToLat(name);
        return name; // already Latin
      }
    }

    // TELEFON - avtomatik +998 va format
    function formatPhone(input) {
      let value = input.value.replace(/\D/g, ''); // faqat raqamlar
      
      // Agar bo'sh bo'lsa
      if (value.length === 0) {
        input.value = '';
        updateCV();
        return;
      }
      
      // 998 bilan boshlanmasa, qo'shish
      if (!value.startsWith('998')) {
        // 8 yoki 9 bilan boshlansa (90, 91, 93, 94, 95, 97, 99, 88, 33, 71...)
        if (value.length >= 1) {
          value = '998' + value;
        }
      }
      
      // 12 raqamdan oshmasin
      value = value.substring(0, 12);
      
      // Format: +998 XX XXX XX XX
      let formatted = '+998';
      if (value.length > 3) {
        formatted += ' ' + value.substring(3, 5); // XX
      }
      if (value.length > 5) {
        formatted += ' ' + value.substring(5, 8); // XXX
      }
      if (value.length > 8) {
        formatted += ' ' + value.substring(8, 10); // XX
      }
      if (value.length > 10) {
        formatted += ' ' + value.substring(10, 12); // XX
      }
      
      input.value = formatted;
      updateCV();
    }

    function autoScale() {
      const wrap = document.getElementById('previewScaleWrapper');
      const pane = document.getElementById('previewPane');
      if (pane.classList.contains('hidden')) return;

      let pw = pane.clientWidth;
      if (!mobilePreview) pw -= 80;

      const natW = 793;
      const scale = Math.min(pw / natW, 1.2);

      wrap.style.transform = `scale(${scale})`;
      if (mobilePreview) {
        wrap.style.marginBottom = `-${(1 - scale) * 1122}px`;
      } else {
        wrap.style.marginBottom = '0';
      }
    }
    window.addEventListener('resize', autoScale);

    setTimeout(() => {
      updateCV();
    }, 100);

    // Toast
    function showToast(msg, type = 'success') {
      const t = document.getElementById('_tg_toast');
      t.textContent = msg;
      t.style.background = type === 'success' 
        ? 'linear-gradient(135deg, #10b981, #059669)' 
        : 'linear-gradient(135deg, #f43f5e, #e11d48)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // Export PDF (client-side fallback)
    async function exportPDF() {
      const btn = document.getElementById('btnPdf');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<svg class="animate-spin h-4 w-4 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Yuklanmoqda...';
      btn.disabled = true;

      const safeName = (v('f_name') || 'CV').replace(/\s+/g, '_');
      const filename = `DASTYOR_CV_${safeName}.pdf`;

      try {
        const el = document.getElementById('cv-box');
        document.getElementById('previewScaleWrapper').style.transform = 'none';
        
        await html2pdf().set({
          margin: 0,
          filename,
          image: { type: 'jpeg', quality: 1.0 },
          html2canvas: { scale: 3, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(el).save();
        
        showToast('✅ PDF muvaffaqiyatli saqlandi!');
      } catch (err) {
        console.error('PDF export error:', err);
        showToast('❌ Xatolik yuz berdi', 'error');
      }

      autoScale();
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }
