<!DOCTYPE html>
<html lang="uz" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Real-time CV Builder | DASTYOR AI</title>
  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet" />
  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- html2pdf for pixel-perfect PDF rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      /* Core Theme (Dark UI) */
      --bg: #060d1c;
      --surface: #0d1b2e;
      --surface2: #14243b;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --green: #10b981;

      /* CV Output Colors (Varies by template, defaults here) */
      --cv-bg: #fff;
      --cv-text: #1e293b;
      --cv-heading: #0f172a;
      --cv-accent: #2563eb;
      --cv-sidebar: #f8fafc;
      --cv-sidebar-text: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .hdr {
      height: 60px;
      background: rgba(13, 27, 46, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: var(--border-hover);
    }

    .hdr-title {
      font-size: 16px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
    }

    /* EXPORT BUTTONS */
    .export-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-pdf {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
    }

    .btn-doc {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* LAYOUT */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* EDITOR PANEL */
    .editor-pane {
      width: 45%;
      min-width: 350px;
      max-width: 500px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .editor-pane::-webkit-scrollbar {
      width: 4px;
    }

    .editor-pane::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .editor-section {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* TEMPLATE SELECTOR */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .tpl-card {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      aspect-ratio: 1 / 1.4;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }

    .tpl-card:hover {
      border-color: var(--muted);
    }

    .tpl-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    /* Tiny CSS drawings to represent the templates visually */
    .tpl-content {
      position: absolute;
      inset: 6px;
      pointer-events: none;
    }

    /* Tpl 1: Minimal */
    .tpl-1-line1 {
      height: 10px;
      width: 60%;
      background: #475569;
      margin-bottom: 4px;
      border-radius: 2px;
    }

    .tpl-1-line2 {
      height: 4px;
      width: 40%;
      background: #94a3b8;
      margin-bottom: 12px;
      border-radius: 2px;
    }

    .tpl-1-block {
      height: 30px;
      width: 100%;
      background: #e2e8f0;
      border-radius: 2px;
    }

    /* Tpl 2: Split */
    .tpl-2-side {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 35%;
      background: var(--accent);
      border-radius: 2px;
    }

    .tpl-2-main {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 60%;
      background: #e2e8f0;
      border-radius: 2px;
    }

    /* Tpl 3: Modern Header */
    .tpl-3-header {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      height: 35%;
      background: #1e293b;
      border-radius: 2px;
    }

    .tpl-3-main {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 60%;
      background: #e2e8f0;
      border-radius: 2px;
    }

    /* FORM CONTROLS */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.03);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .photo-upload {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .photo-preview-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px dashed var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 20px;
    }

    .photo-preview-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* REPEATER FIELDS (Experience / Education) */
    .repeater-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }

    .repeater-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      position: relative;
    }

    .rm-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--red);
      border: none;
      border-radius: 6px;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn {
      width: 100%;
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border: 1px dashed var(--accent);
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    /* PREVIEW PANEL */
    .preview-pane {
      flex: 1;
      background: #0f172a;
      /* Darker background to contrast paper */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow-y: auto;
      position: relative;
    }

    .preview-pane::-webkit-scrollbar {
      width: 6px;
    }

    .preview-pane::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    /* A4 Paper Canvas */
    .cv-canvas {
      width: 210mm;
      min-height: 297mm;
      background: var(--cv-bg);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      /* Transform scale for smaller screens if needed */
      transform-origin: top center;
      position: relative;
      overflow: hidden;
      color: var(--cv-text);
      font-family: inherit;
    }

    /* ─── CV TEMPLATES CSS ─── */
    /* TEMPLATE 1: MINIMAL CLEAN */
    .tpl-minimal {
      padding: 40px 50px;
      font-family: 'Inter', sans-serif;
      color: #334155;
    }

    .tpl-minimal .header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 30px;
    }

    .tpl-minimal .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .tpl-minimal .name {
      font-size: 32px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
      letter-spacing: -1px;
    }

    .tpl-minimal .role {
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .tpl-minimal .contact {
      font-size: 12px;
      color: #64748b;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .tpl-minimal .section {
      margin-bottom: 25px;
    }

    .tpl-minimal .sec-title {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .tpl-minimal .text {
      font-size: 13px;
      line-height: 1.6;
    }

    .tpl-minimal .entry {
      margin-bottom: 15px;
    }

    .tpl-minimal .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .tpl-minimal .entry-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
    }

    .tpl-minimal .entry-date {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    .tpl-minimal .entry-sub {
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 6px;
    }

    /* TEMPLATE 2: SPLIT SIDEBAR */
    .tpl-split {
      display: flex;
      min-height: 297mm;
      font-family: 'Inter', sans-serif;
    }

    .tpl-split .sidebar {
      width: 32%;
      background: #1e293b;
      color: #f8fafc;
      padding: 40px 25px;
    }

    .tpl-split .mainbar {
      width: 68%;
      background: #fff;
      padding: 40px;
      color: #334155;
    }

    .tpl-split .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #3b82f6;
      margin: 0 auto 20px;
      display: block;
    }

    .tpl-split .name {
      font-size: 28px;
      font-weight: 800;
      color: #3b82f6;
      margin-bottom: 5px;
      line-height: 1.1;
    }

    .tpl-split .role {
      font-size: 15px;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #334155;
      padding-bottom: 15px;
    }

    .tpl-split .sec-title-side {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .tpl-split .contact-item {
      font-size: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #cbd5e1;
      word-breaks: break-all;
    }

    .tpl-split .sec-title-main {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
      text-transform: uppercase;
      margin-bottom: 15px;
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 8px;
      letter-spacing: 1px;
    }

    .tpl-split .section {
      margin-bottom: 25px;
    }

    .tpl-split .text {
      font-size: 13px;
      line-height: 1.6;
    }

    .tpl-split .entry {
      margin-bottom: 18px;
    }

    .tpl-split .entry-title {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
    }

    .tpl-split .entry-sub {
      font-size: 13px;
      font-weight: 600;
      color: #3b82f6;
      margin-bottom: 4px;
    }

    .tpl-split .entry-date {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      display: block;
    }

    /* TEMPLATE 3: MODERN HEADER */
    .tpl-modern {
      background: #fff;
      color: #334155;
      font-family: 'Outfit', sans-serif;
    }

    .tpl-modern .header {
      background: #0f172a;
      color: #fff;
      padding: 50px 40px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .tpl-modern .avatar {
      width: 140px;
      height: 140px;
      border-radius: 20px;
      object-fit: cover;
      background: #fff;
    }

    .tpl-modern .header-info {
      flex: 1;
    }

    .tpl-modern .name {
      font-size: 38px;
      font-weight: 800;
      margin-bottom: 5px;
      letter-spacing: -1px;
      color: #fff;
    }

    .tpl-modern .role {
      font-size: 16px;
      font-weight: 500;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .tpl-modern .contact {
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tpl-modern .body {
      padding: 40px;
      display: flex;
      gap: 40px;
    }

    .tpl-modern .col-main {
      width: 60%;
    }

    .tpl-modern .col-side {
      width: 40%;
    }

    .tpl-modern .sec-title {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tpl-modern .sec-title::before {
      content: '';
      width: 24px;
      height: 3px;
      background: #38bdf8;
      display: block;
    }

    .tpl-modern .section {
      margin-bottom: 35px;
    }

    .tpl-modern .text {
      font-size: 13.5px;
      line-height: 1.7;
      font-family: 'Inter', sans-serif;
    }

    .tpl-modern .entry {
      position: relative;
      padding-left: 20px;
      border-left: 2px solid #e2e8f0;
      margin-bottom: 20px;
    }

    .tpl-modern .entry::before {
      content: '';
      position: absolute;
      left: -6px;
      top: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #38bdf8;
    }

    .tpl-modern .entry-title {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 2px;
    }

    .tpl-modern .entry-sub {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
    }

    .tpl-modern .entry-date {
      font-size: 12px;
      color: #38bdf8;
      font-weight: 600;
      margin-bottom: 8px;
      font-family: 'Inter', sans-serif;
    }

    .badges-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      background: #f1f5f9;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      font-family: 'Inter', sans-serif;
    }

    .tpl-split .badge {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* Print Override */
    @media print {
      body * {
        visibility: hidden;
      }

      #cv-box,
      #cv-box * {
        visibility: visible;
      }

      #cv-box {
        position: absolute;
        left: 0;
        top: 0;
        width: 210mm;
        min-height: 297mm;
        transform: none !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>

<body>

  <div class="hdr">
    <div class="hdr-left">
      <a href="index.html" class="back-btn">←</a>
      <div class="hdr-title">CV Builder</div>
    </div>
    <div class="export-group">
      <button class="btn btn-doc" onclick="exportWord()">📄 Word (.docx)</button>
      <button class="btn btn-pdf" onclick="exportPDF()">📥 PDF Yuklash</button>
    </div>
  </div>

  <div class="workspace">
    <!-- LEFT: UI INPUTS -->
    <div class="editor-pane" id="editorPane">

      <div class="editor-section">
        <div class="section-title">✨ Dizayn shablonlari</div>
        <div class="template-grid" id="tplGrid">
          <!-- Cards are generated via JS -->
        </div>
      </div>

      <div class="editor-section">
        <div class="section-title">👤 Shaxsiy Ma'lumotlar</div>

        <div class="photo-upload">
          <div class="photo-preview-circle" id="photoPrev">📸</div>
          <div>
            <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(this)">
            <button class="photo-btn" onclick="document.getElementById('imgInput').click()">Rasm yuklash</button>
          </div>
        </div>

        <div class="form-group">
          <label>F.I.SH (To'liq ism)</label>
          <input type="text" id="f_name" class="form-control" placeholder="Masalan: Alisher Navoiy"
            oninput="updateCV()">
        </div>
        <div class="form-group">
          <label>Kasb / Mutaxassislik</label>
          <input type="text" id="f_role" class="form-control" placeholder="Senior Frontend Developer"
            oninput="updateCV()">
        </div>
        <div class="form-group">
          <label>Haqimda (Qisqacha)</label>
          <textarea id="f_about" class="form-control" placeholder="O'zingiz va maqsadlaringiz haqida..."
            oninput="updateCV()"></textarea>
        </div>

        <div style="display:flex; gap:12px;">
          <div class="form-group" style="flex:1">
            <label>Email</label>
            <input type="email" id="f_email" class="form-control" placeholder="mail@gmail.com" oninput="updateCV()">
          </div>
          <div class="form-group" style="flex:1">
            <label>Telefon</label>
            <input type="text" id="f_phone" class="form-control" placeholder="+998 90 123 45 67" oninput="updateCV()">
          </div>
        </div>
        <div class="form-group">
          <label>Manzil</label>
          <input type="text" id="f_loc" class="form-control" placeholder="Toshkent, O'zbekiston" oninput="updateCV()">
        </div>
      </div>

      <div class="editor-section">
        <div class="section-title">💻 Ko'nikmalar (Skills)</div>
        <div class="form-group">
          <label>Ko'nikmalarni vergul bilan ajratib yozing</label>
          <textarea id="f_skills" class="form-control" placeholder="JavaScript, React, Python, UI/UX"
            oninput="updateCV()"></textarea>
        </div>
      </div>

      <div class="editor-section">
        <div class="section-title">💼 Ish Tajribasi</div>
        <div class="repeater-list" id="expList"></div>
        <button class="add-btn" onclick="addExp()">+ Yangi ish joyi qo'shish</button>
      </div>

      <div class="editor-section">
        <div class="section-title">🎓 Ta'lim</div>
        <div class="repeater-list" id="eduList"></div>
        <button class="add-btn" onclick="addEdu()">+ Ta'lim joyi qo'shish</button>
      </div>

    </div>

    <!-- RIGHT: LIVE PREVIEW -->
    <div class="preview-pane">
      <div class="cv-canvas" id="cv-box">
        <!-- Inner HTML injected live -->
      </div>
    </div>
  </div>

  <script>
    // STATE
    let activeTpl = 'split'; // minimal, split, modern
    let avatarUrl = '';
    let experiences = [{ id: 1, title: '', company: '', date: '', desc: '' }];
    let educations = [{ id: 1, degree: '', school: '', date: '' }];

    // UI SETUP
    const tplConfig = [
      { id: 'minimal', name: 'Minimal', html: '<div class="tpl-content"><div class="tpl-1-line1"></div><div class="tpl-1-line2"></div><div class="tpl-1-block"></div><div class="tpl-1-block" style="margin-top:4px"></div></div>' },
      { id: 'split', name: 'Professional', html: '<div class="tpl-content"><div class="tpl-2-side"></div><div class="tpl-2-main"></div></div>' },
      { id: 'modern', name: 'Modern', html: '<div class="tpl-content"><div class="tpl-3-header"></div><div class="tpl-3-main"></div></div>' }
    ];

    function initTpls() {
      const wrap = document.getElementById('tplGrid');
      wrap.innerHTML = tplConfig.map(t =>
        `<div class="tpl-card ${activeTpl === t.id ? 'active' : ''}" onclick="setTpl('${t.id}')">
                    ${t.html}
                </div>`
      ).join('');
    }

    function setTpl(id) {
      activeTpl = id;
      initTpls();
      updateCV();
    }

    // IMAGE HANDLER
    function handleImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
          avatarUrl = e.target.result;
          document.getElementById('photoPrev').innerHTML = `<img src="${avatarUrl}">`;
          updateCV();
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    // REPEATER LOGIC
    function addExp() { experiences.push({ id: Date.now(), title: '', company: '', date: '', desc: '' }); renderExp(); updateCV(); }
    function removeExp(id) { experiences = experiences.filter(x => x.id !== id); renderExp(); updateCV(); }
    function renderExp() {
      document.getElementById('expList').innerHTML = experiences.map((ex, i) => `
                <div class="repeater-item">
                    <button class="rm-btn" onclick="removeExp(${ex.id})">×</button>
                    <input type="text" class="form-control" style="margin-bottom:8px" placeholder="Lavozim (masalan: Frontend Developer)" value="${ex.title}" oninput="experiences[${i}].title=this.value; updateCV()">
                    <div style="display:flex;gap:8px;margin-bottom:8px;">
                        <input type="text" class="form-control" placeholder="Kompaniya" value="${ex.company}" oninput="experiences[${i}].company=this.value; updateCV()">
                        <input type="text" class="form-control" placeholder="Muddat (2020-2023)" value="${ex.date}" oninput="experiences[${i}].date=this.value; updateCV()">
                    </div>
                    <textarea class="form-control" placeholder="Vazifalar va yutuqlar..." oninput="experiences[${i}].desc=this.value; updateCV()">${ex.desc}</textarea>
                </div>
            `).join('');
    }

    function addEdu() { educations.push({ id: Date.now(), degree: '', school: '', date: '' }); renderEdu(); updateCV(); }
    function removeEdu(id) { educations = educations.filter(x => x.id !== id); renderEdu(); updateCV(); }
    function renderEdu() {
      document.getElementById('eduList').innerHTML = educations.map((ed, i) => `
                <div class="repeater-item">
                    <button class="rm-btn" onclick="removeEdu(${ed.id})">×</button>
                    <input type="text" class="form-control" style="margin-bottom:8px" placeholder="Mutaxassislik (Bakalavr...)" value="${ed.degree}" oninput="educations[${i}].degree=this.value; updateCV()">
                    <div style="display:flex;gap:8px">
                        <input type="text" class="form-control" placeholder="Universitet/Maktab" value="${ed.school}" oninput="educations[${i}].school=this.value; updateCV()">
                        <input type="text" class="form-control" placeholder="Yillar" value="${ed.date}" oninput="educations[${i}].date=this.value; updateCV()">
                    </div>
                </div>
            `).join('');
    }

    // INIT
    initTpls();
    renderExp();
    renderEdu();

    // CORE ENGINE: LIVE PREVIEW RENDERER
    function v(id) { return document.getElementById(id).value.trim(); }

    function updateCV() {
      const data = {
        name: v('f_name') || 'Alisher Navoiy',
        role: v('f_role') || 'Sizning Kasbingiz',
        about: v('f_about') || "O'zingiz haqingizda ma'lumot qoldiring. Bu qism sizning maqsadlaringiz, xarakteringiz va sohadagi qiziqishlaringiz haqida qisqacha bo'ladi.",
        email: v('f_email') || 'example@mail.com',
        phone: v('f_phone') || '+998 90 000 00 00',
        loc: v('f_loc') || "Toshkent, O'zbekiston",
        skills: v('f_skills') ? v('f_skills').split(',').map(s => s.trim()).filter(s => s) : ['Muloqot', 'Liderlik', 'Jamoaviy ishlash'],
        exp: experiences.filter(e => e.title || e.company),
        edu: educations.filter(e => e.degree || e.school),
        img: avatarUrl || 'https://via.placeholder.com/150'
      };

      const box = document.getElementById('cv-box');

      // Build Skills Badges
      const skillsHtml = data.skills.map(s => `<div class="badge">${s}</div>`).join('');

      // Build Exp and Edu HTML
      const expHtml = data.exp.length > 0 ? data.exp.map(e => `
                <div class="entry">
                    <div class="entry-header">
                        <div class="entry-title">${e.title}</div>
                        <div class="entry-date">${e.date}</div>
                    </div>
                    <div class="entry-sub">${e.company}</div>
                    <div class="text">${e.desc}</div>
                </div>
            `).join('') : '<div class="text">Tajriba ma\'lumoti yo\'q.</div>';

      const eduHtml = data.edu.length > 0 ? data.edu.map(e => `
                <div class="entry">
                    <div class="entry-header">
                        <div class="entry-title">${e.degree}</div>
                        <div class="entry-date">${e.date}</div>
                    </div>
                    <div class="entry-sub">${e.school}</div>
                </div>
            `).join('') : '<div class="text">Ta\'lim ma\'lumoti yo\'q.</div>';

      // HTML TEMPLATE RENDERERS
      if (activeTpl === 'minimal') {
        box.className = 'cv-canvas tpl-minimal';
        box.innerHTML = `
                    <div class="header">
                        ${avatarUrl ? `<img src="${data.img}" class="avatar">` : ''}
                        <div class="name">${data.name}</div>
                        <div class="role">${data.role}</div>
                        <div class="contact">
                            <span>📧 ${data.email}</span>
                            <span>📞 ${data.phone}</span>
                            <span>📍 ${data.loc}</span>
                        </div>
                    </div>
                    <div class="section">
                        <div class="sec-title">Haqimda</div>
                        <div class="text">${data.about}</div>
                    </div>
                    <div class="section">
                        <div class="sec-title">Tajriba</div>
                        ${expHtml}
                    </div>
                    <div class="section">
                        <div class="sec-title">Ta'lim</div>
                        ${eduHtml}
                    </div>
                    <div class="section">
                        <div class="sec-title">Ko'nikmalar</div>
                        <div class="badges-wrap">${skillsHtml}</div>
                    </div>
                `;
      }
      else if (activeTpl === 'split') {
        box.className = 'cv-canvas tpl-split';
        box.innerHTML = `
                    <div class="sidebar">
                        <img src="${data.img}" class="avatar">
                        
                        <div class="section" style="margin-top:30px">
                            <div class="sec-title-side">Kontakt ma'lumotlar</div>
                            <div class="contact-item">📞 <span>${data.phone}</span></div>
                            <div class="contact-item">📧 <span>${data.email}</span></div>
                            <div class="contact-item">📍 <span>${data.loc}</span></div>
                        </div>

                        <div class="section">
                            <div class="sec-title-side">Ko'nikmalar</div>
                            <div class="badges-wrap" style="flex-direction:column; gap:6px;">
                                ${data.skills.map(s => `<div class="badge">${s}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="mainbar">
                        <div class="name">${data.name}</div>
                        <div class="role">${data.role}</div>

                        <div class="section">
                            <div class="sec-title-main">Qisqacha profil</div>
                            <div class="text">${data.about}</div>
                        </div>

                        <div class="section">
                            <div class="sec-title-main">Professional Tajriba</div>
                            ${expHtml}
                        </div>

                        <div class="section">
                            <div class="sec-title-main">Ta'lim</div>
                            ${eduHtml}
                        </div>
                    </div>
                `;
      }
      else if (activeTpl === 'modern') {
        box.className = 'cv-canvas tpl-modern';
        box.innerHTML = `
                    <div class="header">
                        <img src="${data.img}" class="avatar">
                        <div class="header-info">
                            <div class="name">${data.name}</div>
                            <div class="role">${data.role}</div>
                            <div class="contact">
                                <div>📞 ${data.phone} &nbsp; | &nbsp; 📧 ${data.email}</div>
                                <div>📍 ${data.loc}</div>
                            </div>
                        </div>
                    </div>
                    <div class="body">
                        <div class="col-main">
                            <div class="section">
                                <div class="sec-title">Haqimda</div>
                                <div class="text">${data.about}</div>
                            </div>
                            <div class="section">
                                <div class="sec-title">Ish Tajribasi</div>
                                ${expHtml}
                            </div>
                        </div>
                        <div class="col-side">
                            <div class="section">
                                <div class="sec-title">Ta'lim</div>
                                ${eduHtml}
                            </div>
                            <div class="section">
                                <div class="sec-title">Ko'nikmalar</div>
                                <div class="badges-wrap">
                                    ${skillsHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
      }

      autoScale();
    }

    // Scale canvas to fit viewport
    function autoScale() {
      const pane = document.querySelector('.preview-pane');
      const box = document.getElementById('cv-box');

      // A4 ratio 210 x 297 (~0.707)
      const padding = 60;
      const paneW = pane.clientWidth - padding;
      const paneH = pane.clientHeight - padding;

      // Native A4 in px (approx exactly what css has - 210mm is 793px)
      const natW = 793;
      const natH = 1122;

      const scaleW = paneW / natW;
      const scaleH = paneH / natH;
      const scale = Math.min(scaleW, scaleH, 1); // no scale up beyond 1

      box.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', autoScale);

    // INITIALIZE LIVE PREVIEW
    setTimeout(() => updateCV(), 100);

    // EXTRA ACTIONS
    function exportPDF() {
      const el = document.getElementById('cv-box');
      // Remove scale temporarily to render full quality
      el.style.transform = 'none';

      const opt = {
        margin: 0,
        filename: 'DASTYOR_CV_' + new Date().getTime() + '.pdf',
        image: { type: 'jpeg', quality: 1.0 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      const btn = document.querySelector('.btn-pdf');
      btn.innerHTML = "⏳ Kutib turing...";
      btn.disabled = true;

      html2pdf().set(opt).from(el).save().then(() => {
        autoScale();
        btn.innerHTML = "📥 PDF Yuklash";
        btn.disabled = false;

        // Show floating notification
        const tg = window.Telegram?.WebApp;
        if (tg && tg.showAlert) tg.showAlert("PDF Qurilmangizga saqlandi!");
      });
    }

    function exportWord() {
      // Because pixel-perfect complex html styling to .docx inside purely client JS is generally broken,
      // we will send the raw text payload to the backend OR instruct user.
      // As required by user, UI logic should explain implementation.

      // In a real full-stack app, we would POST `data` to backend and return a .docx. 
      // For now, let's trigger an alert explaining exactly this logic.
      alert("Word (.docx) formatida yuklash uchun ushbu ma'lumotlar backend API (Python) ga yuboriladi va tayyor Docx fayl qaytariladi. Hozircha bu PDF opsiyasi orqali to'liq ishlaydi. \n\n (Implementation: Serverga JSON payload ketadi, server 'python-docx' yordamida shablonni to'ldirib qaytaradi)");
    }
  </script>
</body>
