<!DOCTYPE html>
<html lang="uz" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Real-time CV Builder | DASTYOR AI</title>
  <!-- 1. Theme init FIRST — prevents flash of wrong theme -->
  <script src="theme-init.js"></script>
  <!-- 2. Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- 3. Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- 4. Global theme tokens -->
  <link rel="stylesheet" href="theme.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            apple: {
              blue: '#0A84FF',
              green: '#30D158',
              orange: '#FF9F0A',
              purple: '#BF5AF2',
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      overscroll-behavior-y: none;
      background: var(--da-bg-page);
      color: var(--da-text-primary);
    }

    .scroller::-webkit-scrollbar {
      width: 5px;
    }

    .scroller::-webkit-scrollbar-thumb {
      background: rgba(150, 150, 150, 0.3);
      border-radius: 4px;
    }

    /* ─── CV OUTPUT CANVAS ─── */
    .cv-canvas-wrapper {
      position: relative;
      transform-origin: top center;
      transition: transform 0.1s ease;
    }

    .cv-canvas {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      margin-bottom: 30px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* TPL 1: MINIMAL */
    .tpl-minimal {
      color: #1e293b;
      padding: 25mm 20mm;
    }

    .tpl-minimal .header {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 20px;
    }

    .tpl-minimal .avatar {
      width: 35mm;
      height: 35mm;
      border-radius: 5px;
      object-fit: cover;
    }

    .tpl-minimal .name {
      font-size: 26pt;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .tpl-minimal .role {
      font-size: 14pt;
      color: #3b82f6;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .tpl-minimal .contact-wrap {
      display: flex;
      gap: 15px;
      font-size: 10pt;
      color: #64748b;
    }

    .tpl-minimal .section {
      margin-bottom: 25px;
    }

    .tpl-minimal .sec-title {
      font-size: 13pt;
      font-weight: 700;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .tpl-minimal .text {
      font-size: 10.5pt;
      line-height: 1.6;
    }

    /* TPL 2: SPLIT PROFESSIONAL */
    .tpl-split {
      display: flex;
      color: #1e293b;
      padding: 0;
      min-height: 297mm;
    }

    .tpl-split .sidebar {
      width: 32%;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20mm 10mm;
      flex-shrink: 0;
    }

    .tpl-split .main {
      flex: 1;
      padding: 20mm 15mm;
    }

    .tpl-split .avatar {
      width: 35mm;
      height: 35mm;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #334155;
      margin-bottom: 20px;
    }

    .tpl-split .name {
      font-size: 24pt;
      font-weight: 800;
      color: #e2e8f0;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .tpl-split .role {
      font-size: 12pt;
      color: #3b82f6;
      font-weight: 500;
      margin-bottom: 30px;
    }

    .tpl-split .sec-title-main {
      font-size: 14pt;
      font-weight: 800;
      color: #0f172a;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .tpl-split .sec-title-side {
      font-size: 12pt;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .tpl-split .contact-item {
      font-size: 9.5pt;
      margin-bottom: 10px;
      line-height: 1.4;
      word-break: break-all;
    }

    .tpl-split .section {
      margin-bottom: 25px;
    }

    /* TPL 3: MODERN HEADER */
    .tpl-modern {
      padding: 0;
      color: #334155;
      min-height: 297mm;
    }

    .tpl-modern .header {
      background: #1e293b;
      color: white;
      padding: 20mm;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .tpl-modern .avatar {
      width: 40mm;
      height: 40mm;
      border-radius: 12px;
      object-fit: cover;
    }

    .tpl-modern .name {
      font-size: 28pt;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 5px;
    }

    .tpl-modern .role {
      font-size: 14pt;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    .tpl-modern .contact {
      font-size: 10pt;
      opacity: 0.8;
      line-height: 1.5;
    }

    .tpl-modern .body {
      display: flex;
      padding: 15mm 20mm;
      gap: 40px;
    }

    .tpl-modern .col-main {
      flex: 6;
    }

    .tpl-modern .col-side {
      flex: 4;
    }

    .tpl-modern .sec-title {
      font-size: 14pt;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    /* TPL 4: ATS SAFE */
    .tpl-ats {
      padding: 20mm;
      font-family: 'Arial', sans-serif;
      color: #000;
    }

    .tpl-ats .header {
      text-align: center;
      border-bottom: 1px solid #000;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .tpl-ats .name {
      font-size: 24pt;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .tpl-ats .role {
      font-size: 12pt;
      margin-bottom: 10px;
    }

    .tpl-ats .contact-wrap {
      font-size: 10pt;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .tpl-ats .section {
      margin-bottom: 20px;
    }

    .tpl-ats .sec-title {
      font-size: 12pt;
      font-weight: bold;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      padding-bottom: 3px;
      margin-bottom: 10px;
    }

    /* TPL 5: ELEGANT CLASSIC */
    .tpl-elegant {
      padding: 20mm;
      font-family: 'Georgia', serif;
      color: #333;
    }

    .tpl-elegant .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .tpl-elegant .name {
      font-size: 32pt;
      font-variant: small-caps;
      letter-spacing: 2px;
      color: #111;
      margin-bottom: 5px;
    }

    .tpl-elegant .role {
      font-size: 13pt;
      font-style: italic;
      color: #555;
      margin-bottom: 10px;
    }

    .tpl-elegant .contact-wrap {
      font-size: 10pt;
      color: #666;
    }

    .tpl-elegant .body-cols {
      display: flex;
      gap: 30px;
    }

    .tpl-elegant .col-main {
      flex: 2;
    }

    .tpl-elegant .col-side {
      flex: 1;
      border-left: 1px solid #ddd;
      padding-left: 30px;
    }

    .tpl-elegant .sec-title {
      font-size: 14pt;
      padding-bottom: 5px;
      border-bottom: 1px dashed #ccc;
      margin-bottom: 15px;
      text-transform: uppercase;
      color: #222;
      font-weight: bold;
    }

    /* TPL 6: CORPORATE */
    .tpl-corporate {
      padding: 0;
      color: #333;
      min-height: 297mm;
      display: flex;
      flex-direction: column;
    }

    .tpl-corporate .header {
      background: #2563eb;
      color: #fff;
      padding: 20mm;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .tpl-corporate .name {
      font-size: 26pt;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .tpl-corporate .role {
      font-size: 14pt;
      font-weight: 500;
      opacity: 0.9;
    }

    .tpl-corporate .contact-wrap {
      text-align: right;
      font-size: 10pt;
      opacity: 0.9;
    }

    .tpl-corporate .body-cols {
      display: flex;
      padding: 15mm 20mm;
      gap: 35px;
      flex: 1;
      background: #fff;
    }

    .tpl-corporate .col-main {
      flex: 7;
    }

    .tpl-corporate .col-side {
      flex: 3;
    }

    .tpl-corporate .sec-title {
      font-size: 13pt;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 15px;
      text-transform: uppercase;
      border-bottom: 2px solid #bfdbfe;
      padding-bottom: 4px;
    }

    /* TPL 7: CREATIVE */
    .tpl-creative {
      padding: 0;
      display: flex;
      color: #2d3748;
      min-height: 297mm;
    }

    .tpl-creative .left {
      width: 35%;
      background: #fdf2f8;
      padding: 20mm 15mm;
      border-right: 2px solid #fbcfe8;
      flex-shrink: 0;
    }

    .tpl-creative .right {
      flex: 1;
      padding: 20mm 15mm;
      background: #fff;
    }

    .tpl-creative .avatar {
      width: 40mm;
      height: 40mm;
      border-radius: 20mm;
      object-fit: cover;
      margin: 0 auto 20px auto;
      display: block;
      border: 4px solid #f9a8d4;
    }

    .tpl-creative .name {
      font-size: 24pt;
      font-weight: 900;
      color: #db2777;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .tpl-creative .role {
      font-size: 12pt;
      color: #9d174d;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .tpl-creative .contact-item {
      font-size: 10pt;
      margin-bottom: 12px;
      color: #831843;
    }

    .tpl-creative .sec-title {
      font-size: 14pt;
      font-weight: 800;
      color: #be185d;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .tpl-creative .sec-title-left {
      border-bottom: 2px solid #f9a8d4;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }

    /* TPL 8: PROFESSIONAL LEFT */
    .tpl-prof {
      display: flex;
      padding: 0;
      min-height: 297mm;
      background: #fff;
      color: #475569;
    }

    .tpl-prof .left-strip {
      width: 50px;
      background: #0f172a;
    }

    .tpl-prof .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20mm;
    }

    .tpl-prof .header {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 35px;
    }

    .tpl-prof .name {
      font-size: 30pt;
      font-weight: 300;
      color: #0f172a;
      margin-bottom: 5px;
    }

    .tpl-prof .name strong {
      font-weight: 800;
    }

    .tpl-prof .role {
      font-size: 14pt;
      color: #0284c7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tpl-prof .contact-wrap {
      display: flex;
      gap: 20px;
      font-size: 10pt;
      color: #64748b;
      margin-top: 15px;
    }

    .tpl-prof .sec-title {
      font-size: 15pt;
      font-weight: 700;
      color: #0f172a;
      border-bottom: 3px solid #0f172a;
      padding-bottom: 5px;
      margin-bottom: 20px;
    }

    /* Common Output Items */
    .item-row {
      margin-bottom: 15px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .item-title {
      font-weight: 700;
      font-size: 11.5pt;
    }

    .item-date {
      font-size: 9.5pt;
      color: #64748b;
      font-weight: 600;
    }

    .item-sub {
      font-size: 10.5pt;
      font-weight: 500;
      font-style: italic;
      color: #3b82f6;
      margin-bottom: 5px;
    }

    .item-desc {
      font-size: 10pt;
      line-height: 1.5;
      color: #475569;
    }

    .badges-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      background: #e2e8f0;
      color: #0f172a;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 9pt;
      font-weight: 600;
    }

    .suggest-chip {
      border: 1px solid rgba(59, 130, 246, 0.25);
      background: rgba(59, 130, 246, 0.08);
      color: #60a5fa;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
    }

    .suggest-chip:hover {
      transform: translateY(-1px);
      background: rgba(59, 130, 246, 0.14);
    }

    .suggest-chip.active {
      background: #0A84FF;
      color: #fff;
      border-color: #0A84FF;
      box-shadow: 0 8px 20px rgba(10, 132, 255, .35);
    }

    .accent-btn {
      width: 52px;
      height: 22px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .2s ease;
    }

    .accent-btn.active {
      transform: translateY(-1px) scale(1.04);
      border-color: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .25);
    }

    .photo-drop-active {
      outline: 2px dashed #0A84FF;
      outline-offset: 3px;
      box-shadow: 0 12px 30px rgba(10, 132, 255, .3);
    }

    .clear-btn {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      font-weight: 700;
      border-radius: 12px;
      padding: 11px 14px;
      width: 100%;
      transition: all .2s ease;
    }

    .clear-btn:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .cv-canvas.themable {
      --cv-accent: #0A84FF;
    }

    .cv-canvas.themable .role,
    .cv-canvas.themable .sec-title,
    .cv-canvas.themable .sec-title-main,
    .cv-canvas.themable .sec-title-side,
    .cv-canvas.themable .sec-title-left,
    .cv-canvas.themable .item-sub {
      color: var(--cv-accent) !important;
    }

    .cv-canvas.themable .sec-title,
    .cv-canvas.themable .sec-title-main,
    .cv-canvas.themable .sec-title-side,
    .cv-canvas.themable .sec-title-left {
      border-color: var(--cv-accent) !important;
    }

    .cv-canvas.themable .badge {
      background: var(--cv-accent);
      color: #ffffff;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #cv-box,
      #cv-box * {
        visibility: visible;
      }

      #cv-box {
        position: absolute;
        left: 0;
        top: 0;
        width: 210mm;
        min-height: 297mm;
        transform: none !important;
        box-shadow: none !important;
        margin: 0;
      }
    }
  </style>

  <!-- DASTYOR AI SDK (must load before page script) -->
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</head>

<body
  class="text-neutral-900 dark:text-neutral-100 flex flex-col min-h-screen overflow-y-auto antialiased selection:bg-apple-purple selection:text-white">

  <!-- Global Header -->
  <header class="builder-header h-16 flex-shrink-0 flex items-center justify-between px-4 z-50">
    <div class="flex items-center gap-3">
      <a href="index.html"
        class="w-10 h-10 rounded-xl bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-colors flex items-center justify-center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6" />
        </svg>
      </a>
      <h1 class="font-display font-bold text-lg tracking-tight">CV Builder</h1>
    </div>
    <div class="flex items-center gap-2">
      <!-- Mobile Toggle -->
      <button id="mobileViewToggle" onclick="toggleMobileView()"
        class="md:hidden px-4 py-2 bg-black/5 dark:bg-white/10 rounded-xl font-semibold text-sm"
        data-i18n="cv_btn_preview">
        👁️ Preview
      </button>
      <button onclick="exportPDF()" id="btnPdf"
        class="flex items-center gap-2 px-4 py-2 bg-gradient-to-br from-[#ef4444] to-[#dc2626] hover:opacity-90 active:scale-95 text-white rounded-xl font-bold text-sm transition-all shadow-md">
        📥 PDF yuklab olish
      </button>
    </div>
  </header>

  <div class="flex flex-col lg:flex-row flex-1 relative overflow-hidden">

    <!-- EDITOR PANE -->
    <div id="editorPane"
      class="w-full lg:w-[45%] lg:max-w-md h-full scroller overflow-y-auto bg-white dark:bg-[#0a0a0c] border-b lg:border-b-0 lg:border-r border-black/5 dark:border-white/5 pb-8">

      <!-- TEMPLATE SETTINGS -->
      <div class="p-6">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-8 h-8 rounded-lg bg-apple-purple/10 flex items-center justify-center text-apple-purple">🎨</div>
          <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50"
            data-i18n="cv_tpl_title">Dizayn Shablon</h2>
        </div>

        <div class="grid grid-cols-4 md:grid-cols-4 gap-2">
          <!-- 1 Minimal -->
          <div
            class="tpl-card border-2 border-apple-purple rounded-xl aspect-[1/1.4] cursor-pointer hover:border-apple-purple/80 bg-black/5 dark:bg-white/5 relative overflow-hidden group"
            onclick="setTpl('minimal')" id="tpl-minimal">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10">
              Minimal</div>
            <div class="absolute inset-0 flex flex-col p-1.5 opacity-80">
              <div class="w-1/2 h-[2px] bg-black/20 dark:bg-white/20 mb-0.5 rounded"></div>
              <div class="w-1/3 h-[1px] bg-black/10 dark:bg-white/10 mb-1 rounded"></div>
              <div class="w-full h-[1px] bg-black/10 dark:bg-white/10 mb-1 rounded"></div>
              <div class="w-3/4 h-2 bg-black/10 dark:bg-white/10 rounded"></div>
            </div>
          </div>

          <!-- 2 Split -->
          <div
            class="tpl-card border-2 border-transparent hover:border-apple-purple/50 rounded-xl aspect-[1/1.4] cursor-pointer bg-black/5 dark:bg-white/5 relative overflow-hidden flex group"
            onclick="setTpl('split')" id="tpl-split">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10 hidden group-hover:block">
              Split</div>
            <div class="w-1/3 h-full bg-black/30 dark:bg-white/30"></div>
            <div class="w-2/3 h-full p-1.5 flex flex-col gap-0.5 opacity-80">
              <div class="w-3/4 h-[2px] bg-black/20 dark:bg-white/20 rounded"></div>
              <div class="w-full h-2 mt-1 bg-black/10 dark:bg-white/10 rounded"></div>
            </div>
          </div>

          <!-- 3 Modern -->
          <div
            class="tpl-card border-2 border-transparent hover:border-apple-purple/50 rounded-xl aspect-[1/1.4] cursor-pointer bg-black/5 dark:bg-white/5 relative overflow-hidden flex flex-col group"
            onclick="setTpl('modern')" id="tpl-modern">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10 hidden group-hover:block">
              Modern</div>
            <div class="h-1/3 w-full bg-black/30 dark:bg-white/30 mb-0.5"></div>
            <div class="flex-1 px-1 flex gap-1 opacity-80">
              <div class="w-2/3 h-full bg-black/10 dark:bg-white/10 rounded"></div>
              <div class="w-1/3 h-full bg-black/10 dark:bg-white/10 rounded"></div>
            </div>
          </div>

          <!-- 4 ATS Safe -->
          <div
            class="tpl-card border-2 border-transparent hover:border-apple-purple/50 rounded-xl aspect-[1/1.4] cursor-pointer bg-black/5 dark:bg-white/5 relative overflow-hidden group"
            onclick="setTpl('ats')" id="tpl-ats">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10 hidden group-hover:block">
              ATS Safe</div>
            <div class="absolute inset-0 flex flex-col p-1.5 opacity-80 items-center">
              <div class="w-3/4 h-[2px] bg-black/30 dark:bg-white/30 mb-1 rounded text-center"></div>
              <div class="w-full h-[1px] bg-black/10 dark:bg-white/10 mb-1 rounded"></div>
              <div class="w-full flex-1 bg-black/5 dark:bg-white/5 rounded"></div>
            </div>
          </div>

          <!-- 5 Elegant -->
          <div

          <div

            onclick="setTpl('corporate')" id="tpl-corporate">
            <div

            <div class="h-[25%] w-full bg-[#2563eb] mb-1"></div>
            <div class="flex-1 px-1 flex gap-1 opacity-80">
              <div class="w-3/4 h-full bg-black/5 dark:bg-white/5 rounded border-t-2 border-[#bfdbfe]"></div>

          <!-- 7 Creative -->
          <div
            class="tpl-card border-2 border-transparent hover:border-apple-purple/50 rounded-xl aspect-[1/1.4] cursor-pointer bg-black/5 dark:bg-white/5 relative overflow-hidden flex group"
            onclick="setTpl('creative')" id="tpl-creative">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10 hidden group-hover:block">
              Creative</div>
            <div
              class="w-[35%] h-full bg-[#fdf2f8] dark:bg-[#831843] border-r border-[#f9a8d4] flex flex-col items-center pt-2">

              <div class="w-full h-[2px] bg-black/20 dark:bg-white/20 rounded"></div>

          <!-- 8 Professional -->
          <div
            class="tpl-card border-2 border-transparent hover:border-apple-purple/50 rounded-xl aspect-[1/1.4] cursor-pointer bg-black/5 dark:bg-white/5 relative overflow-hidden flex group"
            onclick="setTpl('prof')" id="tpl-prof">
            <div
              class="absolute inset-x-0 bottom-0 bg-black/60 text-white text-[9px] text-center font-bold py-1 backdrop-blur transition-transform z-10 hidden group-hover:block">
              Prof.</div>
            <div class="w-[10%] h-full bg-black"></div>
            <div class="flex-1 h-full p-2 flex flex-col opacity-80">
              <div class="w-3/4 h-[3px] bg-black/30 dark:bg-white/30 rounded mb-1"></div>
              <div class="w-full h-[1px] bg-black/10 dark:bg-white/10 rounded mb-1"></div>
              <div class="w-full h-full bg-black/5 rounded"></div>
            </div>
          </div>

        </div>
      </div>

      <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

      <!-- PERSONAL INFO -->
      <div class="p-6">
        <!-- Profile Image -->
        <div class="flex items-center gap-4 mb-6">
          <div id="photoPrev"
            class="w-16 h-16 rounded-full bg-black/5 dark:bg-white/10 border border-black/10 dark:border-white/10 flex flex-shrink-0 items-center justify-center overflow-hidden cursor-pointer"
            onclick="document.getElementById('imgInput').click()">
            <span class="text-2xl opacity-50">📷</span>
          </div>
          <div>
            <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleImage(this)">
            <button
              class="px-3 py-1.5 bg-apple-blue/10 text-apple-blue font-semibold text-xs rounded-full hover:bg-apple-blue/20 transition-colors"
              onclick="document.getElementById('imgInput').click()" data-i18n="cv_upload_img">Rasm yuklash</button>
            <p class="text-[10px] text-black/40 dark:text-white/40 mt-1" data-i18n="cv_rec_img">Professional tasvir
              tavsiya etiladi</p>
          </div>
        </div>

        <div class="space-y-4">
          <div>
            <input type="text" id="f_name"
              class="w-full bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all"
              placeholder="Ism Familiya (Masalan: Alisherov M.)" data-i18n="ph_cv_name" data-i18n-attr="placeholder"
              value="" oninput="updateCV()">
          </div>
          <div>
            <input type="text" id="f_role"
              class="w-full bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all text-apple-blue font-medium"
              placeholder="Kasb (Masalan: UI/UX Designer)" data-i18n="ph_cv_role" data-i18n-attr="placeholder" value=""
              oninput="updateCV()">
          </div>
          <div class="flex gap-3">
            <input type="text" id="f_phone"
              class="w-1/2 bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all"
              placeholder="Telefon (+998...)" data-i18n="ph_cv_phone" data-i18n-attr="placeholder" value=""
              oninput="updateCV()">
            <input type="email" id="f_email"
              class="w-1/2 bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all"
              placeholder="Email" data-i18n="ph_email" data-i18n-attr="placeholder" value="" oninput="updateCV()">
          </div>
          <div>
            <input type="text" id="f_loc"
              class="w-full bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all"
              placeholder="Manzil (Masalan: Toshkent Shahri)" data-i18n="ph_cv_loc" data-i18n-attr="placeholder"
              value="" oninput="updateCV()">
          </div>
          <div>
            <textarea id="f_about"
              class="w-full h-24 bg-black/5 dark:bg-white/5 border border-transparent focus:border-apple-purple/50 rounded-xl px-4 py-3 text-sm outline-none transition-all resize-none"
              placeholder="Haqingizda qisqacha ma'lumot (Summary)" data-i18n="ph_cv_about" data-i18n-attr="placeholder"
              oninput="updateCV()"></textarea>
          </div>
        </div>
      </div>

      <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

      <!-- EXPERIENCE -->
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50"
            data-i18n="cv_experience">Ish Tajribasi</h2>
        </div>
        <div id="expList" class="space-y-3 mb-3"></div>
        <button onclick="addExp()"
          class="w-full py-2 border border-dashed border-apple-purple/50 text-apple-purple bg-apple-purple/5 rounded-xl font-bold text-sm hover:bg-apple-purple/10 transition-colors"
          data-i18n="cv_add_exp">+ Tajriba qo'shish</button>
      </div>

      <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

      <!-- EDUCATION -->
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50"
            data-i18n="cv_education">Ta'lim</h2>
        </div>
        <div id="eduList" class="space-y-3 mb-3"></div>
        <button onclick="addEdu()"
          class="w-full py-2 border border-dashed border-apple-blue/50 text-apple-blue bg-apple-blue/5 rounded-xl font-bold text-sm hover:bg-apple-blue/10 transition-colors"
          data-i18n="cv_add_edu">+ Ta'lim qo'shish</button>
      </div>

      <div class="h-px bg-black/5 dark:bg-white/5 mx-6"></div>

      <!-- SKILLS -->
      <div class="p-6 pb-6">
        <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50 mb-4"
          data-i18n="cv_skills">Ko'nikmalar</h2>
        <div class="bg-black/5 dark:bg-white/5 p-4 rounded-xl">
          <input type="text" id="skillInput"
            class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-sm outline-none focus:border-apple-purple mb-3"
            placeholder="Ko'nikma yozib ENTER bosing..." data-i18n="ph_skill" data-i18n-attr="placeholder"
            onkeydown="handleSkillAdd(event)">
          <div id="skillSuggestions" class="flex flex-wrap gap-2 mb-3"></div>
          <div id="skillsWrap" class="flex flex-wrap gap-2"></div>
        </div>
      </div>

      <div class="px-6 pb-6">
        <h2 class="font-display font-bold text-sm uppercase tracking-widest text-black/50 dark:text-white/50 mb-4">
          Tools & Tech
        </h2>
        <div class="bg-black/5 dark:bg-white/5 p-4 rounded-xl">
          <input type="text" id="toolInput"
            class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-sm outline-none focus:border-apple-blue mb-3"
            placeholder="Tool yozib ENTER bosing..."
            onkeydown="handleToolAdd(event)">
          <div id="toolSuggestions" class="flex flex-wrap gap-2 mb-3"></div>
          <div id="toolsWrap" class="flex flex-wrap gap-2"></div>
        </div>
      </div>

      <div class="px-6 pb-10">
        <button onclick="clearFormData()" class="clear-btn">🧹 Ma'lumotlarni tozalash</button>
      </div>

    </div>

    <!-- PREVIEW PANE -->
    <div id="previewPane"
      class="flex w-full lg:flex-1 h-full bg-[#1c1c1e] items-start justify-center p-4 md:p-8 scroller overflow-y-auto">
      <div class="w-full max-w-[980px]">
        <div class="cv-canvas-wrapper" id="previewScaleWrapper">
        <div class="cv-canvas tpl-minimal" id="cv-box">
          <!-- HTML generated live here -->
        </div>
        </div>
        <div class="mt-4 flex items-center justify-center gap-2" id="accentPalette">
          <button class="accent-btn active" style="background:#0A84FF" onclick="setAccentColor('#0A84FF', this)"></button>
          <button class="accent-btn" style="background:#8B5CF6" onclick="setAccentColor('#8B5CF6', this)"></button>
          <button class="accent-btn" style="background:#10B981" onclick="setAccentColor('#10B981', this)"></button>
          <button class="accent-btn" style="background:#F97316" onclick="setAccentColor('#F97316', this)"></button>
          <button class="accent-btn" style="background:#EF4444" onclick="setAccentColor('#EF4444', this)"></button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    let avatarUrl = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; // empty transparent image
    let activeTpl = 'minimal';

    // Data states
    let experiences = [];
    let education = [];
    let skills = [];
    let tools = [];
    let selectedAccent = '#0A84FF';
    const CV_DRAFT_KEY = 'cv_builder_draft_v3';
    const SKILL_SUGGESTIONS = ['Communication', 'Leadership', 'Problem Solving', 'Teamwork', 'Time Management'];
    const TOOL_SUGGESTIONS = ['Figma', 'Photoshop', 'Excel', 'Notion', 'ChatGPT'];

    // Preview quick button now scrolls to preview block (tagma-tag layout)
    function toggleMobileView() {
      const pv = document.getElementById('previewPane');
      const btn = document.getElementById('mobileViewToggle');
      pv.scrollIntoView({ behavior: 'smooth', block: 'start' });
      btn.innerHTML = I18n.t('cv_btn_edit') || '👁️ Preview';
      setTimeout(autoScale, 120);
    }

    function setAccentColor(color, el) {
      selectedAccent = color;
      document.querySelectorAll('.accent-btn').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      const box = document.getElementById('cv-box');
      box.style.setProperty('--cv-accent', selectedAccent);
      saveDraft();
    }

    // Templates
    function setTpl(t) {
      activeTpl = t;
      document.querySelectorAll('.tpl-card').forEach(el => el.classList.replace('border-apple-purple', 'border-transparent'));
      document.getElementById(`tpl-${t}`).classList.replace('border-transparent', 'border-apple-purple');
      updateCV();
      tg?.HapticFeedback?.impactOccurred('light');
    }

    // Image
    function _setAvatar(dataUrl) {
      avatarUrl = dataUrl || avatarUrl;
      document.getElementById('photoPrev').innerHTML = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;
      updateCV();
    }

    function handleImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
          _setAvatar(e.target.result);
        }
        reader.readAsDataURL(input.files[0]);
      }
    }

    // Skills
    function renderSkillsInput() {
      document.getElementById('skillsWrap').innerHTML = skills.map((s, i) => `
                <div class="px-3 py-1 bg-white dark:bg-black rounded-lg text-xs font-semibold flex items-center gap-2 border border-black/5 dark:border-white/5">
                    ${s} <span class="text-red-500 cursor-pointer text-[10px]" onclick="removeSkill(${i})">✖</span>
                </div>
            `).join('');
    }
    function handleSkillAdd(e) {
      if (e.key === 'Enter' && e.target.value.trim() !== '') {
        const val = e.target.value.trim();
        if (!skills.includes(val)) skills.push(val);
        e.target.value = '';
        renderSkillsInput();
        renderSkillSuggestions();
        updateCV();
      }
    }
    function removeSkill(i) { skills.splice(i, 1); renderSkillsInput(); renderSkillSuggestions(); updateCV(); }

    function toggleSkillSuggestion(label) {
      if (skills.includes(label)) {
        skills = skills.filter(x => x !== label);
      } else {
        skills.push(label);
      }
      renderSkillsInput();
      renderSkillSuggestions();
      updateCV();
    }

    function renderSkillSuggestions() {
      const wrap = document.getElementById('skillSuggestions');
      if (!wrap) return;
      wrap.innerHTML = SKILL_SUGGESTIONS.map(s => `
        <button type="button" class="suggest-chip ${skills.includes(s) ? 'active' : ''}" onclick="toggleSkillSuggestion('${s.replace(/'/g, "\\'")}')">${s}</button>
      `).join('');
    }

    function renderToolsInput() {
      document.getElementById('toolsWrap').innerHTML = tools.map((s, i) => `
                <div class="px-3 py-1 bg-white dark:bg-black rounded-lg text-xs font-semibold flex items-center gap-2 border border-black/5 dark:border-white/5">
                    ${s} <span class="text-red-500 cursor-pointer text-[10px]" onclick="removeTool(${i})">✖</span>
                </div>
            `).join('');
    }

    function handleToolAdd(e) {
      if (e.key === 'Enter' && e.target.value.trim() !== '') {
        const val = e.target.value.trim();
        if (!tools.includes(val)) tools.push(val);
        e.target.value = '';
        renderToolsInput();
        renderToolSuggestions();
        updateCV();
      }
    }

    function removeTool(i) { tools.splice(i, 1); renderToolsInput(); renderToolSuggestions(); updateCV(); }

    function toggleToolSuggestion(label) {
      if (tools.includes(label)) {
        tools = tools.filter(x => x !== label);
      } else {
        tools.push(label);
      }
      renderToolsInput();
      renderToolSuggestions();
      updateCV();
    }

    function renderToolSuggestions() {
      const wrap = document.getElementById('toolSuggestions');
      if (!wrap) return;
      wrap.innerHTML = TOOL_SUGGESTIONS.map(s => `
        <button type="button" class="suggest-chip ${tools.includes(s) ? 'active' : ''}" onclick="toggleToolSuggestion('${s.replace(/'/g, "\\'")}')">${s}</button>
      `).join('');
    }

    // Expanders (Exp/Edu)
    function renderExp() {
      document.getElementById('expList').innerHTML = experiences.map((ex, i) => `
                <div class="bg-black/5 dark:bg-white/5 p-4 rounded-2xl relative group">
                    <button class="absolute top-2 right-2 w-6 h-6 bg-red-500/10 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="removeExp(${ex.id})">×</button>
                    <input type="text" class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-sm font-bold outline-none mb-1 focus:border-apple-purple" placeholder="Lavozim" value="${ex.title}" oninput="experiences[${i}].title=this.value; updateCV()">
                    <div class="flex gap-2 mb-2">
                        <input type="text" class="w-1/2 bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-purple" placeholder="Kompaniya" value="${ex.company}" oninput="experiences[${i}].company=this.value; updateCV()">
                        <input type="text" class="w-1/2 bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-purple" placeholder="Yillar" value="${ex.date}" oninput="experiences[${i}].date=this.value; updateCV()">
                    </div>
                    <textarea class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-purple resize-none h-14" placeholder="Faoliyat haqida..." oninput="experiences[${i}].desc=this.value; updateCV()">${ex.desc}</textarea>
                </div>
            `).join('');
      if (window.SmartAutoFill) SmartAutoFill.initDynamic();
    }
    function addExp() { experiences.push({ id: Date.now(), title: '', company: '', date: '', desc: '' }); renderExp(); updateCV(); }
    function removeExp(id) { experiences = experiences.filter(x => x.id !== id); renderExp(); updateCV(); }

    function renderEdu() {
      document.getElementById('eduList').innerHTML = education.map((ed, i) => `
                <div class="bg-black/5 dark:bg-white/5 p-4 rounded-2xl relative group">
                    <button class="absolute top-2 right-2 w-6 h-6 bg-red-500/10 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="removeEdu(${ed.id})">×</button>
                    <input type="text" class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-sm font-bold outline-none mb-1 focus:border-apple-blue" placeholder="Daraja yoki Kurs" value="${ed.title}" oninput="education[${i}].title=this.value; updateCV()">
                    <div class="flex gap-2 mb-2">
                        <input type="text" class="w-1/2 bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-blue" placeholder="Oliygoh" value="${ed.company}" oninput="education[${i}].company=this.value; updateCV()">
                        <input type="text" class="w-1/2 bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-blue" placeholder="Yillar" value="${ed.date}" oninput="education[${i}].date=this.value; updateCV()">
                    </div>
                    <textarea class="w-full bg-transparent border-b border-black/10 dark:border-white/10 px-0 py-2 text-xs outline-none focus:border-apple-blue resize-none h-10" placeholder="Ma'lumotlar..." oninput="education[${i}].desc=this.value; updateCV()">${ed.desc}</textarea>
                </div>
            `).join('');
      if (window.SmartAutoFill) SmartAutoFill.initDynamic();
    }
    function addEdu() { education.push({ id: Date.now(), title: '', company: '', date: '', desc: '' }); renderEdu(); updateCV(); }
    function removeEdu(id) { education = education.filter(x => x.id !== id); renderEdu(); updateCV(); }

    function saveDraft() {
      const draft = {
        activeTpl,
        avatarUrl,
        selectedAccent,
        experiences,
        education,
        skills,
        tools,
        fields: {
          f_name: document.getElementById('f_name')?.value || '',
          f_role: document.getElementById('f_role')?.value || '',
          f_phone: document.getElementById('f_phone')?.value || '',
          f_email: document.getElementById('f_email')?.value || '',
          f_loc: document.getElementById('f_loc')?.value || '',
          f_about: document.getElementById('f_about')?.value || '',
        }
      };
      localStorage.setItem(CV_DRAFT_KEY, JSON.stringify(draft));
    }

    function loadDraft() {
      const raw = localStorage.getItem(CV_DRAFT_KEY);
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        activeTpl = d.activeTpl || activeTpl;
        avatarUrl = d.avatarUrl || avatarUrl;
        selectedAccent = d.selectedAccent || selectedAccent;
        experiences = Array.isArray(d.experiences) ? d.experiences : experiences;
        education = Array.isArray(d.education) ? d.education : education;
        skills = Array.isArray(d.skills) ? d.skills : skills;
        tools = Array.isArray(d.tools) ? d.tools : tools;
        const f = d.fields || {};
        ['f_name', 'f_role', 'f_phone', 'f_email', 'f_loc', 'f_about'].forEach(id => {
          if (document.getElementById(id) && typeof f[id] === 'string') document.getElementById(id).value = f[id];
        });
      } catch (_) { }
    }

    function clearFormData() {
      if (!confirm("Barcha saqlangan ma'lumotlarni tozalaysizmi?")) return;
      localStorage.removeItem(CV_DRAFT_KEY);
      experiences = [];
      education = [];
      skills = [];
      tools = [];
      activeTpl = 'minimal';
      selectedAccent = '#0A84FF';
      avatarUrl = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
      ['f_name', 'f_role', 'f_phone', 'f_email', 'f_loc', 'f_about'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.querySelectorAll('.tpl-card').forEach(el => el.classList.replace('border-apple-purple', 'border-transparent'));
      document.getElementById('tpl-minimal')?.classList.replace('border-transparent', 'border-apple-purple');
      document.querySelectorAll('.accent-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.accent-btn')?.classList.add('active');
      document.getElementById('photoPrev').innerHTML = `<span class="text-2xl opacity-50">📷</span>`;
      renderExp();
      renderEdu();
      renderSkillsInput();
      renderToolsInput();
      renderSkillSuggestions();
      renderToolSuggestions();
      updateCV();
    }

    function initPhotoDrop() {
      const dropEl = document.getElementById('photoPrev');
      if (!dropEl) return;
      ['dragenter', 'dragover'].forEach(evt =>
        dropEl.addEventListener(evt, (e) => {
          e.preventDefault();
          dropEl.classList.add('photo-drop-active');
        })
      );
      ['dragleave', 'drop'].forEach(evt =>
        dropEl.addEventListener(evt, (e) => {
          e.preventDefault();
          dropEl.classList.remove('photo-drop-active');
        })
      );
      dropEl.addEventListener('drop', (e) => {
        const file = e.dataTransfer?.files?.[0];
        if (!file || !file.type.startsWith('image/')) return;

    function autoScale() {
      const wrap = document.getElementById('previewScaleWrapper');
      const pane = document.getElementById('previewPane');
      let pw = pane.clientWidth;
      pw -= (window.innerWidth >= 1024 ? 64 : 24);

      const natW = 793;
      const scale = Math.min(pw / natW, 1);

      wrap.style.transform = `scale(${scale})`;
      wrap.style.marginBottom = `-${Math.max(0, (1 - scale) * 1122)}px`;
    }
    window.addEventListener('resize', autoScale);

    // ── Telegram upload helper ─────────────────────────────────────────
    function uploadToTelegram(blob, filename) {
      const tgId = DastyorAI.getTelegramId();
      if (!tgId) return;
      const formData = new FormData();
      formData.append('file', blob, filename);
      formData.append('telegram_id', tgId);
      if (DastyorAI.getToken()) formData.append('token', DastyorAI.getToken());
      fetch(DastyorAI.BASE + '/api/upload_to_telegram', { method: 'POST', body: formData })
        .catch(err => console.error("Tg upload err:", err));
    }

    // ── Telegram delivery toast ────────────────────────────────────────
    function _showTelegramToast(msg) {
      let t = document.getElementById('_tg_toast');
      if (!t) {
        t = document.createElement('div');
        t.id = '_tg_toast';
        t.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%);'
          + 'background:#30D158;color:#fff;font-weight:700;font-size:13px;padding:10px 20px;'
          + 'border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;'
          + 'white-space:nowrap;transition:opacity .4s ease';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._hideTimer);
      t._hideTimer = setTimeout(() => { t.style.opacity = '0'; }, 4000);
    }

    // ── _collectCVData() — forma ma'lumotlarini to'playdi ────────────
    function _collectCVData(format) {
      const get = id => (document.getElementById(id)?.value || '').trim();
      // Build works array from JS state (already has {title, company, date, desc})
      const worksArr = experiences.map(e => ({
        title: e.title, company: e.company, date: e.date, desc: e.desc
      }));
      const eduArr = education.map(e => ({
        title: e.title, company: e.company, date: e.date, desc: e.desc
      }));
      return {
        format: format,
        lang: I18n.getLang(),
        telegram_id: DastyorAI.getTelegramId() ? parseInt(DastyorAI.getTelegramId()) : null,
        token: DastyorAI.getToken() || null,
        name: get('f_name'),
        // 'role' field in form is f_role; backend expects 'spec' as role alias
        spec: get('f_role'),
        role: get('f_role'),
        phone: get('f_phone'),
        email: get('f_email'),
        loc: get('f_loc'),
        about: get('f_about'),
        template: activeTpl || 'minimal',
        skills: skills.join('\n'),
        tools: tools.join('\n'),
        works: worksArr,
        education_list: eduArr,
        img: avatarUrl || '',
      };
    }

    // ── Detect Telegram Mini App environment ──────────────────────────
    function _isTgWebApp() {
      return !!(window.Telegram?.WebApp?.initData);

    // ── exportPDF() — Preview'dan 1:1 client-side PDF ───────────────────
    async function exportPDF() {
      const btn = document.getElementById('btnPdf');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = I18n.t('status_processing') || '⏳ Kutmoqda...';
      btn.disabled = true;

      const inTelegram = _isTgWebApp();
      const safeName = (_collectCVData('pdf').name || 'CV').replace(/\s+/g, '_');
      const filename = `DASTYOR_CV_${safeName}_@DastyorAiBot.pdf`;

      try {
        const blob = await _exportPDFClientSide(filename);
        if (inTelegram) {
          uploadToTelegram(blob, filename);
          _showTelegramToast("✅ PDF tanlangan ranglar bilan botga yuborildi!");
        } else {
          _showTelegramToast('✅ PDF saqlandi!');
        }
      } catch (err) {
        console.error('exportPDF client-side error:', err);
        _showTelegramToast('❌ PDF yaratishda xatolik. Qayta urinib ko\'ring.');
      }

      autoScale();
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }

    // Preview'dagi ayni ko'rinishdan PDF yaratish (ranglar ham 1:1)
    async function _exportPDFClientSide(filename) {
      const el = document.getElementById('cv-box');
      const scaleWrapper = document.getElementById('previewScaleWrapper');
      const prevTransform = scaleWrapper.style.transform;
      const prevMarginBottom = scaleWrapper.style.marginBottom;
      scaleWrapper.style.transform = 'none';
      scaleWrapper.style.marginBottom = '0';
      try {
        const worker = html2pdf().set({
          margin: 0,
          filename,
          image: { type: 'jpeg', quality: 1.0 },
          html2canvas: { scale: 2.5, useCORS: true, letterRendering: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(el);

        let blob = null;
        try {
          blob = await worker.outputPdf('blob');
        } catch (_) {
          const pdf = await worker.toPdf().get('pdf');
          blob = pdf.output('blob');
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
        return blob;
      } finally {
        scaleWrapper.style.transform = prevTransform;
        scaleWrapper.style.marginBottom = prevMarginBottom;
      }
    }

    // ── exportWord() — Server-side, pixel-perfect Word ─────────────────
    async function exportWord() {
      const inTelegram = _isTgWebApp();
      const btn = document.querySelector('button[onclick="exportWord()"]');
      if (btn) { btn.disabled = true; btn.innerHTML = I18n.t('status_processing') || '⏳ Kutmoqda...'; }

      const safeName = (_collectCVData('word').name || 'CV').replace(/\s+/g, '_');
      const filename = `DASTYOR_CV_${safeName}_@DastyorAiBot.docx`;

      try {
        const res = await fetch(DastyorAI.BASE + '/api/export_cv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(_collectCVData('word')),
        });

        if (!res.ok) throw new Error('Server xatosi: ' + res.status);

        if (inTelegram) {
          await res.arrayBuffer();
          _showTelegramToast('✅ Word fayl Telegram chatga yuborildi!');
        } else {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
          _showTelegramToast('✅ Word saqlandi!');
        }
      } catch (err) {
        console.error('exportWord server error:', err);
        if (!inTelegram) _exportWordClientSide(filename);
        else _showTelegramToast('❌ Xatolik yuz berdi. Qayta urinib ko\'ring.');
      }

      if (btn) { btn.disabled = false; btn.innerHTML = '📄 Word'; }
    }

    // Fallback: old client-side Word blob export
    function _exportWordClientSide(filename) {
      const rawHtml = document.getElementById('cv-box').outerHTML;
      const styles = document.querySelector('style').innerHTML;
      const docHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office'
        xmlns:w='urn:schemas-microsoft-com:office:word'
        xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title>${filename}</title>
        <style>@page WordSection1{size:210mm 297mm;margin:15mm;}div.WordSection1{page:WordSection1;}${styles}</style>
        </head><body><div class="WordSection1">${rawHtml}</div></body></html>`;
      const blob = new Blob(['\ufeff', docHTML], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
      uploadToTelegram(blob, filename);
    }
