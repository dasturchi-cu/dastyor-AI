<!doctype html>
<html lang="uz" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CV Tayyorlash | DASTYOR AI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root[data-theme="dark"] {
      --bg: #050f1e;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #2563eb;
      --input-bg: rgba(255, 255, 255, 0.02);
      --header-bg: rgba(6, 13, 31, 0.95);
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --input-bg: #f1f5f9;
      --header-bg: rgba(255, 255, 255, 0.95);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
      padding-top: 60px;
    }

    /* ── HEADER ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 60px;
      background: var(--header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      text-decoration: none;
    }

    .topbar-title {
      font-weight: 800;
      font-size: 16px;
    }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
      height: fit-content;
    }

    /* ── FORM ── */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .pill {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--input-bg);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    .pill.active {
      background: var(--accent);
      color: white;
    }

    .pill.filled {
      background: rgba(37, 99, 235, 0.1);
      color: var(--accent);
    }

    .qtitle {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      background: var(--card);
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      gap: 12px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      flex: 1;
    }

    .btn-ghost {
      background: var(--input-bg);
      color: var(--muted);
    }

    /* ── PREVIEW ── */
    .preview-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .preview-container {
      background: #525659;
      border-radius: 16px;
      padding: 40px 10px;
      display: flex;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .preview {
      width: 210mm;
      min-height: 297mm;
      background: white;
      color: black;
      padding: 20mm 15mm;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
      transform-origin: top center;
      flex-shrink: 0;
      font-family: "Times New Roman", serif;
    }

    .docTitle {
      text-align: center;
      font-weight: 900;
      font-size: 14pt;
      margin-bottom: 10px;
    }

    .docName {
      text-align: center;
      font-weight: 900;
      font-size: 14pt;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sectionTitle {
      text-align: center;
      font-weight: 900;
      font-size: 12pt;
      margin: 20px 0 10px;
      text-transform: uppercase;
      border-bottom: 1px solid #000;
      padding-bottom: 4px;
    }

    @media(max-width: 600px) {
      .wrap {
        padding: 10px;
      }

      .panel {
        padding: 16px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="index.html" class="back-btn" id="backBtn">←</a>
    <span class="topbar-title" id="txt_top_title">📋 CV Tayyorlash</span>
  </div>

  <div class="wrap">
    <!-- INPUT PANEL -->
    <div class="panel">
      <div class="pills" id="pills"></div>
      <div id="questionCard"></div>
    </div>

    <!-- PREVIEW PANEL -->
    <div class="panel">
      <div class="preview-actions">
        <b id="txt_preview_l">Hujjat namunasi</b>
        <div style="display: flex; gap: 8px;">
          <button class="btn" style="background: #2b579a; color: white; padding: 8px 16px;" id="saveWord">Word</button>
          <button class="btn btn-primary" style="padding: 8px 16px;" id="savePdf">PDF</button>
        </div>
      </div>

      <div class="preview-container">
        <div class="preview" id="preview">
          <div class="docTitle" id="txt_doc_type">MA'LUMOTNOMA</div>
          <div class="docName" id="p_name">FAMILIYA ISM SHARIF</div>
          <p style="text-align: center; font-weight: bold;" id="p_header_job"></p>

          <div style="display: flex; justify-content: space-between; margin-top: 20px;">
            <div style="width: 60%;">
              <div style="margin-bottom: 4px;"><b>Tug‘ilgan yili:</b> <span id="p_birth"></span></div>
              <div style="margin-bottom: 4px;"><b>Millati:</b> <span id="p_nat"></span></div>
              <div style="margin-bottom: 4px;"><b>Ma'lumoti:</b> <span id="p_edu"></span></div>
            </div>
            <div
              style="width: 35%; border: 1px solid #ccc; height: 4cm; text-align: center; line-height: 4cm; font-size: 10pt; color: #aaa;">
              FOTO 3x4</div>
          </div>

          <div class="sectionTitle" id="txt_career_l">MEHNAT FAOLIYATI</div>
          <div id="p_career" style="font-size: 11pt; line-height: 1.4; text-align: justify;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const tg = window.Telegram?.WebApp;
    let telegramId = '';
    let currentLang = localStorage.getItem('lang') || 'uz';
    let currentTheme = localStorage.getItem('theme') || 'dark';

    const i18n = {
      uz: {
        top_title: "📋 CV Tayyorlash",
        preview: "Hujjat namunasi",
        doc_type: "MA'LUMOTNOMA",
        career: "MEHNAT FAOLIYATI",
        next: "Keyingi →",
        back: "← Orqaga",
        finish: "Yakunlash",
        fields: {
          name: "F.I.SH (To'liq)",
          birth: "Tug'ilgan sanasi",
          nat: "Millati",
          edu: "Ma'lumoti",
          career: "Mehnat faoliyati (Hozirgi va oldingi)"
        }
      },
      en: {
        top_title: "📋 CV Builder",
        preview: "Document Preview",
        doc_type: "RESUME / CV",
        career: "WORK EXPERIENCE",
        next: "Next →",
        back: "← Back",
        finish: "Finish",
        fields: {
          name: "Full Name",
          birth: "Date of Birth",
          nat: "Nationality",
          edu: "Education",
          career: "Work Experience (Current & Past)"
        }
      }
    };

    const steps = [
      { id: 'name', key: 'fields.name', placeholder: 'Aliyev Vali G\'aniyevich' },
      { id: 'birth', key: 'fields.birth', placeholder: 'DD.MM.YYYY' },
      { id: 'nat', key: 'fields.nat', placeholder: 'O\'zbek' },
      { id: 'edu', key: 'fields.edu', placeholder: 'Oliy' },
      { id: 'career', key: 'fields.career', type: 'textarea' }
    ];

    let data = {};
    let currentStep = 0;

    function init() {
      document.documentElement.setAttribute('data-theme', currentTheme);
      renderPills();
      showStep(0);
      setupNav();
    }

    function renderPills() {
      const box = document.getElementById('pills');
      box.innerHTML = '';
      steps.forEach((s, i) => {
        const p = document.createElement('div');
        p.className = `pill ${i === currentStep ? 'active' : ''} ${data[s.id] ? 'filled' : ''}`;
        p.textContent = i + 1;
        p.onclick = () => showStep(i);
        box.appendChild(p);
      });
    }

    function showStep(idx) {
      currentStep = idx;
      const s = steps[idx];
      const strings = i18n[currentLang];
      const card = document.getElementById('questionCard');

      const label = s.key.split('.').reduce((obj, k) => obj[k], strings);

      card.innerHTML = `<div class="qtitle">${idx + 1}. ${label}</div>`;

      let input;
      if (s.type === 'textarea') {
        input = document.createElement('textarea');
      } else {
        input = document.createElement('input');
      }

      input.value = data[s.id] || '';
      input.placeholder = s.placeholder || '';
      input.oninput = (e) => {
        data[s.id] = e.target.value;
        updatePreview();
        renderPills();
      };

      card.appendChild(input);

      const footer = document.createElement('div');
      footer.className = 'btn-group';

      const btnBack = document.createElement('button');
      btnBack.className = 'btn btn-ghost';
      btnBack.textContent = strings.back;
      btnBack.disabled = idx === 0;
      btnBack.onclick = () => showStep(idx - 1);

      const btnNext = document.createElement('button');
      btnNext.className = 'btn btn-primary';
      btnNext.textContent = idx === steps.length - 1 ? strings.finish : strings.next;
      btnNext.onclick = () => idx === steps.length - 1 ? finish() : showStep(idx + 1);

      footer.appendChild(btnBack);
      footer.appendChild(btnNext);
      card.appendChild(footer);
      renderPills();
    }

    function updatePreview() {
      const strings = i18n[currentLang];
      document.getElementById('txt_doc_type').textContent = strings.doc_type;
      document.getElementById('txt_career_l').textContent = strings.career;
      document.getElementById('txt_top_title').textContent = strings.top_title;
      document.getElementById('txt_preview_l').textContent = strings.preview;

      document.getElementById('p_name').textContent = (data.name || 'FULL NAME').toUpperCase();
      document.getElementById('p_birth').textContent = data.birth || '';
      document.getElementById('p_nat').textContent = data.nat || '';
      document.getElementById('p_edu').textContent = data.edu || '';
      document.getElementById('p_career').textContent = data.career || '';
    }

    function setupNav() {
      const urlParams = new URLSearchParams(window.location.search);
      telegramId = urlParams.get('telegram_id') || (tg?.initDataUnsafe?.user?.id.toString());

      document.getElementById('backBtn').onclick = (e) => {
        e.preventDefault();
        window.location.href = `index.html?telegram_id=${telegramId}`;
      };
    }

    function finish() {
      tg?.showAlert(currentLang === 'uz' ? "Tayyor! PDF yoki Word tugmasini bosing." : "Ready! Click PDF or Word button.");
    }

    init();
    updatePreview();
  </script>
</body>

</html>
